# Threat Actor Reputation Tracker — seed configuration
#
# This file seeds the tracker with known ransomware / extortion actors and
# defines the scoring rubric. The agent enriches each actor at scan time from
# live public sources, but these seeds give it canonical names + aliases to
# resolve mentions against, plus analyst-provided baseline notes.
#
# Scores are produced on a 1-10 scale per criterion. See scoring/rubric.py for
# how raw criterion values map to scores, and how the two composite indices
# (Threat Severity, Deal Reliability) are weighted.

# ---------------------------------------------------------------------------
# RUBRIC
# ---------------------------------------------------------------------------
# Each criterion has:
#   weight_severity     contribution to the Threat Severity composite (0 = none)
#   weight_reliability  contribution to the Deal Reliability composite (0 = none)
#   higher_is_worse     if true, a high raw value pushes severity UP
# Weights within each composite are normalized automatically, so they do not
# need to sum to 1.
rubric:
  criteria:
    activity_volume:
      label: "Activity / victim volume"
      description: "Recent victims posted to leak sites; sustained operational tempo."
      weight_severity: 0.30
      weight_reliability: 0.00
      higher_is_worse: true
    capability:
      label: "Technical capability"
      description: "Sophistication of tooling, EDR evasion, BYOVD, cross-platform, PQC."
      weight_severity: 0.20
      weight_reliability: 0.00
      higher_is_worse: true
    targeting_impact:
      label: "Targeting impact"
      description: "Harm severity of typical targets (critical infra, healthcare, life-safety)."
      weight_severity: 0.20
      weight_reliability: 0.00
      higher_is_worse: true
    nation_state:
      label: "Nation-state nexus"
      description: "State-directed (worst) vs state-tolerated vs pure criminal. Drives sanctions risk."
      weight_severity: 0.15
      weight_reliability: 0.20
      higher_is_worse: true
    ransom_scale:
      label: "Ransom scale"
      description: "Typical demand / estimated take. Higher = larger financial exposure."
      weight_severity: 0.15
      weight_reliability: 0.00
      higher_is_worse: true
    decryptor_reliability:
      label: "Decryptor reliability"
      description: "Track record of supplying working keys after payment."
      weight_severity: 0.00
      weight_reliability: 0.45
      higher_is_worse: false
    deal_honoring:
      label: "Deal honoring"
      description: "Honors agreements: deletes exfiltrated data, no double-dipping / re-extortion."
      weight_severity: 0.00
      weight_reliability: 0.35
      higher_is_worse: false

# Default raw values (1-10) used when the agent cannot derive a value from
# live evidence. Each scan overwrites what it can; these are the analyst priors.
# decryptor_reliability / deal_honoring: 10 = fully reliable, 1 = routinely cheats.
#
# `status` (active | defunct) and `nation_state_class` flow through to the board
# and workbook. Groups the scan discovers on live sources but that are not listed
# here are added automatically with conservative defaults and flagged "discovered".
