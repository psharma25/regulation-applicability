<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&amp;A — Security Program Trackers</title>
<style>
  :root{
    --teal:#0E7C86;--amber:#B5701A;--ink:#16282B;--line:#E3E9E9;--white:#fff;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#fff;}
  body{color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;}
  h1{font-family:var(--serif);font-weight:700;font-size:34px;letter-spacing:-.4px;text-align:center;margin-bottom:36px;}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;width:100%;max-width:820px;}
  @media(max-width:640px){.cards{grid-template-columns:1fr;}h1{font-size:26px;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px 28px;text-decoration:none;color:var(--ink);
    text-align:center;position:relative;overflow:hidden;transition:transform .16s,box-shadow .16s,border-color .16s;
    box-shadow:0 1px 2px rgba(14,53,60,.05);display:flex;align-items:center;justify-content:center;gap:10px;min-height:150px;}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;}
  .card.acq::before{background:var(--amber);} .card.sep::before{background:var(--teal);}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(14,53,60,.12);}
  .card.acq:hover{border-color:var(--amber);} .card.sep:hover{border-color:var(--teal);}
  .card span.t{font-family:var(--serif);font-size:24px;font-weight:700;}
  .card .arr{font-size:22px;transition:transform .16s;}
  .card.acq .arr{color:var(--amber);} .card.sep .arr{color:var(--teal);}
  .card:hover .arr{transform:translateX(4px);}
</style>
</head>
<body>
  <h1>M&amp;A — Security Program Trackers</h1>
  <div class="cards">
    <a class="card acq" href="acquisition-integration-tracker.html"><span class="t">Acquisition Checklist</span><span class="arr">&#8594;</span></a>
    <a class="card sep" href="spinoff-separation-tracker.html"><span class="t">SpinOff Checklist</span><span class="arr">&#8594;</span></a>
  </div>
</body>
</html>
