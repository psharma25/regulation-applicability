<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ATLAS Watch — AI Threat Intelligence</title>
<style>
  :root{
    --ink:#ffffff; --panel:#f5f7fa; --panel-2:#ffffff; --line:#e2e6ee;
    --text:#1b2130; --muted:#5d6678; --dim:#9aa2b2;
    --accent:#0fb5a6; --accent-dim:#7fd9d0;
    --realized:#e23d2e; --demonstrated:#c8881a; --feasible:#3a63ad;
    --crit:#e23d2e; --high:#d97316; --med:#b5870f; --low:#3a63ad;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Inter","Helvetica Neue",system-ui,-apple-system,sans-serif;
    --card-pad:15px 16px 14px; --main-pad:22px 28px 60px; --gap:13px;
    --card-min:310px; --fs:14px; --h4:14.5px; --cardp:12.5px; --aside-pad:20px 18px;
  }
  /* ---- Dark (black background) theme ---- */
  [data-theme="dark"]{
    --ink:#0c0e13; --panel:#15181f; --panel-2:#1b1f28; --line:#2a2f3a;
    --text:#e8ebf1; --muted:#9aa2b2; --dim:#6b7385;
    --accent:#2dd4bf; --accent-dim:#155e57;
  }
  [data-theme="dark"] header{background:linear-gradient(180deg,#15181f,#0c0e13)}
  [data-theme="dark"] aside{background:#10131a}
  [data-theme="dark"] .analyst{background:radial-gradient(120% 140% at 0% 0%,#10211f,#15181f 60%)}
  [data-theme="dark"] .ask textarea{background:#0c0e13}
  [data-theme="dark"] .reality .seg{background:#2a2f3a}
  [data-theme="dark"] .b-Critical{background:rgba(226,61,46,.22)}
  [data-theme="dark"] .b-High{background:rgba(217,115,22,.22)}
  [data-theme="dark"] .b-Medium{background:rgba(181,135,15,.22)}
  [data-theme="dark"] .b-Low{background:rgba(58,99,173,.28)}
  /* ---- Black & White (monochrome) theme ---- */
  [data-theme="bw"]{
    --ink:#ffffff; --panel:#ffffff; --panel-2:#ffffff; --line:#000000;
    --text:#000000; --muted:#333333; --dim:#666666;
    --accent:#000000; --accent-dim:#000000;
    --realized:#000000; --demonstrated:#000000; --feasible:#000000;
    --crit:#000000; --high:#000000; --med:#000000; --low:#000000;
  }
  [data-theme="bw"] header{background:#ffffff}
  [data-theme="bw"] aside{background:#ffffff}
  [data-theme="bw"] .analyst{background:#ffffff}
  [data-theme="bw"] .ask textarea{background:#ffffff}
  [data-theme="bw"] .ask button{background:#000000;color:#ffffff}
  [data-theme="bw"] .reality .seg{background:#cfcfcf}
  [data-theme="bw"] .reality .seg.f,[data-theme="bw"] .reality .seg.d,[data-theme="bw"] .reality .seg.r{background:#000000}
  [data-theme="bw"] .sevbadge{background:#ffffff !important;color:#000000 !important;border:1px solid #000000}
  [data-theme="bw"] a,[data-theme="bw"] .ref,[data-theme="bw"] .card-id,[data-theme="bw"] .src,[data-theme="bw"] .dr-id{color:#000000 !important}
  /* ---- Compact density ---- */
  [data-density="compact"]{
    --card-pad:9px 11px 8px; --main-pad:14px 18px 40px; --gap:8px;
    --card-min:240px; --fs:13px; --h4:13px; --cardp:11.5px; --aside-pad:13px 13px;
  }
  [data-density="compact"] header{padding:8px 18px}
  [data-density="compact"] .stat .n{font-size:21px}
  [data-density="compact"] .card{gap:6px}
  [data-density="compact"] .card p{-webkit-line-clamp:2}
  [data-density="compact"] .rail-h{margin:11px 0 5px}
  body{font-size:var(--fs)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ink);color:var(--text);font-family:var(--sans);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--mono)}

  header{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;
    padding:18px 28px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#ffffff,#f5f7fa)}
  .brand{font-weight:800;letter-spacing:-0.02em;font-size:20px}
  .brand b{color:var(--accent)}
  .tagline{color:var(--muted);font-size:12.5px}
  .meta-pills{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:var(--panel)}
  .pill.on{color:var(--accent);border-color:var(--accent-dim)}
  .pill.btn{cursor:pointer}.pill.btn:hover{color:var(--text);border-color:var(--muted)}
  .pill.busy{color:var(--demonstrated);border-color:var(--demonstrated)}

  .wrap{display:grid;grid-template-columns:var(--aside-w,236px) 1fr;gap:0;min-height:calc(100% - 67px)}
  aside{border-right:1px solid var(--line);padding:var(--aside-pad);background:#fafbfd;
    position:sticky;top:0;align-self:start;height:calc(100vh - 67px);overflow:auto}
  .rail-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--dim);margin:18px 0 8px}
  .rail-h:first-child{margin-top:0}
  select,.search input{width:100%;background:var(--panel);color:var(--text);
    border:1px solid var(--line);border-radius:7px;padding:8px 9px;font-size:13px;font-family:inherit}
  select:focus,input:focus{outline:none;border-color:var(--accent-dim)}
  .toggle{display:flex;align-items:center;gap:9px;margin-top:6px;font-size:13px;
    color:var(--text);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--realized)}
  .reset{margin-top:18px;width:100%;background:transparent;color:var(--muted);
    border:1px dashed var(--line);border-radius:7px;padding:8px;font-size:12px}
  .reset:hover{color:var(--text);border-color:var(--muted)}

  main{padding:var(--main-pad);min-width:0}
  .analyst{border:1px solid var(--line);border-radius:8px;background:
    radial-gradient(120% 140% at 0% 0%,#f0fbfa,#f5f7fa 60%);padding:3px 8px;margin-bottom:8px}
  .analyst-top{display:flex;align-items:center;gap:6px;margin-bottom:0}
  .analyst.collapsed .analyst-top{margin-bottom:0}
  .analyst:not(.collapsed) .analyst-top{margin-bottom:5px}
  .analyst-top h2{margin:0;font-size:10.5px;letter-spacing:-0.01em;font-weight:700}
  .analyst-body{max-height:130px;overflow:auto}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .analyst-sub{color:var(--muted);font-size:12px;margin-left:auto;font-family:var(--mono)}
  .ask{display:flex;gap:10px}
  .ask textarea{flex:1;resize:vertical;min-height:46px;background:var(--ink);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:14px}
  .ask button{background:var(--accent);color:#ffffff;border:none;border-radius:8px;
    padding:0 20px;font-weight:700;font-size:13.5px}
  .ask button:disabled{opacity:.5;cursor:wait}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .chip{font-size:11.5px;color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:4px 11px;background:var(--panel)}
  .chip:hover{color:var(--text);border-color:var(--muted)}
  .result{margin-top:16px;border-top:1px solid var(--line);padding-top:15px;display:none}
  .result.show{display:block}
  .answer{font-size:14.5px;line-height:1.62}
  .answer .ref{font-family:var(--mono);font-size:12px;color:var(--accent);
    border-bottom:1px dotted var(--accent-dim);cursor:pointer}
  .sev-summary{display:flex;gap:18px;flex-wrap:wrap;margin:14px 0 4px;
    font-family:var(--mono);font-size:12px;color:var(--muted)}
  .sev-summary b{color:var(--text)}
  .ret-row{margin-top:13px;display:flex;gap:8px;flex-wrap:wrap}
  .ret{display:flex;align-items:center;gap:7px;font-size:12px;border:1px solid var(--line);
    border-radius:7px;padding:5px 9px;background:var(--panel);cursor:pointer}
  .ret:hover{border-color:var(--muted)}
  .ret .id{font-family:var(--mono);color:var(--accent);font-size:11px}
  .mits{margin-top:13px}.mits .rail-h{margin:0 0 7px}
  .mit{font-size:12.5px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--line)}
  .mit .id{font-family:var(--mono);color:var(--demonstrated);font-size:11px;margin-right:8px}

  .stats{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
  /* ---- live source tracker (compact) ---- */
  .tracker{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:6px 10px;margin-bottom:10px;display:none}
  .tracker.shown{display:block}
  .tk-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tk-head .dot{width:6px;height:6px}
  .tk-head h3{margin:0;font-size:11.5px;letter-spacing:.02em;font-weight:700}
  .tk-sub{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .tk-ctrls{margin-left:auto;display:flex;gap:6px;align-items:center}
  .tk-ctrls select{width:auto;padding:3px 6px;font-size:10.5px}
  .tk-ctrls button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 10px;font-weight:700;font-size:11px}
  .tk-ctrls button:disabled{opacity:.5;cursor:wait}
  [data-theme="bw"] .tk-ctrls button{background:#000}
  .tk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:5px;margin-top:9px}
  .tk-row{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-size:11px;background:var(--ink)}
  .tk-row .sw{width:7px;height:7px;border-radius:2px;flex:none}
  .tk-row .tk-nm{flex:1;min-width:0}
  .tk-row .tk-nm b{display:block;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tk-row .tk-nm span{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .tk-row .tk-st{font-family:var(--mono);font-size:8.5px;padding:1px 5px;border-radius:4px;white-space:nowrap}
  .tk-st.ok{color:#0a7f5f;background:rgba(15,181,166,.14)}
  .tk-st.live{color:#0a7f5f;background:rgba(15,181,166,.2);font-weight:700}
  .tk-st.embedded{color:var(--muted);background:var(--panel);border:1px solid var(--line)}
  .tk-st.blocked{color:#b5870f;background:rgba(181,135,15,.14)}
  .tk-st.err{color:#c92a2a;background:rgba(201,42,42,.12)}
  .tk-go{color:var(--dim);text-decoration:none;font-size:11px}.tk-go:hover{color:var(--accent)}
  .tk-cat{grid-column:1/-1;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:2px 0 0}
  .tk-log{margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);max-height:96px;overflow:auto;
    border-top:1px solid var(--line);padding-top:6px;display:none}
  .tk-log.show{display:block}
  .tk-log div{padding:1px 0}
  /* ---- analyst collapse ---- */
  .an-chev{transition:transform .18s;font-size:11px;color:var(--dim);cursor:pointer}
  .analyst.collapsed .an-chev{transform:rotate(-90deg)}
  .analyst.collapsed .analyst-body{display:none}
  .analyst-top{cursor:pointer}
  .stat{display:flex;align-items:baseline;gap:6px;border:none;border-radius:0;background:transparent;padding:1px 0;flex-wrap:wrap}
  .stat .n{font-size:13px;font-weight:800;letter-spacing:-0.02em;font-family:var(--mono);min-width:34px}
  .stat .l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:0}
  .stat.realworld .n{color:var(--realized)}.stat.crit .n{color:var(--high)}
  .stat .bar{display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:3px;gap:1px;flex:1 0 100%;width:100%}
  .stat .bar i{display:block}

  .grid-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .grid-head h3{align-self:baseline}
  #analystOpen{margin-left:auto}
  .analyst-fab{align-self:center}
  .popout{margin-left:8px;background:transparent;border:1px solid var(--line);border-radius:7px;
    padding:4px 10px;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .popout:hover{border-color:var(--muted);color:var(--text)}
  .gridwrap.maxed{position:fixed;inset:0;z-index:55;background:var(--ink);padding:18px 24px;overflow:auto}
  .gridwrap.maxed .grid-head{position:sticky;top:0;background:var(--ink);padding:6px 0;z-index:2}
  .grid-head h3{margin:0;font-size:14px}.grid-head .count{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .sortsel{margin-left:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-min),1fr));gap:var(--gap)}
  .card{border:1px solid var(--line);border-radius:11px;background:var(--panel);
    padding:var(--card-pad);cursor:pointer;transition:border-color .15s,transform .15s;
    display:flex;flex-direction:column;gap:9px;animation:fade .35s ease both}
  .card:hover{border-color:var(--muted);transform:translateY(-2px)}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .card-top{display:flex;align-items:center;gap:8px}
  .card-id{font-family:var(--mono);font-size:11px;color:var(--dim)}
  .src{font-family:var(--mono);font-size:10px;color:var(--muted);
    border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-left:auto}
  .card h4{margin:0;font-size:var(--h4);line-height:1.3;letter-spacing:-0.01em}
  .card p{margin:0;font-size:var(--cardp);color:var(--muted);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:4px}
  .sevbadge{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
  .b-Critical{background:rgba(255,93,77,.16);color:var(--crit)}
  .b-High{background:rgba(255,159,67,.15);color:var(--high)}
  .b-Medium{background:rgba(244,207,82,.13);color:var(--med)}
  .b-Low{background:rgba(93,131,196,.15);color:var(--low)}
  .scoretxt{font-family:var(--mono);font-size:11px;color:var(--dim)}
  /* ---- compact table (one line per threat) ---- */
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl thead th{position:sticky;top:0;background:var(--panel);text-align:left;font-family:var(--mono);
    font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:600;
    padding:7px 9px;border-bottom:1px solid var(--line);z-index:1;cursor:pointer;user-select:none;white-space:nowrap}
  .tbl thead th:hover{color:var(--text)}
  .tbl tbody tr{border-bottom:1px solid var(--line);cursor:pointer}
  .tbl tbody tr:hover{background:var(--panel)}
  .tbl td{padding:6px 9px;vertical-align:middle}
  .tbl .c-sev{width:40px;text-align:center}
  .tbl .c-sev .sevbadge{padding:1px 6px;font-size:11px}
  .tbl .c-id{color:var(--accent);font-size:11px;white-space:nowrap}
  .tbl .c-name{font-weight:500;color:var(--text);min-width:200px}
  .tbl .c-date{white-space:nowrap;color:var(--muted);font-size:11px}
  .tbl .c-actor,.tbl .c-org{color:var(--muted);max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-org{font-size:11.5px;color:var(--muted);margin:2px 0 8px}
  .card-org .k{color:var(--accent);font-weight:600;margin-right:5px;text-transform:uppercase;letter-spacing:.04em;font-size:10px}
  .tbl .c-fin{white-space:nowrap;color:var(--text);font-family:var(--mono);font-size:11px}
  .tbl .c-cvss{width:52px;text-align:center}
  .cvss-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:1px 6px;border-radius:6px}
  .cvss-na{color:var(--dim)}
  .tbl .c-type{white-space:nowrap;color:var(--muted)}
  [data-theme="bw"] .tbl .c-id{color:#000}
  @media(max-width:900px){.tbl .c-actor,.tbl .c-org,.tbl .c-type{display:none}}

  /* ---- ultra-compact single thin-line table ---- */
  .tbl.line{font-size:11.5px}
  .tbl.line thead th{padding:3px 8px;font-size:9px}
  .tbl.line td{padding:1px 8px;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tbl.line tbody tr{border-bottom:1px solid var(--line)}
  .tbl.line .c-name{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
  .tbl.line .c-sev .sevbadge{padding:0 5px;font-size:10px}
  .tbl.line .c-cvss{display:none}

  /* ---- Threat Analyst: small launcher button ---- */
  .analyst-fab{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
    background:var(--accent);color:#fff;border-radius:999px;padding:5px 13px;font-size:12px;
    font-weight:700;cursor:pointer;letter-spacing:-0.01em}
  .analyst-fab:hover{filter:brightness(1.05)}
  .analyst-fab .dot{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.9}
  [data-theme="bw"] .analyst-fab{background:#000;color:#fff}

  /* ---- Threat Analyst: popable window (modal overlay) ---- */
  .analyst-pop{position:fixed;inset:0;z-index:60;display:none}
  .analyst-pop.open{display:block}
  .analyst-pop .ap-scrim{position:absolute;inset:0;background:rgba(12,14,19,.42)}
  .analyst-pop .ap-win{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(680px,calc(100vw - 32px));max-height:calc(100vh - 48px);overflow:auto;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 18px 60px rgba(12,14,19,.32);padding:16px 18px 18px}
  [data-theme="dark"] .analyst-pop .ap-win{background:#15181f}
  .analyst-pop .ap-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .analyst-pop .ap-head h2{margin:0;font-size:14px;font-weight:700;letter-spacing:-0.01em}
  .analyst-pop .ap-close{margin-left:auto;background:transparent;border:1px solid var(--line);
    border-radius:7px;width:26px;height:26px;font-size:14px;cursor:pointer;color:var(--muted)}
  .analyst-pop .ap-close:hover{color:var(--text)}

  .reality{margin-left:auto;display:flex;align-items:center;gap:6px}
  .reality .segs{display:flex;gap:2px}
  .reality .seg{width:15px;height:6px;border-radius:2px;background:#e4e8f0}
  .reality .seg.f{background:var(--feasible)}.reality .seg.d{background:var(--demonstrated)}
  .reality .seg.r{background:var(--realized)}
  .reality .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--dim)}
  .reality.is-Realized .lbl{color:var(--realized)}
  .reality.is-Demonstrated .lbl{color:var(--demonstrated)}
  .reality.is-Feasible .lbl{color:var(--feasible)}

  .scrim{position:fixed;inset:0;background:rgba(20,26,40,.35);opacity:0;pointer-events:none;
    transition:opacity .2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:var(--drawer-w,560px);max-width:96vw;background:var(--panel-2);
    border-left:1px solid var(--line);z-index:50;transform:translateX(100%);
    transition:transform .25s ease;overflow:auto;padding:24px 26px 60px}
  .drawer.show{transform:none}
  .drawer .x{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--muted);
    font-size:22px;line-height:1}.drawer .x:hover{color:var(--text)}
  .dr-id{font-family:var(--mono);font-size:12px;color:var(--accent)}
  .drawer h2{margin:6px 0 12px;font-size:21px;letter-spacing:-0.02em;line-height:1.2;padding-right:30px}
  .dr-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .dr-sec{margin-top:20px}.dr-sec .rail-h{margin:0 0 8px}
  .dr-desc{font-size:14px;line-height:1.65;color:#2a3142;white-space:pre-wrap}
  .pipe{width:100%;height:auto;margin-top:4px}
  .oll-fallback{margin-top:10px;font-size:12px;color:var(--high);background:rgba(217,115,22,.1);
    border:1px solid rgba(217,115,22,.3);border-radius:7px;padding:8px 10px}
  /* ---- engine / ollama controls ---- */
  .engine-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:10px 0 2px;font-size:12.5px}
  .eng-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--dim);display:flex;align-items:center;gap:6px}
  .engine-row select{width:auto;padding:4px 8px;font-size:12px}
  .ollama-cfg{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ollama-cfg input{width:160px;padding:4px 8px;font-size:12px;font-family:var(--mono)}
  .ollama-cfg input:last-of-type{width:110px}
  .mini{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 11px;font-size:12px;font-weight:700}
  [data-theme="bw"] .mini{background:#000}
  .oll-st{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .oll-st.ok{color:#0a7f5f}.oll-st.err{color:#c92a2a}
  .pipe-legend{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.4}
  .intel{display:flex;flex-direction:column;gap:1px}
  .intel-row{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .intel-row .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);padding-top:2px}
  .intel-row .v{color:var(--text)}
  .intel-row .v.mono{font-family:var(--mono);font-size:11.5px;word-break:break-word}
  .fin-tag{font-family:var(--mono);font-size:9.5px;padding:1px 6px;border-radius:5px;margin-left:4px;vertical-align:1px}
  .fin-tag.doc{background:rgba(15,181,166,.16);color:#0a7f5f}
  .fin-tag.mod{background:var(--panel);color:var(--muted);border:1px solid var(--line)}
  .muted-note{font-size:11px;color:var(--dim)}
  [data-theme="dark"] .dr-desc{color:var(--text)}
  .tag{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:3px 8px;background:var(--panel)}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .linkrow{display:block;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .linkrow .id{font-family:var(--mono);color:var(--accent);font-size:11px;margin-right:9px}
  .linkrow:hover{color:#fff}
  .reflist a{display:block;padding:6px 0;font-size:12.5px;color:var(--muted);
    border-bottom:1px solid var(--line);word-break:break-word}
  .reflist a:hover{color:var(--accent)}
  .factor{font-size:12.5px;color:var(--muted);padding:4px 0 4px 14px;position:relative}
  .factor:before{content:"▸";position:absolute;left:0;color:var(--dim)}
  .empty{color:var(--muted);text-align:center;padding:50px;font-size:13px}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid #ffffff;border-top-color:transparent;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);
    border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:13px;z-index:60;
    opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  /* ---- resizable frames ---- */
  .aside-grip{position:absolute;top:0;right:-3px;width:7px;height:100%;cursor:col-resize;z-index:6}
  .aside-grip:hover{background:linear-gradient(90deg,transparent,var(--accent-dim))}
  .drawer-grip{position:absolute;top:0;left:0;width:7px;height:100%;cursor:col-resize;z-index:6}
  .drawer-grip:hover{background:linear-gradient(90deg,var(--accent-dim),transparent)}
  /* ---- collapsible left-rail dropdown groups ---- */
  .rail-grp{border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:2px}
  .rail-grp .grp-tog{display:flex;align-items:center;width:100%;background:transparent;border:none;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);
    margin:14px 0 8px;padding:0;cursor:pointer}
  .rail-grp .grp-tog:hover{color:var(--text)}
  .rail-grp .chev{margin-left:auto;transition:transform .18s;font-size:11px}
  .rail-grp.collapsed .chev{transform:rotate(-90deg)}
  .rail-grp.collapsed .grp-body{display:none}
  .rail-grp .grp-ct{font-family:var(--mono);font-size:10px;color:var(--accent);margin-left:6px;letter-spacing:0}
  .rail-h.sub{margin:10px 0 5px;letter-spacing:.12em}
  .rail-h.sub:first-child{margin-top:0}
  /* ---- tracker collapse + strip divider ---- */
  .tk-head{cursor:pointer}
  .tk-chev{transition:transform .18s;font-size:11px;color:var(--dim)}
  .tracker.collapsed .tk-chev{transform:rotate(-90deg)}
  .tracker.collapsed .tk-body{display:none}
  .tracker.collapsed{padding-bottom:14px}
  .tk-ctrls{cursor:default}
  .src-strip .strip-div{width:1px;align-self:stretch;background:var(--line);margin:0 4px}
  .tk-cat{grid-column:1/-1;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim);margin:4px 0 0}
  /* ---- source / type nav in left rail ---- */
  .navlist{display:flex;flex-direction:column;gap:3px}
  .navitem{display:flex;align-items:center;gap:8px;width:100%;text-align:left;
    background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;
    font-size:12.5px;color:var(--text);font-family:inherit}
  .navitem:hover{border-color:var(--line);background:var(--panel)}
  .navitem.on{border-color:var(--accent-dim);background:var(--panel);font-weight:600}
  .navitem .swatch{width:9px;height:9px;border-radius:3px;flex:none;background:var(--dim)}
  .navitem .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .navitem .ct{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .navitem.on .ct{color:var(--accent)}
  .navitem .nm{display:flex;flex-direction:column;line-height:1.25}
  .navitem .nm .sub{font-size:9.5px;color:var(--dim);font-weight:400;letter-spacing:.01em}
  .srcgo{flex:none;font-size:11px;color:var(--dim);text-decoration:none;padding:0 2px}
  .srcgo:hover{color:var(--accent)}
  .src-pill .srcgo{margin-left:2px}
  .top-seg{font-family:var(--mono);font-size:11.5px;color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:4px 14px;background:var(--ink)}
  .top-seg:hover{border-color:var(--muted);color:var(--text)}
  .top-seg.on{color:#fff;background:var(--accent);border-color:var(--accent)}
  [data-theme="bw"] .top-seg.on{background:#000;border-color:#000}
  .top-seg .ct{opacity:.8;margin-left:3px}
  /* ---- header controls + source strip ---- */
  .ctrls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .seg-ctrl{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--panel)}
  .seg-ctrl button{background:transparent;border:none;padding:4px 11px;font-size:11.5px;
    font-family:var(--mono);color:var(--muted);border-right:1px solid var(--line)}
  .seg-ctrl button:last-child{border-right:none}
  #typeSelect{border:1px solid var(--line);border-radius:999px;background:var(--panel);
    color:inherit;padding:3px 7px;font-size:10.5px;cursor:pointer;max-width:130px}
  .seg-ctrl button.on{background:var(--accent);color:#fff}
  [data-theme="bw"] .seg-ctrl button.on{background:#000;color:#fff}
  .ctrl-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-right:2px}
  .mini-toggle{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px 11px;
    font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .mini-toggle:hover{border-color:var(--muted);color:var(--text)}
  .mini-toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  [data-theme="bw"] .mini-toggle.on{background:#000;border-color:#000}
  .src-strip{display:flex;gap:7px;align-items:center;flex-wrap:wrap;
    padding:9px 28px;border-bottom:1px solid var(--line);background:var(--panel)}
  .src-strip .lab{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-right:4px}
  .src-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
    color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:var(--ink)}
  .src-pill:hover{border-color:var(--muted);color:var(--text)}
  .src-pill.on{color:var(--accent);border-color:var(--accent-dim)}
  [data-theme="bw"] .src-pill.on{color:#000;border-color:#000;font-weight:700}
  .src-pill .swatch{width:8px;height:8px;border-radius:2px;background:var(--dim)}
  .src-pill .ct{opacity:.8}
  @media(max-width:780px){.wrap{grid-template-columns:1fr}aside{position:static;height:auto;
    border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
  <div class="brand">ATLAS<b>Watch</b></div>
  <div class="tagline">AI&#8209;security threat intelligence &middot; multi&#8209;source</div>
  <div class="ctrls" id="ctrls">
    <button class="mini-toggle" id="trackerBtn" title="Show or hide the Live Source Tracker, which polls external feeds for new AI-security incidents">↻ Tracker</button>
    <span class="ctrl-lbl">Theme</span>
    <div class="seg-ctrl" id="themeCtrl">
      <button data-theme-val="light" title="Light theme">Light</button>
      <button data-theme-val="dark" title="Dark theme">Dark</button>
      <button data-theme-val="bw" title="High-contrast black &amp; white theme">B&amp;W</button>
    </div>
    <span class="ctrl-lbl">Layout</span>
    <span style="display:inline-flex;align-items:center;gap:6px;flex-wrap:nowrap">
    <div class="seg-ctrl" id="layoutCtrl">
      <button data-layout-val="cards" title="Card grid — full detail per threat">Cards</button>
      <button data-layout-val="table" title="Standard table view">Table</button>
      <button data-layout-val="compact" title="Compact single-line table — maximum density">Compact</button>
    </div>
    <select id="typeSelect" title="Filter by incident type — Real-world (confirmed/realized), Hypothetical (demonstrated/exercise), or Reference">
      <option value="all" title="Show every entry regardless of type">All Types</option>
      <option value="real" title="Confirmed, real-world incidents only">Real-world incident</option>
      <option value="hyp" title="Hypothetical, demonstrated, or exercise entries">Hypothetical</option>
      <option value="ref" title="Reference entries (frameworks, taxonomies)">Reference</option>
    </select>
    </span>
  </div>
  <div class="meta-pills" id="metaPills"></div>
</header>
<div class="src-strip" id="srcStrip"></div>

<div class="wrap">
  <aside>
    <div class="rail-h">Overview</div>
    <div class="stats" id="stats"></div>
    <div class="rail-h">Search</div>
    <div class="search"><input id="q" placeholder="prompt injection, deepfake…"/></div>

    <div class="rail-grp" data-grp="filters">
      <button class="rail-h grp-tog">Filters <span class="chev">▾</span></button>
      <div class="grp-body">
        <div class="rail-h sub">Severity</div>
        <select id="f-band"><option value="">Any severity</option>
          <option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select>
        <div class="rail-h sub">Maturity</div>
        <select id="f-maturity"><option value="">Any maturity</option>
          <option>Realized</option><option>Demonstrated</option><option>Feasible</option></select>
        <div class="rail-h sub">Platform</div>
        <select id="f-platform"><option value="">All platforms</option></select>
      </div>
    </div>

    <div class="rail-grp" data-grp="reality">
      <button class="rail-h grp-tog">Evidence <span class="chev">▾</span></button>
      <div class="grp-body"><div class="navlist" id="realityNav"></div></div>
    </div>

    <div class="rail-grp" data-grp="sources">
      <button class="rail-h grp-tog">Sources <span class="grp-ct" id="srcGrpCt"></span><span class="chev">▾</span></button>
      <div class="grp-body"><div class="navlist" id="sourceNav"></div></div>
    </div>

    <div class="rail-grp" data-grp="frameworks">
      <button class="rail-h grp-tog">Frameworks <span class="grp-ct" id="fwGrpCt"></span><span class="chev">▾</span></button>
      <div class="grp-body"><div class="navlist" id="frameworkNav"></div></div>
    </div>

    <button class="reset" id="reset">Clear filters</button>
    <div class="aside-grip" id="asideGrip" title="Drag to resize the panel"></div>
  </aside>

  <main>
    <section class="tracker" id="tracker">
      <div class="tk-head" id="tkHead">
        <span class="dot"></span><h3>Live Source Tracker</h3>
        <span class="chev tk-chev">▾</span>
        <span class="tk-sub" id="tkLast">—</span>
        <div class="tk-ctrls" id="tkCtrls">
          <select id="tkFreq" title="How often the tracker should auto-run">
            <option value="ondemand">On-demand</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
          <button id="tkRun">Run now</button>
        </div>
      </div>
      <div class="tk-body">
        <div class="tk-grid" id="tkGrid"></div>
        <div class="tk-log" id="tkLog"></div>
      </div>
    </section>
    <div class="analyst-pop" id="analystPop">
      <div class="ap-scrim" id="apScrim"></div>
      <div class="ap-win">
      <div class="ap-head">
        <span class="dot"></span><h2>Threat Analyst</h2>
        <span class="analyst-sub" id="engineTag">RAG · grounded in ATLAS + OWASP</span>
        <button class="ap-close" id="apClose" title="Close">✕</button>
      </div>
      <div class="analyst-body">
      <div class="ask">
        <textarea id="ask" placeholder="Ask about a real-world AI threat — e.g. &quot;How are agents being hijacked through MCP tools?&quot;"></textarea>
        <button id="askBtn">Analyze</button>
      </div>
      <div class="engine-row">
        <label class="eng-lbl">Engine
          <select id="engineSel">
            <option value="deterministic">Deterministic (offline)</option>
            <option value="ollama">Ollama (live LLM)</option>
          </select>
        </label>
        <span class="ollama-cfg" id="ollamaCfg" style="display:none">
          <input id="ollamaUrl" placeholder="http://localhost:11434" spellcheck="false"/>
          <input id="ollamaModel" placeholder="llama3.1" spellcheck="false"/>
          <button id="ollamaTest" class="mini">Test</button>
          <span id="ollamaStatus" class="oll-st"></span>
        </span>
      </div>
      <div class="chips" id="exampleChips"></div>
      <div class="result" id="result">
        <div class="answer" id="answer"></div>
        <div class="sev-summary" id="sevSummary"></div>
        <div class="ret-row" id="retRow"></div>
        <div class="mits" id="mitBox"></div>
      </div>
      </div>
      </div>
    </div>
    <div class="gridwrap" id="gridWrap">
    <div class="grid-head">
      <h3 id="gridTitle">Threats</h3>
      <span class="count" id="gridCount"></span>
      <select class="sortsel" id="sort" style="width:auto">
        <option value="severity">Sort: severity</option>
        <option value="name">Sort: name</option></select>
      <button class="analyst-fab" id="analystOpen" title="Open the Threat Analyst"><span class="dot"></span>Threat Analyst</button>
      <button class="popout" id="dlExcel" title="Download the current threat list as an Excel sheet">⬇ Excel</button>
      <button class="popout" id="popOut" title="Pop the threats list into a separate window">⤢ Pop out</button>
      <button class="popout" id="popBack" style="display:none" title="Restore">⤡ Pop back in</button>
    </div>
    <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script>const SNAPSHOT = {"generated":"2026-06-28T14:16:36.773133Z","atlas_version":"2026.05","counts":{"techniques":170,"case_studies":57,"mitigations":35},"mitigations":{"AML.M0000":{"id":"AML.M0000","name":"Limit Public Release of Information","description":"Limit the public release of technical information about the AI stack used in an organization's products or services. Technical knowledge of how AI is used can be leveraged by adversaries to perform targeting and tailor attacks to the target system. Additionally, consider limiting the release of organizational information - including physical locations, researcher names, and department structures - from which technical details such as AI techniques, model architectures, or datasets may be inferred.","categories":["Policy"]},"AML.M0001":{"id":"AML.M0001","name":"Limit Model Artifact Release","description":"Limit public release of technical project details including data, algorithms, model architectures, and model checkpoints that are used in production, or that are representative of those used in production.","categories":["Policy"]},"AML.M0002":{"id":"AML.M0002","name":"Passive AI Output Obfuscation","description":"Decreasing the fidelity of model outputs provided to the end user can reduce an adversary's ability to extract information about the model and optimize attacks for the model.","categories":["Technical - AI"]},"AML.M0003":{"id":"AML.M0003","name":"Model Hardening","description":"Use techniques to make AI models robust to adversarial inputs such as adversarial training or network distillation.","categories":["Technical - AI"]},"AML.M0004":{"id":"AML.M0004","name":"Restrict Number of AI Model Queries","description":"Limit the total number and rate of queries a user can perform.","categories":["Technical - Cyber"]},"AML.M0005":{"id":"AML.M0005","name":"Control Access to AI Models and Data at Rest","description":"Establish access controls on internal model registries and limit internal access to production models. Limit access to training data only to approved users.","categories":["Policy"]},"AML.M0006":{"id":"AML.M0006","name":"Use Ensemble Methods","description":"Use an ensemble of models for inference to increase robustness to adversarial inputs. Some attacks may effectively evade one model or model family but be ineffective against others.","categories":["Technical - AI"]},"AML.M0007":{"id":"AML.M0007","name":"Sanitize Training Data","description":"Detect and remove or remediate poisoned training data.  Training data should be sanitized prior to model training and recurrently for an active learning model.\n\nImplement a filter to limit ingested training data.  Establish a content policy that would remove unwanted content such as certain explicit or offensive language from being used.","categories":["Technical - AI"]},"AML.M0008":{"id":"AML.M0008","name":"Validate AI Model","description":"Validate that AI models perform as intended by testing for backdoor triggers, potential for data leakage, or adversarial influence.\nMonitor AI model for concept drift and training data drift, which may indicate data tampering and poisoning.","categories":["Technical - AI"]},"AML.M0009":{"id":"AML.M0009","name":"Use Multi-Modal Sensors","description":"Incorporate multiple sensors to integrate varying perspectives and modalities to avoid a single point of failure susceptible to physical attacks.","categories":["Technical - Cyber"]},"AML.M0010":{"id":"AML.M0010","name":"Input Restoration","description":"Preprocess all inference data to nullify or reverse potential adversarial perturbations.","categories":["Technical - AI"]},"AML.M0011":{"id":"AML.M0011","name":"Restrict Library Loading","description":"Prevent abuse of library loading mechanisms in the operating system and software to load untrusted code by configuring appropriate library loading mechanisms and investigating potential vulnerable software.\n\nFile formats such as pickle files that are commonly used to store AI models can contain exploits that allow for loading of malicious libraries.","categories":["Technical - Cyber"]},"AML.M0012":{"id":"AML.M0012","name":"Encrypt Sensitive Information","description":"Encrypt sensitive data such as AI models to protect against adversaries attempting to access sensitive data.","categories":["Technical - Cyber"]},"AML.M0013":{"id":"AML.M0013","name":"Code Signing","description":"Enforce binary and application integrity with digital signature verification to prevent untrusted code from executing. Adversaries can embed malicious code in AI software or models. Developers should also cryptographically sign SBOM and AIBOM components that track model or data provenance. Enforcement of code signing can prevent the compromise of the AI supply chain and prevent execution of malicious code.","categories":["Technical - Cyber"]},"AML.M0014":{"id":"AML.M0014","name":"Verify AI Artifacts","description":"Verify the cryptographic checksum of all AI artifacts to verify that the file was not modified by an attacker.","categories":["Technical - Cyber"]},"AML.M0015":{"id":"AML.M0015","name":"Adversarial Input Detection","description":"Detect and block adversarial inputs or atypical queries that deviate from known benign behavior, exhibit behavior patterns observed in previous attacks or that come from potentially malicious IPs.\nIncorporate adversarial detection algorithms into the AI system prior to the AI model.","categories":["Technical - AI"]},"AML.M0016":{"id":"AML.M0016","name":"Vulnerability Scanning","description":"Vulnerability scanning is used to find potentially exploitable software vulnerabilities to remediate them.\n\nFile formats such as pickle files that are commonly used to store AI models can contain exploits that allow for arbitrary code execution.\nThese files should be scanned for potentially unsafe calls, which could be used to execute code, create new processes, or establish networking capabilities.\nAdversaries may embed malicious code in model corrupt model files, so scanners should be capable of working with models that cannot be fully de-serialized.\nModel artifacts, downstream products produced by models, and external software dependencies should be scanned for known vulnerabilities.","categories":["Technical - Cyber"]},"AML.M0017":{"id":"AML.M0017","name":"AI Model Distribution Methods","description":"Deploying AI models to edge devices can increase the attack surface of the system.\nConsider serving models in the cloud to reduce the level of access the adversary has to the model.\nAlso consider computing features in the cloud to prevent gray-box attacks, where an adversary has access to the model preprocessing methods.","categories":["Policy"]},"AML.M0018":{"id":"AML.M0018","name":"User Training","description":"Educate AI model developers to on AI supply chain risks and potentially malicious AI artifacts.\nEducate users on how to identify deepfakes and phishing attempts.","categories":["Policy"]},"AML.M0019":{"id":"AML.M0019","name":"Control Access to AI Models and Data in Production","description":"Require users to verify their identities before accessing a production model.\nRequire authentication for API endpoints and monitor production model queries to ensure compliance with usage policies and to prevent model misuse.","categories":["Policy"]},"AML.M0020":{"id":"AML.M0020","name":"Generative AI Guardrails","description":"Guardrails are safety controls that are placed between a generative AI model and the output shared with the user to prevent undesired inputs and outputs.\nGuardrails can take the form of validators such as filters, rule-based logic, or regular expressions, as well as AI-based approaches, such as classifiers and utilizing LLMs, or named entity recognition (NER) to evaluate the safety of the prompt or response. Domain specific methods can be employed to reduce risks in a variety of areas such as etiquette, brand damage, jailbreaking, false information, code exploits, SQL injections, and data leakage.","categories":["Technical - AI"]},"AML.M0021":{"id":"AML.M0021","name":"Generative AI Guidelines","description":"Guidelines are safety controls that are placed between user-provided input and a generative AI model to help direct the model to produce desired outputs and prevent undesired outputs.\n\nGuidelines can be implemented as instructions appended to all user prompts or as part of the instructions in the system prompt. They can define the goal(s), role, and voice of the system, as well as outline safety and security parameters.","categories":["Technical - AI"]},"AML.M0022":{"id":"AML.M0022","name":"Generative AI Model Alignment","description":"When training or fine-tuning a generative AI model it is important to utilize techniques that improve model alignment with safety, security, and content policies.\n\nThe fine-tuning process can potentially remove built-in safety mechanisms in a generative AI model, but utilizing techniques such as Supervised Fine-Tuning, Reinforcement Learning from Human Feedback or AI Feedback, and Targeted Safety Context Distillation can improve the safety and alignment of the model.","categories":["Technical - AI"]},"AML.M0023":{"id":"AML.M0023","name":"AI Bill of Materials","description":"An AI Bill of Materials (AI BOM) contains a full listing of artifacts and resources that were used in building the AI. The AI BOM can help mitigate supply chain risks and enable rapid response to reported vulnerabilities.\n\nThis can include maintaining dataset provenance, i.e. a detailed history of datasets used for AI applications. The history can include information about the dataset source as well as well as a complete record of any modifications.","categories":["Policy"]},"AML.M0024":{"id":"AML.M0024","name":"AI Telemetry Logging","description":"Implement logging of inputs and outputs of deployed AI models. When deploying AI agents, implement logging of the intermediate steps of agentic actions and decisions, data access and tool use, installation commands, and identity of the agent. Monitoring logs can help to detect security threats and mitigate impacts.\n\nAdditionally, having logging enabled can discourage adversaries who want to remain undetected from utilizing AI resources.","categories":["Technical - Cyber"]},"AML.M0025":{"id":"AML.M0025","name":"Maintain AI Dataset Provenance","description":"Maintain a detailed history of datasets used for AI applications. The history should include information about the dataset's source as well as a complete record of any modifications.","categories":["Technical - AI"]},"AML.M0026":{"id":"AML.M0026","name":"Privileged AI Agent Permissions Configuration","description":"AI agents may be granted elevated privileges above that of a normal user to enable desired workflows. When deploying a privileged AI agent, or an agent that interacts with multiple users, it is important to implement robust policies and controls on permissions of the privileged agent. These controls include Role-Based Access Controls (RBAC), Attribute-Based Access Controls (ABAC), and the principle of least privilege so that the agent is only granted the necessary permissions to access tools and resources required to accomplish its designated task(s).","categories":["Technical - Cyber"]},"AML.M0027":{"id":"AML.M0027","name":"Single-User AI Agent Permissions Configuration","description":"When deploying an AI agent that acts as a representative of a user and performs actions on their behalf, it is important to implement robust policies and controls on permissions and lifecycle management of the agent. Lifecycle management involves establishing identity, protocols for access management, and decommissioning of the agent when its role is no longer needed. Controls should also include the principle of least privilege and delegated access from the user account. When acting as a representative of a user, the AI agent should not be granted permissions that the user would not be granted within the system or organization.","categories":["Technical - Cyber"]},"AML.M0028":{"id":"AML.M0028","name":"AI Agent Tools Permissions Configuration","description":"When deploying tools that will be shared across multiple AI agents, it is important to implement robust policies and controls on permissions for the tools. These controls include applying the principle of least privilege along with delegated access, where the tools receive the permissions, identities, and restrictions of the AI agent calling them. These configurations may be implemented either in MCP servers which connect the agents to the tools calling them or, in more complex cases, directly in the configuration files of the tool.","categories":["Technical - Cyber"]},"AML.M0029":{"id":"AML.M0029","name":"Human In-the-Loop for AI Agent Actions","description":"Systems should require the user or another human stakeholder to approve AI agent actions before the agent takes them. The human approver may be technical staff or business unit SMEs depending on the use case. Separate tools, such as dedicated audit agents, may assist human approval, but final adjudication should be conducted by a human decision-maker. \n\nThe security benefits from Human In-the-Loop policies may be at odds with operational overhead costs of additional approvals. To ease this, Human In-the-Loop policies should follow the degree of consequence of the task at hand. Minor, repetitive tasks performed by agents accessing basic tools may only require minimal human oversight, while agents employed in systems with significant consequences may necessitate approval from multiple stakeholders diversified across multiple organizations.","categories":["Technical - AI"]},"AML.M0030":{"id":"AML.M0030","name":"Restrict AI Agent Tool Invocation on Untrusted Data","description":"Untrusted data can contain prompt injections that invoke an AI agent's tools, potentially causing confidentiality, integrity or availability violations. It is recommended that tool invocation be restricted or limited when untrusted data enters the LLM's context.\n\nThe degree to which tool invocation is restricted may depend on the potential consequences of the action. Consider blocking the automatic invocation of tools or requiring user confirmation once untrusted data enters the LLM's context. For high consequence actions, consider always requiring user confirmation.","categories":["Technical - AI"]},"AML.M0031":{"id":"AML.M0031","name":"Memory Hardening","description":"Memory Hardening involves developing trust boundaries and secure processes for how an AI agent stores and accesses memory and context. This may be implemented using a combination of strategies including restricting an agent's ability to store memories by requiring external authentication and validation for memory updates, performing semantic integrity checks on retrieved memories before agents execute actions, and implementing controls for monitoring of memory and remediation processes for poisoned memory.","categories":["Technical - AI"]},"AML.M0032":{"id":"AML.M0032","name":"Segmentation of AI Agent Components","description":"Define security boundaries around agentic tools and data sources with methods such as API access, container isolation, code execution sandboxing, and rate limiting of tool invocation. When sandboxing, limit resource and network access and build the container or virtual machine from a clean base image before each run. This restricts untrusted processes or potential compromises from spreading throughout the system.","categories":["Technical - Cyber"]},"AML.M0033":{"id":"AML.M0033","name":"Input and Output Validation for AI Agent Components","description":"Implement validation on inputs and outputs for the tools and data sources used by AI agents. Validation includes enforcing a common data format, schema validation, checks for sensitive or prohibited information leakage, and data sanitization to remove potential injections or unsafe code. Input and output validation can help prevent compromises from spreading in AI-enabled systems and can help secure the workflow when multiple components are chained together. Validation should be performed external to the AI agent.","categories":["Technical - AI"]},"AML.M0034":{"id":"AML.M0034","name":"Deepfake Detection","description":"Apply deepfake detection algorithms against any untrusted or user-provided data, especially in impactful applications such as biometric verification, to block generated content.\n\nDetectors may use a combination of approaches, including:\n- AI models trained to differentiate between real and deepfake content.\n- Identifying common inconsistencies in deepfake content, such as unnatural facial movements, audio mismatches, or pixel-level artifacts.\n- Biometrics analysis, such blinking, eye movements, and microexpressions.","categories":["Technical - AI"]}},"tech_mitigations":{"AML.T0000":["AML.M0000"],"AML.T0002":["AML.M0000"],"AML.T0003":["AML.M0000"],"AML.T0004":["AML.M0000"],"AML.T0005":["AML.M0000","AML.M0001","AML.M0002","AML.M0004","AML.M0019"],"AML.T0005.000":["AML.M0000","AML.M0001"],"AML.T0005.002":["AML.M0000"],"AML.T0002.000":["AML.M0001"],"AML.T0002.001":["AML.M0001","AML.M0014"],"AML.T0020":["AML.M0001","AML.M0005","AML.M0007","AML.M0008","AML.M0023","AML.M0025"],"AML.T0035":["AML.M0001","AML.M0005","AML.M0012","AML.M0017"],"AML.T0005.001":["AML.M0002","AML.M0004","AML.M0024"],"AML.T0013":["AML.M0002","AML.M0004"],"AML.T0014":["AML.M0002","AML.M0004","AML.M0006"],"AML.T0024.000":["AML.M0002","AML.M0004","AML.M0024"],"AML.T0024.001":["AML.M0002","AML.M0004","AML.M0024"],"AML.T0024.002":["AML.M0002","AML.M0004","AML.M0024"],"AML.T0042":["AML.M0002","AML.M0004","AML.M0005","AML.M0019"],"AML.T0043":["AML.M0002","AML.M0003","AML.M0004","AML.M0006","AML.M0008","AML.M0010","AML.M0015","AML.M0019"],"AML.T0043.001":["AML.M0002","AML.M0003","AML.M0004","AML.M0006","AML.M0010","AML.M0015","AML.M0019"],"AML.T0063":["AML.M0002","AML.M0012","AML.M0017","AML.M0019"],"AML.T0015":["AML.M0003","AML.M0006","AML.M0009","AML.M0010","AML.M0015","AML.M0034"],"AML.T0031":["AML.M0003","AML.M0006","AML.M0010","AML.M0015"],"AML.T0043.000":["AML.M0003","AML.M0005","AML.M0006","AML.M0010","AML.M0015","AML.M0017"],"AML.T0043.002":["AML.M0003","AML.M0006","AML.M0010","AML.M0015"],"AML.T0043.003":["AML.M0003","AML.M0004","AML.M0006","AML.M0010","AML.M0015"],"AML.T0043.004":["AML.M0003","AML.M0006","AML.M0008","AML.M0010","AML.M0015"],"AML.T0024":["AML.M0004","AML.M0019","AML.M0024"],"AML.T0029":["AML.M0004","AML.M0015","AML.M0019"],"AML.T0034":["AML.M0004","AML.M0019"],"AML.T0046":["AML.M0004","AML.M0019"],"AML.T0062":["AML.M0004","AML.M0020","AML.M0021","AML.M0022"],"AML.T0007":["AML.M0005","AML.M0012"],"AML.T0010.002":["AML.M0005","AML.M0007","AML.M0014","AML.M0025"],"AML.T0010.003":["AML.M0005","AML.M0006","AML.M0008","AML.M0013","AML.M0017"],"AML.T0018":["AML.M0005","AML.M0008","AML.M0013"],"AML.T0018.000":["AML.M0005","AML.M0007","AML.M0008","AML.M0013","AML.M0025"],"AML.T0018.001":["AML.M0005","AML.M0008","AML.M0013"],"AML.T0025":["AML.M0005"],"AML.T0044":["AML.M0005","AML.M0017"],"AML.T0048.004":["AML.M0005","AML.M0012","AML.M0017"],"AML.T0010.001":["AML.M0006","AML.M0013"],"AML.T0059":["AML.M0007","AML.M0025"],"AML.T0057":["AML.M0008","AML.M0020","AML.M0021","AML.M0022"],"AML.T0041":["AML.M0009"],"AML.T0088":["AML.M0009","AML.M0034"],"AML.T0011":["AML.M0011","AML.M0014","AML.M0016","AML.M0018","AML.M0023"],"AML.T0011.000":["AML.M0011","AML.M0013","AML.M0014","AML.M0016","AML.M0018","AML.M0023"],"AML.T0011.001":["AML.M0011","AML.M0013","AML.M0016","AML.M0018","AML.M0023"],"AML.T0018.002":["AML.M0013"],"AML.T0010":["AML.M0014","AML.M0020","AML.M0023"],"AML.T0019":["AML.M0014","AML.M0023","AML.M0025"],"AML.T0052":["AML.M0018","AML.M0034"],"AML.T0052.000":["AML.M0018","AML.M0034"],"AML.T0052.001":["AML.M0018","AML.M0034"],"AML.T0040":["AML.M0019","AML.M0024"],"AML.T0051":["AML.M0019","AML.M0020","AML.M0021","AML.M0022","AML.M0024","AML.M0033"],"AML.T0053":["AML.M0020","AML.M0021","AML.M0022","AML.M0024","AML.M0026","AML.M0027","AML.M0028","AML.M0029","AML.M0030","AML.M0032","AML.M0033"],"AML.T0054":["AML.M0020","AML.M0021","AML.M0022"],"AML.T0056":["AML.M0020","AML.M0021","AML.M0022"],"AML.T0061":["AML.M0020","AML.M0021","AML.M0022"],"AML.T0058":["AML.M0023"],"AML.T0047":["AML.M0024"],"AML.T0051.000":["AML.M0024","AML.M0033"],"AML.T0051.001":["AML.M0024","AML.M0033"],"AML.T0051.002":["AML.M0024","AML.M0033"],"AML.T0085":["AML.M0024","AML.M0026","AML.M0027","AML.M0028","AML.M0032"],"AML.T0085.000":["AML.M0024","AML.M0026","AML.M0027","AML.M0032"],"AML.T0085.001":["AML.M0024","AML.M0026","AML.M0027","AML.M0028","AML.M0032"],"AML.T0086":["AML.M0024","AML.M0026","AML.M0027","AML.M0028","AML.M0029","AML.M0030","AML.M0032","AML.M0033"],"AML.T0101":["AML.M0024","AML.M0026","AML.M0027","AML.M0028","AML.M0029","AML.M0030"],"AML.T0082":["AML.M0026","AML.M0027"],"AML.T0080":["AML.M0031"],"AML.T0080.000":["AML.M0031"],"AML.T0098":["AML.M0032"]},"threats":[{"id":"AML.T0000","source":"MITRE ATLAS","kind":"technique","name":"Search Open Technical Databases","description":"Adversaries may search for publicly available research and technical documentation to learn how and where AI is used within a victim organization.\nThe adversary can use this information to identify targets for attack, or to tailor an existing attack to make it more effective.\nOrganizations often use open source model architectures trained on additional proprietary data in production.\nKnowledge of this underlying architecture allows the adversary to craft more realistic proxy models (Create Proxy AI Model).\nAn adversary can search these resources for publications for authors employed at the victim organization.\n\nResearch and technical materials may exist as academic papers published in Journals and Conference Proceedings, or stored in Pre-Print Repositories, as well as Technical Blogs.","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":"T1596","references":[],"related_cases":["AML.CS0001","AML.CS0003","AML.CS0005","AML.CS0007","AML.CS0010","AML.CS0011","AML.CS0012","AML.CS0048"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0000.000","source":"MITRE ATLAS","kind":"technique","name":"Journals and Conference Proceedings","description":"Many of the publications accepted at premier artificial intelligence conferences and journals come from commercial labs.\nSome journals and conferences are open access, others may require paying for access or a membership.\nThese publications will often describe in detail all aspects of a particular approach for reproducibility.\nThis information can be used by adversaries to implement the paper.","maturity":"Feasible","tactics":[],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0000.001","source":"MITRE ATLAS","kind":"technique","name":"Pre-Print Repositories","description":"Pre-Print repositories, such as arXiv, contain the latest academic research papers that haven't been peer reviewed.\nThey may contain research notes, or technical reports that aren't typically published in journals or conference proceedings.\nPre-print repositories also serve as a central location to share papers that have been accepted to journals.\nSearching pre-print repositories  provide adversaries with a relatively up-to-date view of what researchers in the victim organization are working on.","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0000"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0000.002","source":"MITRE ATLAS","kind":"technique","name":"Technical Blogs","description":"Research labs at academic institutions and company R&D divisions often have blogs that highlight their use of artificial intelligence and its application to the organization's unique problems.\nIndividual researchers also frequently document their work in blogposts.\nAn adversary may search for posts made by the target victim organization or its employees.\nIn comparison to Journals and Conference Proceedings and Pre-Print Repositories this material will often contain more practical aspects of the AI system.\nThis could include underlying technologies and frameworks used, and possibly some information about the API access and use case.\nThis will help the adversary better understand how that organization is using AI internally and the details of their approach that could aid in tailoring an attack.","maturity":"Feasible","tactics":[],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0001","source":"MITRE ATLAS","kind":"technique","name":"Search Open AI Vulnerability Analysis","description":"Much like the Search Open Technical Databases, there is often ample research available on the vulnerabilities of common AI models. Once a target has been identified, an adversary will likely try to identify any pre-existing work that has been done for this class of models.\nThis will include not only reading academic papers that may identify the particulars of a successful attack, but also identifying pre-existing implementations of those attacks. The adversary may obtain Adversarial AI Attack Implementations or develop their own Adversarial AI Attacks if necessary.","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0014","AML.CS0016"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0002","source":"MITRE ATLAS","kind":"technique","name":"Acquire Public AI Artifacts","description":"Adversaries may search public sources, including cloud storage, public-facing services, and software or data repositories, to identify AI artifacts.\nThese AI artifacts may include the software stack used to train and deploy models, training and testing data, model configurations and parameters.\nAn adversary will be particularly interested in artifacts hosted by or associated with the victim organization as they may represent what that organization uses in a production environment.\nAdversaries may identify artifact repositories via other resources associated with the victim organization (e.g. Search Victim-Owned Websites or Search Open Technical Databases).\nThese AI artifacts often provide adversaries with details of the AI task and approach.\n\nAI artifacts can aid in an adversary's ability to Create Proxy AI Model.\nIf these artifacts include pieces of the actual model in production, they can be used to directly Craft Adversarial Data.\nAcquiring some artifacts requires registration (providing user details such email/name), AWS keys, or written requests, and may require the adversary to Establish Accounts.\n\nArtifacts might be hosted on victim-controlled infrastructure, providing the victim with some information on who has accessed that data.","maturity":"Realized","tactics":["Resource Development"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0001","AML.CS0006","AML.CS0011"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0002.000","source":"MITRE ATLAS","kind":"technique","name":"Datasets","description":"Adversaries may collect public datasets to use in their operations.\nDatasets used by the victim organization or datasets that are representative of the data used by the victim organization may be valuable to adversaries.\nDatasets can be stored in cloud storage, or on victim-owned websites.\nSome datasets require the adversary to Establish Accounts for access.\n\nAcquired datasets help the adversary advance their operations, stage attacks,  and tailor attacks to the victim organization.","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0000","AML.CS0005","AML.CS0007","AML.CS0012","AML.CS0014","AML.CS0025"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0002.001","source":"MITRE ATLAS","kind":"technique","name":"Models","description":"Adversaries may acquire public models to use in their operations.\nAdversaries may seek models used by the victim organization or models that are representative of those used by the victim organization.\nRepresentative models may include model architectures, or pre-trained models which define the architecture as well as model parameters from training on a dataset.\nThe adversary may search public sources for common model architecture configuration file formats such as YAML or Python configuration files, and common model storage file formats such as ONNX (.onnx), HDF5 (.h5), Pickle (.pkl), PyTorch (.pth), or TensorFlow (.pb, .tflite).\n\nAcquired models are useful in advancing the adversary's operations and are frequently used to tailor attacks to the victim model.","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0005","AML.CS0007","AML.CS0013","AML.CS0019"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0002.002","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Configuration","description":"Adversaries may acquire publicly accessible AI agent configuration files to understand agent capabilities, gain unauthorized access to tools and data sources, or identify credentials for further attacks. Configuration files define what tools an agent can use, credentials for external services, system prompts, and behavioral settings, making valuable resources for adversaries targeting AI agent deployments.\n\nOnce configuration files are acquired, adversaries may perform Discover AI Agent Configuration to gain additional insights they can use in their operation or Credentials from AI Agent Configuration to harvest secrets.\n\nAI agent configuration files come in multiple forms depending on the platform and agent framework. Agent configuration files adversaries may target include:\n- System prompts: Files containing agent instructions, behavioral guidelines, and internal logic.\n- Tool configuration: Files defining tools the agent can utilize, including Model Context Protocol (MCP) configs (e.g., `mcp.json`, `claude_desktop_config.json`), IDE-specific configs (e.g., `.claude/settings.json`, `.vscode/tasks.json`), and framework-specific settings that define external tool and data source integrations.\n- Skills and workflows: Files defining agent capabilities, behaviors, or workflows. Often a combination of instructions, scripts, and resources.\n- Environment and deployment configs: Files that control agent deployment and runtime behavior, often environment variables or framework-specific configs.","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0003","source":"MITRE ATLAS","kind":"technique","name":"Search Victim-Owned Websites","description":"Adversaries may search websites owned by the victim for information that can be used during targeting.\nVictim-owned websites may contain technical details about their AI-enabled products or services.\nVictim-owned websites may contain a variety of details, including names of departments/divisions, physical locations, and data about key employees such as names, roles, and contact info.\nThese sites may also have details highlighting business operations and relationships.\n\nAdversaries may search victim-owned websites to gather actionable information.\nThis information may help adversaries tailor their attacks (e.g. Adversarial AI Attacks or Manual Modification).\nInformation from these sources may reveal opportunities for other forms of reconnaissance (e.g. Search Open Technical Databases or Search Open AI Vulnerability Analysis)","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":"T1594","references":[],"related_cases":["AML.CS0014","AML.CS0039"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0004","source":"MITRE ATLAS","kind":"technique","name":"Search Application Repositories","description":"Adversaries may search open application repositories during targeting.\nExamples of these include Google Play, the iOS App store, the macOS App Store, and the Microsoft Store.\n\nAdversaries may craft search queries seeking applications that contain AI-enabled components.\nFrequently, the next step is to Acquire Public AI Artifacts.","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0013","AML.CS0028","AML.CS0052"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0005","source":"MITRE ATLAS","kind":"technique","name":"Create Proxy AI Model","description":"Adversaries may obtain models to serve as proxies for the target model in use at the victim organization.\nProxy models are used to simulate complete access to the target model in a fully offline manner.\n\nAdversaries may train models from representative datasets, attempt to replicate models from victim inference APIs, or use available pre-trained models.","maturity":"Demonstrated","tactics":["AI Attack Staging"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0000","AML.CS0012","AML.CS0014"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0005.000","source":"MITRE ATLAS","kind":"technique","name":"Train Proxy via Gathered AI Artifacts","description":"Proxy models may be trained from AI artifacts (such as data, model architectures, and pre-trained models) that are representative of the target model gathered by the adversary.\nThis can be used to develop attacks that require higher levels of access than the adversary has available or as a means to validate pre-existing attacks without interacting with the target model.","maturity":"Demonstrated","tactics":["AI Attack Staging"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0007"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0005.001","source":"MITRE ATLAS","kind":"technique","name":"Train Proxy via Replication","description":"Adversaries may replicate a private model.\nBy repeatedly querying the victim's AI Model Inference API Access, the adversary can collect the target model's inferences into a dataset.\nThe inferences are used as labels for training a separate model offline that will mimic the behavior and performance of the target model.\n\nA replicated model that closely mimic's the target model is a valuable resource in staging the attack.\nThe adversary can use the replicated model to Craft Adversarial Data for various purposes (e.g. Evade AI Model, Spamming AI System with Chaff Data).","maturity":"Demonstrated","tactics":["AI Attack Staging"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0005","AML.CS0008"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0005.002","source":"MITRE ATLAS","kind":"technique","name":"Use Pre-Trained Model","description":"Adversaries may use an off-the-shelf pre-trained model as a proxy for the victim model to aid in staging the attack.","maturity":"Feasible","tactics":[],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0006","source":"MITRE ATLAS","kind":"technique","name":"Active Scanning","description":"An adversary may probe or scan the victim system to gather information for targeting. This is distinct from other reconnaissance techniques that do not involve direct interaction with the victim system.\n\nAdversaries may scan for open ports on a potential victim's network, which can indicate specific services or tools the victim is utilizing. This could include a scan for tools related to AI DevOps or AI services themselves such as public AI chat agents (ex: Copilot Studio Hunter). They can also send emails to organization service addresses and inspect the replies for indicators that an AI agent is managing the inbox.\n\nInformation gained from Active Scanning may yield targets that provide opportunities for other forms of reconnaissance such as Search Open Technical Databases, Search Open AI Vulnerability Analysis, or Gather RAG-Indexed Targets.","maturity":"Realized","tactics":["Reconnaissance"],"platforms":["Predictive AI","Generative AI","Agentic AI","Enterprise"],"attack_reference":"T1595","references":[],"related_cases":["AML.CS0023","AML.CS0037"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0007","source":"MITRE ATLAS","kind":"technique","name":"Discover AI Artifacts","description":"Adversaries may search private sources to identify AI learning artifacts that exist on the system and gather information about them.\nThese artifacts can include the software stack used to train and deploy models, training and testing data management systems, container registries, software repositories, and model zoos.\n\nThis information can be used to identify targets for further collection, exfiltration, or disruption, and to tailor and improve attacks.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0027","AML.CS0028"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0008","source":"MITRE ATLAS","kind":"technique","name":"Acquire Infrastructure","description":"Adversaries may buy, lease, or rent infrastructure for use throughout their operation.\nA wide variety of infrastructure exists for hosting and orchestrating adversary operations.\nInfrastructure solutions include physical or cloud servers, domains, mobile devices, and third-party web services.\nFree resources may also be used, but they are typically limited.\nInfrastructure can also include physical components such as countermeasures that degrade or disrupt AI components or sensors, including printed materials, wearables, or disguises.\n\nUse of these infrastructure solutions allows an adversary to stage, launch, and execute an operation.\nSolutions may help adversary operations blend in with traffic that is seen as normal, such as contact to third-party web services.\nDepending on the implementation, adversaries may use infrastructure that makes it difficult to physically tie back to them as well as utilize infrastructure that can be rapidly provisioned, modified, and shut down.","maturity":"Realized","tactics":["Resource Development"],"platforms":["Enterprise"],"attack_reference":"T1583","references":[],"related_cases":["AML.CS0029","AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0008.000","source":"MITRE ATLAS","kind":"technique","name":"AI Development Workspaces","description":"Developing and staging AI attacks often requires expensive compute resources.\nAdversaries may need access to one or many GPUs in order to develop an attack.\nThey may try to anonymously use free resources such as Google Colaboratory, or cloud resources such as AWS, Azure, or Google Cloud as an efficient way to stand up temporary resources to conduct operations.\nMultiple workspaces may be used to avoid detection.","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0007"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0008.001","source":"MITRE ATLAS","kind":"technique","name":"Consumer Hardware","description":"Adversaries may acquire consumer hardware to conduct their attacks.\nOwning the hardware provides the adversary with complete control of the environment. These devices can be hard to trace.","maturity":"Realized","tactics":["Resource Development"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0004"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0008.002","source":"MITRE ATLAS","kind":"technique","name":"Domains","description":"Adversaries may acquire domains that can be used during targeting. Domain names are the human readable names used to represent one or more IP addresses. They can be purchased or, in some cases, acquired for free.\n\nAdversaries may use acquired domains for a variety of purposes (see ATT&CK). Large AI datasets are often distributed as a list of URLs to individual datapoints. Adversaries may acquire expired domains that are included in these datasets and replace individual datapoints with poisoned examples (Publish Poisoned Datasets).","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Enterprise"],"attack_reference":"T1583.001","references":[],"related_cases":["AML.CS0025","AML.CS0049"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0008.003","source":"MITRE ATLAS","kind":"technique","name":"Physical Countermeasures","description":"Adversaries may acquire or manufacture physical countermeasures to aid or support their attack.\n\nThese components may be used to disrupt or degrade the model, such as adversarial patterns printed on stickers or T-shirts, disguises, or decoys. They may also be used to disrupt or degrade the sensors used in capturing data, such as laser pointers, light bulbs, or other tools.","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0012"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0008.004","source":"MITRE ATLAS","kind":"technique","name":"Serverless","description":"Adversaries may purchase and configure serverless cloud infrastructure, such as Cloudflare Workers, AWS Lambda functions, or Google Apps Scripts, that can be used during targeting. By utilizing serverless infrastructure, adversaries can make it more difficult to attribute infrastructure used during operations back to them.\n\nOnce acquired, the serverless runtime environment can be leveraged to either respond directly to infected machines or to Proxy traffic to an adversary-owned command and control server. As traffic generated by these functions will appear to come from subdomains of common cloud providers, it may be difficult to distinguish from ordinary traffic to these providers. This can be used to bypass a Content Security Policy which prevent retrieving content from arbitrary locations.","maturity":"Feasible","tactics":[],"platforms":["Enterprise"],"attack_reference":"T1583.007","references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0008.005","source":"MITRE ATLAS","kind":"technique","name":"AI Service Proxies","description":"Adversaries may utilize commercial proxy services that resell access to AI services such as frontier model APIs.\n\nThis infrastructure can be used to conduct large-scale campaigns to perform Exfiltration via AI Inference API via distillation. Adversaries may also use this infrastructure to Generate Malicious Commands for offensive cyber operations, or to generate content for Spearphishing via Social Engineering LLM.\n\nCommercial AI service proxies distribute traffic from different accounts and various cloud platforms. The mix of traffic can make malicious activity difficult to detect and block .\n\nMalicious actors conduct LLM Jacking attacks to gain access to victim accounts which they resell access to in their proxy se
