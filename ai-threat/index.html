upply Chain","description":"Third-party models, datasets, packages, plugins, and MCP tools introduce vulnerable or malicious components into the AI stack.","maturity":"Realized","rank":3,"tactics":[],"platforms":["Generative AI","Agentic AI"],"references":[{"title":"OWASP Top 10 for LLM Applications (2025)","url":"https://genai.owasp.org/llm-top-10/"}]},{"id":"OWASP-LLM04","source":"OWASP GenAI","kind":"risk","name":"LLM04: Data and Model Poisoning","description":"Manipulated training, fine-tuning, or embedding data introduces backdoors, bias, or degraded behavior that may only activate under specific triggers.","maturity":"Realized","rank":4,"tactics":[],"platforms":["Generative AI","Agentic AI"],"references":[{"title":"OWASP Top 10 for LLM Applications (2025)","url":"https://genai.owasp.org/llm-top-10/"}]},{"id":"OWASP-LLM05","source":"OWASP GenAI","kind":"risk","name":"LLM05: Improper Output Handling","description":"Downstream systems trust model output without validation, enabling code execution, XSS, SQL injection, or SSRF from generated content.","maturity":"Realized","rank":5,"tactics":[],"platforms":["Generative AI","Agentic AI"],"references":[{"title":"OWASP Top 10 for LLM Applications (2025)","url":"https://genai.owasp.org/llm-top-10/"}]},{"id":"OWASP-LLM06","source":"OWASP GenAI","kind":"risk","name":"LLM06: Excessive Agency","description":"Agents are granted excessive permissions, autonomy, or tool access, so a compromised or manipulated agent can take damaging real-world actions.","maturity":"Realized","rank":6,"tactics":[],"platforms":["Generative AI","Agentic AI"],"references":[{"title":"OWASP Top 10 for LLM Applications (2025)","url":"https://genai.owasp.org/llm-top-10/"}]},{"id":"OWASP-LLM07","source":"OWASP GenAI","kind":"risk","name":"LLM07: System Prompt Leakage","description":"System instructions, intended to stay hidden, are extracted and reveal logic, guardrails, or secrets that aid further attacks.","maturity":"Realized","rank":7,"tactics":[] <script>
/* ===================================================================
   ATLAS Watch — standalone. All logic runs in the browser:
   severity scoring, TF-IDF RAG retrieval, the analyst agent, and an
   optional live pull from MITRE ATLAS. No backend required.
   =================================================================== */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc = s => (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
const toast=(m)=>{const t=$("#toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);};

const HIGH_IMPACT = new Set(["Impact","Exfiltration","Initial Access","Execution",
  "Privilege Escalation","Credential Access","Command and Control"]);
const MAT_BASE = {Realized:64,Demonstrated:44,Feasible:26};
const isRealWorld=t=>t.incident_type==="Incident"||(t.incident_count||0)>0||t.kind==="incident"||t.kind==="vulnerability";
/* Real-world (documented evidence) vs Hypothetical (lab/PoC) vs Reference (framework/taxonomy) */
function realityClass(t){
  if(t.kind==="risk"||t.kind==="risk-class")return "Reference";
  if(isRealWorld(t)||t.maturity==="Realized")return "Real-world";
  return "Hypothetical";
}
/* ---- threat-actor / impacted org / TTP / business-impact model ---- */
const KNOWN_IMPACT={
 "CVE-2023-48022":{financial:"~$1B in exposed compute (Oligo est.)",operational:"AI compute hijack, data & credential theft across clusters"},
 "AML.CS0023":{financial:"~$1B exposed compute (ShadowRay)",operational:"Hijacked AI workloads, data theft"},
 "AML.CS0030":{financial:"~$46K/day per abused model (Sysdig)",operational:"Unauthorized LLM usage resold, runaway cloud cost"},
 "AML.CS0004":{financial:"$77M fraudulent collection",operational:"Facial-recognition bypass, large-scale tax fraud"},
 "AML.CS0017":{financial:"$3.4M fraudulent claims",operational:"Identity-verification bypass, benefits fraud"},
 "AIID-ITUTOR":{financial:"$365K EEOC settlement",operational:"Discriminatory hiring, regulatory/legal liability"},
 "AIID-AIRCANADA":{financial:"Tribunal damages + refund liability",operational:"Customer-facing misinformation, policy liability"},
 "AIID-SAMSUNG":{financial:"Confidential IP exposure (unquantified)",operational:"Source-code leakage, internal tool ban"},
 "AIID-CHEVY":{financial:"Brand / PR cost (unquantified)",operational:"Chatbot abuse, reputational harm"},
 "AIID-DPD":{financial:"Brand / PR cost (unquantified)",operational:"Public reputational harm, bot taken offline"}
};
const FIN_MODEL={Critical:"$1M–$50M+ (modeled)",High:"$100K–$5M (modeled)",Medium:"$10K–$500K (modeled)",Low:"<$50K (modeled)"};
function opImpactFromTactics(tac){
  const m={Impact:"service disruption / degraded operations",Exfiltration:"data loss / IP theft",
   "Credential Access":"account & credential compromise","Initial Access":"unauthorized access / foothold",
   Execution:"unauthorized code execution",Persistence:"durable compromise","Privilege Escalation":"privilege escalation",
   "Command and Control":"remote control of systems","Defense Evasion":"detection evasion"};
  const hits=[...new Set((tac||[]).map(x=>m[x]).filter(Boolean))];
  return hits.length?hits.join("; "):"degraded trust / operational review burden";
}
function impactModel(t){
  const k=KNOWN_IMPACT[t.id]||{};
  const actor=(t.actor&&!["Unknown","Reported"].includes(t.actor))?t.actor:
    (t.kind==="incident"?"Reported (see source)":(t.kind==="vulnerability"?"Opportunistic attackers":"Various adversaries"));
  const org=(t.target&&!/^Various/.test(t.target)&&t.target!=="Multiple systems")?t.target:"Multiple / sector-wide";
  let ttp;
  if(t.kind==="technique")ttp=[t.id,t.attack_reference?("ATT&CK "+t.attack_reference):""].filter(Boolean).join(" · ");
  else if(t.kind==="case-study")ttp=(t.techniques_used||[]).slice(0,8).join(", ")||"(see source)";
  else ttp=(t.tactics||[]).join(", ")||"—";
  return {actor,org,ttp,operational:k.operational||opImpactFromTactics(t.tactics),
    financial:k.financial||FIN_MODEL[t.severity.band]||"—",known:!!k.financial};
}
function dateVal(t){const ts=Date.parse(t.date||t.modified||"");return isNaN(ts)?null:ts;}

/* ---- severity scoring (ports backend store.score_threat) ---- */
function scoreThreat(t){
  const factors=[]; let score;
  const BAND_SCORE={Critical:88,High:72,Medium:52,Low:32};
  if(t.kind==="vulnerability"){
    if(typeof t.cvss==="number"){score=Math.round(t.cvss*10);factors.push(`CVSS ${t.cvss} (NVD)`);}
    else if(t.sevBand){score=BAND_SCORE[t.sevBand]??52;factors.push(`Reported severity '${t.sevBand}'`);}
    else {score=60;factors.push("Catalogued AI/dependency vulnerability");}
    if(t.cve)factors.push(`Tracked as ${t.cve}`);
    const hi=[...new Set((t.tactics||[]).filter(x=>HIGH_IMPACT.has(x)))].sort();
    if(hi.length){score+=Math.min(8,3*hi.length);factors.push(`Enables: ${hi.join(", ")}`);}
  }else if(t.kind==="incident"){
    score=t.base||70; factors.push("Documented real-world AI incident");
    const hi=[...new Set((t.tactics||[]).filter(x=>HIGH_IMPACT.has(x)))].sort();
    if(hi.length){score+=Math.min(12,4*hi.length);factors.push(`Real-world impact: ${hi.join(", ")} (+)`);}
  }else if(t.kind==="risk-class"){
    score=t.base||52; factors.push("AI risk-taxonomy domain (mapping reference)");
  }else if(t.kind==="risk"){
    const rank=t.rank||10; score=92-(rank-1)*4;
    factors.push(`Framework rank #${rank} (production-observed risk)`);
  }else{
    const mat=t.maturity||"Feasible"; score=MAT_BASE[mat]??26;
    factors.push(`Maturity '${mat}' (base ${score})`);
    if(t.kind==="case-study"){
      if(t.incident_type==="Incident"){score+=14;factors.push("Documented real-world incident (+14)");}
      else factors.push("Red-team / research exercise");
    }
    if(t.kind==="technique"){
      const inc=t.incident_count||0;
      if(inc){const b=Math.min(12,4+inc*2);score+=b;factors.push(`Used in ${inc} real-world incident(s) (+${b})`);}
    }
    const hi=[...new Set((t.tactics||[]).filter(x=>HIGH_IMPACT.has(x)))].sort();
    if(hi.length){const b=Math.min(16,5*hi.length);score+=b;
      factors.push(`Enables high-impact tactics: ${hi.join(", ")} (+${b})`);}
    const plats=t.platforms||[];
    if(plats.includes("Agentic AI")){score+=5;factors.push("Affects agentic AI systems (+5)");}
    else if(plats.length>=3){score+=3;factors.push("Broad platform applicability (+3)");}
  }
  score=Math.max(0,Math.min(100,Math.round(score)));
  const band=score>=80?"Critical":score>=60?"High":score>=40?"Medium":"Low";
  return {score,band,factors};
}

/* ---- TF-IDF RAG index (ports backend store) ---- */
const STOP=new Set(("the a an and or of to in for on with is are be by from as at this that it its "+
 "into via may can will their they an we our using use used such other more also if then than when "+
 "which who whom these those has have had not no but").split(" "));
const tokenize=s=>(s.toLowerCase().match(/[a-z0-9]+/g)||[]).filter(w=>!STOP.has(w)&&w.length>2);

let STATE={threats:[],byId:{},mitigations:{},techMit:{},atlasVersion:"",generated:""};
let IDX={idf:{},docs:[]}; // docs: [{w:{term:weight}}]

function docText(t){
  return [t.name,t.name,t.description||"",(t.tactics||[]).join(" "),
    (t.platforms||[]).join(" "),t.actor||"",t.target||"",t.source||"",t.kind||""].join(" ");
}
function buildIndex(){
  const docs=STATE.threats.map(t=>tokenize(docText(t)));
  const df={}; docs.forEach(toks=>{new Set(toks).forEach(w=>df[w]=(df[w]||0)+1);});
  const n=docs.length; IDX.idf={};
  for(const w in df) IDX.idf[w]=Math.log((1+n)/(1+df[w]))+1;
  IDX.docs=docs.map(toks=>{
    const w={}; if(!toks.length)return {w,norm:1};
    const tf={}; toks.forEach(x=>tf[x]=(tf[x]||0)+1);
    const maxf=Math.max(...Object.values(tf));
    let s=0; for(const term in tf){const wt=(0.5+0.5*tf[term]/maxf)*IDX.idf[term];w[term]=wt;s+=wt*wt;}
    const norm=Math.sqrt(s)||1; for(const k in w)w[k]/=norm; return {w,norm};
  });
}
function vectorizeQuery(q){
  const toks=tokenize(q); const w={}; if(!toks.length)return w;
  const tf={}; toks.forEach(x=>tf[x]=(tf[x]||0)+1); const maxf=Math.max(...Object.values(tf));
  let s=0; for(const term in tf){const idf=IDX.idf[term];if(idf==null)continue;
    const wt=(0.5+0.5*tf[term]/maxf)*idf;w[term]=wt;s+=wt*wt;}
  const norm=Math.sqrt(s)||1; for(const k in w)w[k]/=norm; return w;
}
function retrieve(q,k=8,filters={}){
  const qv=vectorizeQuery(q); const qterms=Object.keys(qv);
  const scored=STATE.threats.map((t,i)=>{
    let s=0; const dw=IDX.docs[i].w; for(const term of qterms){const d=dw[term];if(d)s+=qv[term]*d;}
    return {t,s};
  }).filter(o=>match(o.t,filters)).sort((a,b)=>b.s-a.s);
  const out=[];
  for(const o of scored){ if(o.s<=0 && out.length>=k) break;
    out.push({...o.t,relevance:+o.s.toFixed(4)}); if(out.length>=k)break; }
  return out;
}

/* ---- filtering / accessors ---- */
function match(t,f){
  if(f.source&&t.source!==f.source)return false;
  if(f.kind&&t.kind!==f.kind)return false;
  if(f.band&&t.severity.band!==f.band)return false;
  if(f.maturity&&t.maturity!==f.maturity)return false;
  if(f.platform&&!(t.platforms||[]).includes(f.platform))return false;
  if(f.real_world&&!isRealWorld(t))return false;
  if(f.reality&&realityClass(t)!==f.reality)return false;
  if(f.realtop==="real"&&realityClass(t)!=="Real-world")return false;
  if(f.realtop==="others"&&realityClass(t)==="Real-world")return false;
  return true;
}
function listThreats(sort,filters){
  let items=STATE.threats.filter(t=>match(t,filters));
  if(sort==="severity")items.sort((a,b)=>b.severity.score-a.severity.score);
  else if(sort==="name")items.sort((a,b)=>a.name.localeCompare(b.name));
  return items;
}
function getDetail(id){
  const t=STATE.byId[id]; if(!t)return null; const out={...t};
  if(t.kind==="technique"){
    out.mitigations=(STATE.techMit[id]||[]).map(m=>STATE.mitigations[m]).filter(Boolean);
    out.related_case_details=(t.related_cases||[]).filter(c=>STATE.byId[c]).map(c=>({
      id:c,name:STATE.byId[c].name,incident_type:STATE.byId[c].incident_type}));
  }
  if(t.kind==="case-study"){
    out.technique_details=(t.techniques_used||[]).filter(x=>STATE.byId[x]).map(x=>({
      id:x,name:STATE.byId[x].name,severity:STATE.byId[x].severity}));
  }
  return out;
}
function mitigationsFor(ids){
  const seen=new Set(),out=[];
  ids.forEach(id=>(STATE.techMit[id]||[]).forEach(m=>{
    if(!seen.has(m)&&STATE.mitigations[m]){seen.add(m);out.push(STATE.mitigations[m]);}}));
  return out;
}
function stats(){
  const band={},src={},kind={},mat={};
  STATE.threats.forEach(t=>{band[t.severity.band]=(band[t.severity.band]||0)+1;
    src[t.source]=(src[t.source]||0)+1;kind[t.kind]=(kind[t.kind]||0)+1;
    mat[t.maturity||"n/a"]=(mat[t.maturity||"n/a"]||0)+1;});
  const real=STATE.threats.filter(isRealWorld).length;
  return {total:STATE.threats.length,by_band:band,by_source:src,by_kind:kind,
    real_world_threats:real,atlas_version:STATE.atlasVersion};
}

/* ---- analyst agent (deterministic, grounded) ---- */
function analyze(query,k=8){
  const retrieved=retrieve(query,k);
  if(!retrieved.length)return {answer:"No threats in the knowledge base matched that query.",
    retrieved:[],mitigations:[],severity_summary:{}};
  const scores=retrieved.map(t=>t.severity.score), bands=retrieved.map(t=>t.severity.band);
  const ord=["Low","Medium","High","Critical"];
  const summary={max:Math.max(...scores),mean:+(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1),
    top_band:bands.reduce((a,b)=>ord.indexOf(b)>ord.indexOf(a)?b:a,"Low"),
    real_world:retrieved.filter(isRealWorld).length};
  const techIds=retrieved.filter(t=>t.kind==="technique").map(t=>t.id);
  const mitigations=mitigationsFor(techIds);
  const answer=deterministicBrief(retrieved,mitigations,summary);
  return {answer,retrieved,mitigations,severity_summary:summary};
}
function deterministicBrief(retrieved,mitigations,s){
  const top=retrieved[0];
  const realized=retrieved.filter(t=>t.maturity==="Realized"||t.incident_type==="Incident");
  const demo=retrieved.filter(t=>t.maturity==="Demonstrated"&&!realized.includes(t));
  const L=[];
  L.push(`Most relevant to your query is ${top.name} [${top.id}], a `+
    `${top.severity.band.toLowerCase()}-severity ${top.kind.replace("-"," ")} from `+
    `${top.source} (${top.severity.score}/100).`);
  if(realized.length){const names=realized.slice(0,4).map(t=>`${t.name} [${t.id}]`).join(", ");
    L.push(`Realized in the real world: ${names}. These have been observed in actual incidents `+
      `or used by real threat actors, so treat them as active.`);}
  if(demo.length){const names=demo.slice(0,3).map(t=>`${t.name} [${t.id}]`).join(", ");
    L.push(`Demonstrated (red-team / research, not yet seen in the wild): ${names}.`);}
  L.push(`Across the ${retrieved.length} matched threats, peak severity is ${s.max}/100 `+
    `(${s.top_band}) with a mean of ${s.mean}; ${s.real_world} `+
    `${s.real_world===1?"has":"have"} real-world evidence.`);
  if(mitigations.length){const m=mitigations.slice(0,3).map(x=>`${x.name} [${x.id}]`).join("; ");
    L.push(`Recommended defenses: ${m}.`);}
  else L.push("No ATLAS mitigations are directly linked to the matched items; apply input/output "+
    "validation, least-privilege agent permissions, and logging.");
  return L.join(" ");
}

/* =================== data loading & normalization =================== */
function loadSnapshot(data){
  STATE.atlasVersion=data.atlas_version; STATE.generated=data.generated;
  STATE.mitigations=data.mitigations||{}; STATE.techMit=data.tech_mitigations||{};
  const base=(data.threats||[]).slice(); const have=new Set(base.map(t=>t.id));
  extraThreats().forEach(t=>{if(!have.has(t.id)){base.push(t);have.add(t.id);}});
  /* Vulnerabilities/CVEs are excluded — this build tracks incidents (and the
     ATLAS/framework context around them) only. */
  STATE.threats=base.filter(t=>t.kind!=="vulnerability").map(t=>({...t,severity:scoreThreat(t)}));
  STATE.byId={}; STATE.threats.forEach(t=>STATE.byId[t.id]=t);
  buildIndex();
}

async function fetchLatestAtlas(){
  let url=ATLAS_BASE+"/ATLAS.yaml";
  try{
    const man=jsyaml.load(await (await fetch(ATLAS_BASE+"/manifest.yaml",{cache:"no-store"})).text());
    outer: for(const rel of man){
      const vs=(rel.versions||[]).slice().sort((a,b)=>String(b["format-version"]).localeCompare(String(a["format-version"])));
      for(const v of vs){ if(v.path){url=ATLAS_BASE+"/"+v.path; break outer; } }
    }
  }catch(e){/* fall back to ATLAS.yaml */}
  const txt=await (await fetch(url,{cache:"no-store"})).text();
  return jsyaml.load(txt);
}

function normalizeAtlas(atlas){
  const tactics={}, techniques={}, cases={}, mitigations={};
  asRecords(atlas.tactics).forEach(t=>tactics[t.id]=t);
  asRecords(atlas.techniques).forEach(t=>techniques[t.id]=t);
  asRecords(atlas["case-studies"]).forEach(c=>cases[c.id]=c);
  asRecords(atlas.mitigations).forEach(m=>mitigations[m.id]=m);
  const rels=atlas.relationships||{};
  const relVals=Array.isArray(rels)?rels:Object.values(rels);
  const techTactics={}, techCases={}, caseTechs={}, techMit={};
  relVals.forEach(entry=>{
    if(!entry||typeof entry!=="object")return;
    Object.values(entry).forEach(group=>{
      if(!Array.isArray(group))return;
      group.forEach(rel=>{
        const src=rel.source||"", tgt=rel.target||"", tac=rel.tactic, rt=rel["relationship-type"];
        if(tgt.startsWith("AML.T")&&tac&&tactics[tac]){(techTactics[tgt]=techTactics[tgt]||new Set()).add(tactics[tac].name);}
        if(src.startsWith("AML.CS")&&tgt.startsWith("AML.T")){
          (caseTechs[src]=caseTechs[src]||new Set()).add(tgt);
          (techCases[tgt]=techCases[tgt]||new Set()).add(src);}
        if(rt==="mitigates"&&src.startsWith("AML.M")&&tgt.startsWith("AML.T")){(techMit[tgt]=techMit[tgt]||[]).push(src);}
      });
    });
  });
  const threats=[];
  Object.entries(techniques).forEach(([tid,t])=>{
    const tac=[...(techTactics[tid]||[])].sort();
    const related=[...(techCases[tid]||[])].sort();
    const inc=related.filter(c=>cases[c]&&cases[c].type==="Incident").length;
    threats.push({id:tid,source:"MITRE ATLAS",kind:"technique",name:t.name||tid,
      description:cleanMd(t.description||""),maturity:t.maturity||"Feasible",tactics:tac,
      platforms:t.platforms||[],attack_reference:(t["attack-reference"]||{}).id,
      references:refsOf(t),related_cases:related,incident_count:inc});
  });
  Object.entries(cases).forEach(([cid,c])=>{
    const techs=[...(caseTechs[cid]||[])].sort();
    const tac=[...new Set(techs.flatMap(x=>[...(techTactics[x]||[])]))].sort();
    threats.push({id:cid,source:"MITRE ATLAS",kind:"case-study",name:c.name||cid,
      description:cleanMd(c.description||""),incident_type:c.type||"Exercise",
      maturity:c.type==="Incident"?"Realized":"Demonstrated",actor:c.actor||"Unknown",
      target:c.target||"",reporter:c.reporter||"",date:String(c.date||""),tactics:tac,
      techniques_used:techs,references:refsOf(c)});
  });
  owaspThreats().forEach(o=>threats.push(o));
  const mitOut={}; Object.values(mitigations).forEach(m=>mitOut[m.id]={id:m.id,name:m.name||"",
    description:cleanMd(m.description||""),categories:m.categories||[]});
  return {generated:new Date().toISOString(),
    atlas_version:String(atlas.version||(atlas.collection||{}).version||"unknown"),
    mitigations:mitOut,tech_mitigations:techMit,threats};
}

/* GitHub Advisory Database (CORS-enabled api.github.com) — AI-relevant advisories */
async function feedGithubAdvisory(){
  const r=await fetch("https://api.github.com/advisories?per_page=100&sort=published&direction=desc",
    {headers:{"Accept":"application/vnd.github+json"}});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const adv=await r.json();
  const out=[];
  for(const a of adv){
    const pkgs=(a.vulnerabilities||[]).map(v=>v.package&&v.package.name).filter(Boolean).join(" ");
    const blob=(a.summary||"")+" "+(a.description||"")+" "+pkgs;
    if(!aiRelevant(blob))continue;
    out.push({id:a.ghsa_id,source:"OSV / GitHub Advisory",kind:"vulnerability",
      name:(a.summary||a.ghsa_id).slice(0,140),
      description:((a.description||a.summary||"").slice(0,360)).trim(),
      maturity:"Realized",sevBand:bandFromSeverity(a.severity),
      cvss:(a.cvss&&typeof a.cvss.score==="number")?a.cvss.score:undefined,
      cve:(a.cve_id||undefined),date:(a.published_at||"").slice(0,10),
      tactics:["Initial Access"],platforms:["Enterprise","Generative AI","Agentic AI"],
      references:[{title:a.ghsa_id+(a.cve_id?(" / "+a.cve_id):""),url:a.html_url||("https://github.com/advisories/"+a.ghsa_id)}]});
    if(out.length>=40)break;
  }
  return out;
}

/* OSV.dev batch query for known AI packages (CORS-enabled) — counts only */
async function feedOSV(){
  const pkgs=[["langchain","PyPI"],["transformers","PyPI"],["torch","PyPI"],["mlflow","PyPI"],
    ["vllm","PyPI"],["ray","PyPI"],["gradio","PyPI"]];
  const r=await fetch("https://api.osv.dev/v1/querybatch",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({queries:pkgs.map(([n,e])=>({package:{name:n,ecosystem:e}}))})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();

async function runTracker(manual){
  const btn=$("#tkRun"); if(btn){btn.disabled=true;btn.textContent="Running…";}
  if(manual)tkLog("Tracker run started.");
  for(const [name,meta] of Object.entries(SOURCE_META)){
    const rec=TRACK.runs[name]||{};
    if(meta.feed){
      try{
        let res;
        if(meta.feed==="atlas")res=await trackAtlas();
        else if(meta.feed==="osv"){
          let added=0; try{const gh=await feedGithubAdvisory();added=mergeLiveThreats(gh);}catch(e){}
          let osvN=0; try{osvN=(await feedOSV()).count;}catch(e){}
          res={count:STATE.threats.filter(t=>t.source==="OSV / GitHub Advisory").length,note:`+${added} new · OSV ${osvN} vulns`};
        }
        else if(meta.feed==="nvd")res=await feedNVD();
        rec.status="live"; rec.count=res.count; rec.note=res.note||""; rec.when=Date.now();
        tkLog(`${name}: live ✓ ${res.count} items${res.note?(" · "+res.note):""}`);
      }catch(e){
        rec.status="blocked"; rec.when=Date.now();
        rec.count=STATE.threats.filter(t=>t.source===name).length;
        tkLog(`${name}: live feed blocked (CORS/offline) — using embedded.`);
      }
    }else{
      rec.status="embedded"; rec.when=Date.now();
      rec.count=STATE.threats.filter(t=>t.source===name).length;
    }
    TRACK.runs[name]=rec;
  }
  TRACK.last=Date.now(); saveTrack();
  renderAll(); renderTracker();
  if(manual)tkLog("Tracker run complete.");
  if(btn){btn.disabled=false;btn.textContent="Run now";}
}

let TSORT={col:"date",dir:-1};
const cvssOf=t=>(typeof t.cvss==="number"?t.cvss:null);
const cvssBand=v=>v>=9?"b-Critical":v>=7?"b-High":v>=4?"b-Medium":"b-Low";
const TCOLS=[["id","ID"],["name","Threat"],["date","Date"],["actor","Threat actor"],
  ["org","Impacted org"],["fin","Est. financial"],["type","Type"]];
function tkey(t,c){switch(c){
  case "sev":return t.severity.score; case "cvss":return cvssOf(t); case "id":return t.id.toLowerCase();
  case "name":return t.name.toLowerCase(); case "date":return dateVal(t);
  case "actor":return impactModel(t).actor.toLowerCase(); case "org":return impactModel(t).org.toLowerCase();
  case "fin":return t.severity.score; case "type":return t.kind; default:return t.severity.score;}}
function tableSorted(threats){const c=TSORT.col,dir=TSORT.dir;
  return threats.slice().sort((a,b)=>{let ka=tkey(a,c),kb=tkey(b,c);
    if(ka==null&&kb==null)return 0; if(ka==null)return 1; if(kb==null)return -1;
    if(ka<kb)return -dir; if(ka>kb)return dir; return 0;});}
function renderTable(g,threats,line){
  g.className=""; threats=tableSorted(threats);
  const ind=c=>TSORT.col===c?(TSORT.dir<0?" ▼":" ▲"):"";

  threats.forEach(t=>{const im=impactModel(t); const dt=t.date||t.modified||""; const cv=cvssOf(t);
    h+=`<tr data-open="${t.id}">`+
      `<td class="c-id mono">${t.id}</td>`+
      `<td class="c-name">${esc(t.name)}</td>`+
      `<td class="c-date mono">${esc(dt||"—")}</td>`+
      `<td class="c-actor">${esc(im.actor)}</td>`+
      `<td class="c-org">${esc(im.org)}</td>`+
      `<td class="c-fin"${im.known?' title="documented"':' title="modeled estimate"'}>${esc(im.financial)}</td>`+
      `<td class="c-type">${esc(KIND_LABELS[t.kind]||t.kind)}</td></tr>`;});
  h+="</tbody></table>"; g.innerHTML=h;
  g.querySelectorAll("th[data-col]").forEach(th=>th.onclick=()=>{const c=th.dataset.col;
    if(TSORT.col===c)TSORT.dir*=-1; else {TSORT.col=c;TSORT.dir=(c==="sev"||c==="date"||c==="cvss")?-1:1;}
    renderGrid();});
}

function buildRagPrompt(query,retrieved){
  const ctx=retrieved.map(t=>{const im=impactModel(t);
    return `[${t.id}] ${t.name} (source: ${t.source}; type: ${t.kind}; severity: ${t.severity.band} ${t.severity.score}/100; maturity: ${t.maturity||"n/a"}; actor: ${im.actor}; impacted: ${im.org}; financial: ${im.financial})\n${(t.description||"").slice(0,500)}`;
  }).join("\n\n");
  return `You are an AI-security threat analyst. Using ONLY the CONTEXT below (real entries from MITRE ATLAS, OWASP, NIST, and incident/vulnerability databases), answer the QUESTION concisely for a security leader. Cite entries inline as [ID]. Cover, where relevant: the threat actor, impacted organization, TTPs, and business impact (lost operations and financial cost). If the context is insufficient, say so.\n\nCONTEXT:\n${ctx}\n\nQUESTION: ${query}\n\nANALYSIS:`;
}
async function askOllama(query,retrieved){
  const r=await fetch(ollamaUrl()+"/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:(PREFS.ollamaModel||"llama3.1"),prompt:buildRagPrompt(query,retrieved),stream:false})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json(); if(!d.response)throw new Error("empty response");
  return d.response.trim();
}
async function testOllama(){
  const st=$("#ollamaStatus"); st.textContent="testing…"; st.className="oll-st";
  try{
    const r=await fetch(ollamaUrl()+"/api/tags"); if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json(); const models=(d.models||[]).map(m=>m.name);
    if(models.length&&!$("#ollamaModel").value){$("#ollamaModel").value=models[0];PREFS.ollamaModel=models[0];savePrefs(PREFS);}
    st.textContent="✓ connected · "+(models.length?models.slice(0,4).join(", "):"no models"); st.className="oll-st ok";
  }catch(e){ st.textContent="✗ unreachable (is Ollama running? set OLLAMA_ORIGINS for browser access)"; st.className="oll-st err"; }
}
function renderRetrieved(r){
  const s=r.severity_summary;
  $("#sevSummary").innerHTML=(s&&s.max!=null)?
    `<span>peak <b>${s.max}/100</b> (${s.top_band})</span><span>mean <b>${s.mean}</b></span>`+
    `<span>real-world matches <b style="color:var(--realized)">${s.real_world}</b></span>`:"";
  const rr=$("#retRow"); rr.innerHTML="";
  r.retrieved.forEach(t=>{const c=el("div","ret"); c.dataset.open=t.id;
    c.innerHTML=`<span class="sevbadge b-${t.severity.band}" style="padding:1px 6px">${t.severity.score}</span>`+
      `<span class="id">${t.id}</span> ${esc(t.name)}`; rr.append(c);});
  const mb=$("#mitBox"); mb.innerHTML="";
  if(r.mitigations.length){mb.innerHTML='<div class="rail-h">Recommended defenses (MITRE ATLAS)</div>';
    r.mitigations.slice(0,6).forEach(x=>mb.append(el("div","mit",`<span class="id">${x.id}</span>${esc(x.name)}`)));}
}
async function runAnalyze(){
  const query=$("#ask").value.trim(); if(!query)return;
  const btn=$("#askBtn"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Analyzing';
  $("#result").classList.add("show");
  const r=analyze(query,8);            // RAG retrieval + deterministic brief (always computed)
  renderRetrieved(r);
  const engine=PREFS.engine||"deterministic";
  if(engine==="ollama"){
    $("#engineTag").textContent="Engine: Ollama ("+(PREFS.ollamaModel||"llama3.1")+") — generating…";
    try{
      const text=await askOllama(query,r.retrieved);
      $("#answer").innerHTML=linkifyRefs(text);
      $("#engineTag").textContent="Engine: Ollama ("+(PREFS.ollamaModel||"llama3.1")+") · live RAG";
    }catch(e){
      $("#answer").innerHTML=linkifyRefs(r.answer)+
        `<div class="oll-fallback">Ollama unreachable (${esc(e.message)}) — showing deterministic analysis. Click “Test” to check the connection.</div>`;
      $("#engineTag").textContent="Engine: deterministic (Ollama fallback)";
    }
  }else{
    $("#answer").innerHTML=linkifyRefs(r.answer);
    $("#engineTag").textContent="Engine: deterministic (grounded RAG)";
  }
  btn.disabled=false; btn.textContent="Analyze";
}

/* ---- agentic-pipeline mapping + diagram (per threat) ---- */
function pipelineComponents(t){
  const txt=((t.name||"")+" "+(t.description||"")+" "+(t.tactics||[]).join(" ")).toLowerCase();
  const tac=new Set(t.tactics||[]);
  const has=(...ws)=>ws.some(w=>txt.includes(w));
  const hit=new Set();
  if(has("prompt inject","indirect","input manipulation","adversarial data","adversarial example","evasion","jailbreak","drive-by","retrieval","rag","deepfake","user prompt","craft adversarial","clickbait")||tac.has("Initial Access")||tac.has("Reconnaissance"))hit.add("inputs");
  if(has("poison","training data","backdoor","fine-tun","transfer learning","skewing","dataset","pre-trained","split-view")||tac.has("Resource Development"))hit.add("training");
  if(has("model","jailbreak","system prompt","inversion","membership","extract","hallucinat","statistical","evade ai model","llm ")||tac.has("Defense Evasion")||tac.has("Discovery"))hit.add("core");
  if(has("agent","plan","self-replicat","recursive","self-delegation","sub-agent","deploy ai agent","autonom"))hit.add("planning");
  if(has("memory","context poison","thread","vector","rag database","episodic"))hit.add("memory");
  if(has("tool","mcp","api","code exec","plugin","command","package","supply chain","reverse shell","cloud","actuator","execute"))hit.add("tools")||(tac.has("Execution")&&hit.add("tools"));
  if(has("privile","excessive agency","escalat","valid account","credential","escape to host","permission")||tac.has("Privilege Escalation")||tac.has("Credential Access"))hit.add("action");
  if(has("exfiltrat","output handling","data leakage","response rendering","data destruction","citation","misinformation","output integrity","harm","leak")||tac.has("Exfiltration")||tac.has("Impact"))hit.add("outputs");
  if(has("erode","skewing","persist","rag poison","self-replicat","re-plan","feedback")||tac.has("Persistence"))hit.add("feedback");
  if(hit.size===0)hit.add("core");
  return hit;
}
function pipelineSVG(t){
  const on=pipelineComponents(t);
  const col=({Critical:"var(--crit)",High:"var(--high)",Medium:"var(--med)",Low:"var(--low)"})[t.severity.band]||"var(--accent)";
  const box=(k,x,y,w,h,title,sub,ts)=>{
    const hot=on.has(k);
    const fill=hot?col:"var(--panel)";
    const op=hot?0.16:1; const stroke=hot?col:"var(--line)"; const sw=hot?2:1;
    const tcol=hot?col:"var(--muted)";
    let s=`<g><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="7" fill="${fill}" fill-opacity="${hot?op:1}" stroke="${stroke}" stroke-width="${sw}"/>`;
    s+=`<text x="${x+w/2}" y="${y+(sub?16:h/2+4)}" text-anchor="middle" font-size="${ts||10.5}" font-weight="700" fill="${tcol}">${title}</text>`;
    if(sub)s+=`<text x="${x+w/2}" y="${y+30}" text-anchor="middle" font-size="8.5" fill="var(--dim)">${sub}</text>`;
    return s+"</g>";
  };
  const arrow=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#pa)"/>`;
  let s=`<svg viewBox="0 0 540 286" class="pipe" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<defs><marker id="pa" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--muted)"/></marker></defs>`;
  // outer center container
  s+=`<rect x="110" y="14" width="312" height="208" rx="9" fill="none" stroke="var(--line)" stroke-dasharray="3 3"/>`;
  s+=`<text x="266" y="9" text-anchor="middle" font-size="9" fill="var(--dim)">AGENTIC AI SYSTEM</text>`;
  s+=box("inputs",6,40,92,70,"INPUTS","prompt·RAG·docs");
  s+=box("training",6,124,92,56,"TRAINING","data·fine-tune");
  s+=box("core",120,24,292,40,"LLM CORE — reasons · plans · decides",null,10);
  s+=box("planning",120,74,90,66,"PLANNING","sub-agents");
  s+=box("memory",214,74,90,66,"MEMORY","short·long·RAG");
  s+=box("tools",308,74,104,66,"TOOLS & DATA","API·code·web");
  s+=box("action",120,150,292,30,"ACTION & EXECUTION PRIVILEGES",null,9.5);
  s+=box("outputs",432,40,100,118,"OUTPUTS","responses·actions");
  // arrows
  s+=arrow(99,75,118,75); s+=arrow(414,90,431,90);
  // feedback loop (dashed)
  const fbHot=on.has("feedback");
  s+=`<path d="M482,160 L482,258 L52,258 L52,182" fill="none" stroke="${fbHot?col:'#c0392b'}" stroke-width="${fbHot?2:1.3}" stroke-dasharray="5 4" marker-end="url(#pa)"/>`;
  s+=`<text x="266" y="276" text-anchor="middle" font-size="9" fill="${fbHot?col:'#c0392b'}">Autonomous feedback loop — observe results & re-plan</text>`;
  s+="</svg>";
  return s;
}


/* ---- drawer ---- */
const sec=(t,b)=>`<div class="dr-sec"><div class="rail-h">${t}</div>${b}</div>`;
const tags=arr=>`<div class="tags">${arr.map(x=>`<span class="tag">${esc(x)}</span>`).join("")}</div>`;
function openDrawer(id){
  const t=getDetail(id); if(!t)return;
  const d=$("#drawer"); d.classList.add("show"); $("#scrim").classList.add("show");
  let h=`<div class="drawer-grip" id="drawerGrip" title="Drag to resize"></div><button class="x" onclick="closeDrawer()">&times;</button>`;
  h+=`<div class="dr-id">${t.id} · ${esc(t.source)} · ${t.kind.replace("-"," ")}</div>`;
  h+=`<h2>${esc(t.name)}</h2><div class="dr-badges">`+
     `<span class="sevbadge b-${t.severity.band}">${t.severity.band} · ${t.severity.score}/100</span>${realityMeter(t.maturity)}`;
  if(t.incident_type)h+=`<span class="tag">${t.incident_type}</span>`;
  if(t.actor&&t.actor!=="Unknown")h+=`<span class="tag">actor: ${esc(t.actor)}</span>`;
  if(t.attack_reference)h+=`<span class="tag">ATT&CK ${t.attack_reference}</span>`;
  h+=`</div><div class="dr-sec"><div class="dr-desc">${esc(t.description)}</div></div>`;
  h+=`<div class="dr-sec"><div class="rail-h">Where it hits the agentic pipeline</div>${pipelineSVG(t)}`+
     `<div class="pipe-legend">Highlighted stages are affected by this threat · Agentic AI model after CISA / ASD ACSC Fig 1</div></div>`;
  {const im=impactModel(t); const cv=cvssOf(t);
   h+=`<div class="dr-sec"><div class="rail-h">Threat intelligence</div><div class="intel">`+
     `<div class="intel-row"><span class="k">Priority score</span><span class="v"><span class="sevbadge b-${t.severity.band}">${t.severity.band} · ${t.severity.score}/100</span> <span class="muted-note">(composite ranking)</span></span></div>`+
     `<div class="intel-row"><span class="k">CVSS</span><span class="v">`+
       (cv!=null?`<span class="cvss-badge ${cvssBand(cv)}">${cv.toFixed(1)}</span> <span class="muted-note">NVD base score</span>`
         :`<span class="muted-note">not a CVE — CVSS not applicable</span>`)+`</span></div>`+
     `<div class="intel-row"><span class="k">Threat actor</span><span class="v">${esc(im.actor)}</span></div>`+
     `<div class="intel-row"><span class="k">Impacted organization</span><span class="v">${esc(im.org)}</span></div>`+
     `<div class="intel-row"><span class="k">TTP</span><span class="v mono">${esc(im.ttp)}</span></div>`+
     `<div class="intel-row"><span class="k">Lost operation</span><span class="v">${esc(im.operational)}</span></div>`+
     `<div class="intel-row"><span class="k">Financial cost</span><span class="v">${esc(im.financial)} <span class="fin-tag ${im.known?'doc':'mod'}">${im.known?'documented':'modeled estimate'}</span></span></div>`+
     `</div></div>`;}
  if(t.severity.factors&&t.severity.factors.length){h+=`<div class="dr-sec"><div class="rail-h">Why this severity</div>`;
    t.severity.factors.forEach(f=>h+=`<div class="factor">${esc(f)}</div>`); h+=`</div>`;}
  if(t.target)h+=sec("Target",`<div style="font-size:13px;color:var(--text)">${esc(t.target)}</div>`);
  if((t.tactics||[]).length)h+=sec("Tactics",tags(t.tactics));
  if((t.platforms||[]).length)h+=sec("Platforms",tags(t.platforms));
  if((t.mitigations||[]).length){let m="";t.mitigations.forEach(x=>m+=`<div class="linkrow"><span class="id">${x.id}</span>${esc(x.name)}</div>`);h+=sec("Mitigations",m);}
  if((t.related_case_details||[]).length){let m="";t.related_case_details.forEach(c=>m+=
    `<div class="linkrow" data-open="${c.id}"><span class="id">${c.id}</span>${esc(c.name)} ${c.incident_type==="Incident"?'<span class="tag" style="margin-left:6px">real-world</span>':''}</div>`);h+=sec("Seen in case studies",m);}
  if((t.technique_details||[]).length){let m="";t.technique_details.forEach(c=>m+=
    `<div class="linkrow" data-open="${c.id}"><span class="id">${c.id}</span>${esc(c.name)} <span class="sevbadge b-${c.severity.band}" style="margin-left:6px;padding:1px 6px">${c.severity.score}</span></div>`);h+=sec("Techniques used",m);}
  if((t.references||[]).length){let m='<div class="reflist">';t.references.forEach(r=>m+=`<a href="${r.url}" target="_blank" rel="noopener">${esc(r.title)} ↗</a>`);m+="</div>";h+=sec("Sources",m);}
  d.innerHTML=h;
  wireDrawerGrip();
}
function closeDrawer(){$("#drawer").classList.remove("show");$("#scrim").classList.remove("show");}
window.closeDrawer=closeDrawer; window.openDrawer=openDrawer;

/* ---- theme & density (persisted) ---- */
const STORE="atlaswatch.prefs";
function loadPrefs(){try{return JSON.parse(localStorage.getItem(STORE))||{};}catch(e){return {};}}
function savePrefs(p){try{localStorage.setItem(STORE,JSON.stringify(p));}catch(e){}}
let PREFS=Object.assign({theme:"light",layout:"table",collapsed:["frameworks"],tkShown:false,density:"compact",
  analystCollapsed:true,
  engine:"deterministic",ollamaUrl:"http://localhost:11434",ollamaModel:""},loadPrefs());
function applyTheme(v){PREFS.theme=v;document.documentElement.setAttribute("data-theme",v);savePrefs(PREFS);
  document.querySelectorAll("#themeCtrl button").forEach(b=>b.classList.toggle("on",b.dataset.themeVal===v));}
function applyLayout(v){PREFS.layout=v;savePrefs(PREFS);
  document.querySelectorAll("#layoutCtrl button").forEach(b=>b.classList.toggle("on",b.dataset.layoutVal===v));
  if(typeof STATE!=="undefined"&&STATE.threats&&STATE.threats.length)renderGrid();}
function applyRailCollapse(){const set=new Set(PREFS.collapsed||[]);
  document.querySelectorAll(".rail-grp").forEach(g=>g.classList.toggle("collapsed",set.has(g.dataset.grp)));}
function toggleRailGroup(g){g.classList.toggle("collapsed");const set=new Set(PREFS.collapsed||[]);
  if(g.classList.contains("collapsed"))set.add(g.dataset.grp);else set.delete(g.dataset.grp);
  PREFS.collapsed=[...set];savePrefs(PREFS);}
function applyTrackerShown(){const tk=$("#tracker");if(tk)tk.classList.toggle("shown",!!PREFS.tkShown);
  const b=$("#trackerBtn");if(b)b.classList.toggle("on",!!PREFS.tkShown);}
function applyDensity(){document.documentElement.setAttribute("data-density",PREFS.density||"compact");}
function openAnalyst(){const a=$("#analystPop");if(!a)return;a.classList.add("open");
  const ta=$("#ask");if(ta)setTimeout(()=>ta.focus(),30);}
function closeAnalyst(){const a=$("#analystPop");if(a)a.classList.remove("open");}
function mkResize(grip,calcW,apply,store){ if(!grip)return;
  grip.addEventListener("mousedown",e=>{e.preventDefault();
    const mv=ev=>apply(calcW(ev.clientX));
    const up=()=>{document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);
      document.body.style.userSelect="";store&&store();};
    document.body.style.userSelect="none";
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);});
}
function applyFrameSizes(){
  if(PREFS.asideW)document.documentElement.style.setProperty("--aside-w",PREFS.asideW+"px");
  if(PREFS.drawerW)document.documentElement.style.setProperty("--drawer-w",PREFS.drawerW+"px");
  mkResize($("#asideGrip"),x=>Math.max(180,Math.min(520,Math.round(x))),
    w=>{PREFS.asideW=w;document.documentElement.style.setProperty("--aside-w",w+"px");},()=>savePrefs(PREFS));
}
function wireDrawerGrip(){
  mkResize($("#drawerGrip"),x=>Math.max(360,Math.min(Math.round(window.innerWidth*0.96),window.innerWidth-x)),
    w=>{PREFS.drawerW=w;document.documentElement.style.setProperty("--drawer-w",w+"px");},()=>savePrefs(PREFS));
}

/* ---- wire up ---- */
function init(){
  applyTheme(PREFS.theme); applyLayout(PREFS.layout||"cards"); applyDensity();
  applyRailCollapse(); applyTrackerShown(); applyFrameSizes();
  document.querySelectorAll("#themeCtrl button").forEach(b=>b.onclick=()=>applyTheme(b.dataset.themeVal));
  document.querySelectorAll("#layoutCtrl button").forEach(b=>b.onclick=()=>applyLayout(b.dataset.layoutVal));
  document.querySelectorAll(".rail-grp .grp-tog").forEach(b=>b.onclick=()=>toggleRailGroup(b.closest(".rail-grp")));
  // engine / ollama
  const eng=$("#engineSel"); eng.value=PREFS.engine||"deterministic";
  $("#ollamaUrl").value=PREFS.ollamaUrl||"http://localhost:11434";
  $("#ollamaModel").value=PREFS.ollamaModel||"";
  $("#ollamaCfg").style.display=(eng.value==="ollama")?"flex":"none";
  eng.addEventListener("change",()=>{PREFS.engine=eng.value;savePrefs(PREFS);
    $("#ollamaCfg").style.display=(eng.value==="ollama")?"flex":"none";});
  $("#ollamaUrl").addEventListener("change",e=>{PREFS.ollamaUrl=e.target.value.trim();savePrefs(PREFS);});
  $("#ollamaModel").addEventListener("change",e=>{PREFS.ollamaModel=e.target.value.trim();savePrefs(PREFS);});
  $("#ollamaTest").onclick=testOllama;
  // pop out / restore
  $("#popOut").onclick=popOutThreats;
  $("#dlExcel").onclick=downloadThreatsExcel;
  $("#popBack").onclick=()=>toggleMaxGrid(false);
  loadSnapshot(SNAPSHOT);
  renderAll();
  renderTracker();
  $("#trackerBtn").addEventListener("click",()=>{PREFS.tkShown=!PREFS.tkShown;savePrefs(PREFS);applyTrackerShown();});
  $("#typeSelect").addEventListener("change",e=>{
    const v=e.target.value;
    if(v==="real"){FILT.realtop="real";FILT.reality="";}
    else if(v==="hyp"){FILT.realtop="";FILT.reality="Hypothetical";}
    else if(v==="ref"){FILT.realtop="";FILT.reality="Reference";}
    else{FILT.realtop="";FILT.reality="";}
    refresh();
  });
  $("#analystOpen").addEventListener("click",openAnalyst);
  $("#apClose").addEventListener("click",closeAnalyst);
  $("#apScrim").addEventListener("click",closeAnalyst);
  $("#tkFreq").addEventListener("change",e=>{TRACK.freq=e.target.value;saveTrack();renderTracker();});
  $("#tkRun").onclick=()=>runTracker(true);
  setTimeout(()=>runTracker(false),400);
  // example chips
  const ex=["Real-world deepfake fraud and KYC bypass","How are AI agents hijacked through MCP tools?",
    "Supply-chain attacks on AI models and packages","Indirect prompt injection via RAG and email"];
  const c=$("#exampleChips"); ex.forEach(t=>{const b=el("button","chip",t);
    b.onclick=()=>{$("#ask").value=t;runAnalyze();};c.append(b);});
  ["f-band","f-maturity","f-platform","sort"].forEach(id=>$("#"+id).addEventListener("change",renderGrid));
  let qt; $("#q").addEventListener("input",()=>{clearTimeout(qt);qt=setTimeout(renderGrid,200);});
  $("#reset").onclick=()=>{["f-band","f-maturity","f-platform"].forEach(i=>$("#"+i).value="");
    FILT={source:"",kind:"",reality:"",realtop:""};$("#q").value="";refresh();};
  $("#askBtn").onclick=runAnalyze;
  $("#ask").addEventListener("keydown",e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))runAnalyze();});
  $("#scrim").onclick=closeDrawer;
  document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeAnalyst();closeDrawer();}});
  document.body.addEventListener("click",e=>{const r=e.target.closest(".ref,[data-open]");
    if(r)openDrawer(r.dataset.id||r.dataset.open);});
}
init();
</script>
