<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Dossier — Medical Device Cyber Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --surface:#FFFFFF; --surface-2:#F6F9FB;
    --ink:#13212C; --dim:#5A6B78; --faint:#8A9AA6; --line:#E2E8EE; --line-soft:#EDF2F5;
    --accent:#0C7D8C; --accent-d:#E2F1F3;
    --risk:#C24338; --risk-d:#FBECEA;
    --feat:#1F8A70; --feat-d:#E6F4EF;
    --dep:#3A6EA5;  --dep-d:#E9F0F8;
    --data:#7A5AA6; --data-d:#EFEAF6;
    --iface:#B5651D; --iface-d:#FBEFE2;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --r:13px; --shadow:0 1px 2px rgba(16,30,45,.04),0 14px 30px -22px rgba(16,30,45,.18);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit}
  ::selection{background:rgba(12,125,140,.2)}
  .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}

  /* ---- sidebar ---- */
  .side{background:var(--surface);color:var(--ink);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:20px 20px 14px;border-bottom:1px solid var(--line)}
  .brand .logo{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--ink);display:flex;align-items:center;gap:9px}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 rgba(12,125,140,.6);animation:pl 2.4s infinite}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(12,125,140,.5)}70%{box-shadow:0 0 0 9px rgba(12,125,140,0)}100%{box-shadow:0 0 0 0 rgba(12,125,140,0)}}
  .brand .tag{font-size:11.5px;color:var(--faint);margin-top:5px}
  .engine{margin:12px 20px;padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:11.5px;font-family:var(--mono);color:var(--dim);display:flex;align-items:center;gap:8px;background:var(--surface-2)}
  .engine .d{width:7px;height:7px;border-radius:50%;background:#B6C6CF}
  .engine.on .d{background:var(--feat)}
  .dev-list{flex:1;overflow-y:auto;padding:6px 12px 12px}
  .dev-list .lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);padding:10px 8px 6px}
  .dev{padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:background .12s}
  .dev:hover{background:var(--surface-2)}
  .dev.active{background:var(--accent-d);border-color:#bfe0e4}
  .dev .nm{font-weight:600;font-size:14px;color:var(--ink)}
  .dev .mt{font-size:11.5px;color:var(--dim);margin-top:2px}
  .dev .chips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .mini{font-size:9.5px;font-family:var(--mono);padding:2px 6px;border-radius:5px;background:var(--surface-2);color:var(--dim);border:1px solid var(--line-soft)}
  .mini.y{background:var(--feat-d);color:var(--feat);border-color:#c8e7dc}
  .side .add{padding:14px 16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}

  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;transition:border-color .14s,background .14s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:#b9c8d2;background:var(--surface-2)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:#0a6c79;border-color:#0a6c79}
  .btn.full{width:100%;justify-content:center}
  .btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.dark{background:var(--surface-2);border-color:var(--line);color:var(--ink)}
  .btn.dark:hover{background:#eef3f6}

  /* ---- main ---- */
  .main{padding:0 0 60px}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:16px 34px;display:flex;align-items:center;gap:16px}
  .topbar h1{font-family:var(--display);font-size:20px;font-weight:600;margin:0;letter-spacing:-.01em}
  .topbar .sub{color:var(--dim);font-size:13px}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 34px}

  .empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:70vh;color:var(--dim)}
  .empty-main h2{font-family:var(--display);color:var(--ink);font-size:22px;margin:0 0 8px}

  /* dossier identity header — signature element (light, accent rail) */
  .ident{background:linear-gradient(135deg,#F2FAFB,#FFFFFF 60%);color:var(--ink);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:16px;padding:22px 26px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .ident::after{content:"";position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(12,125,140,.10),transparent 70%)}
  .ident .ey{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
  .ident h2{font-family:var(--display);font-size:28px;font-weight:700;margin:8px 0 6px;letter-spacing:-.02em;color:var(--ink)}
  .ident .meta{display:flex;gap:18px;flex-wrap:wrap;font-size:13.5px;color:var(--dim)}
  .ident .meta b{color:var(--ink);font-weight:600}

  .tabs{display:flex;gap:4px;margin:22px 0 18px;border-bottom:1px solid var(--line)}
  .tab{padding:10px 16px;font-size:14px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

  .panel{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
  .panel h3{font-family:var(--display);font-size:15px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:9px}
  .panel h3 .src{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint);font-weight:400;border:1px solid var(--line);padding:2px 7px;border-radius:6px}
  .summary{font-size:15px;line-height:1.65;color:#243440}

  /* dossier sections grid */
  .triad,.grid5{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .ask-panel{margin-top:16px;border-left:4px solid var(--accent)}
  .col{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:16px 16px 6px;box-shadow:var(--shadow)}
  .col .ch{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:14px;padding-bottom:10px;border-bottom:1px solid var(--line-soft);margin-bottom:6px}
  .col .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .col.risk .ic{background:var(--risk-d);color:var(--risk)} .col.risk .ch{color:var(--risk)}
  .col.feat .ic{background:var(--feat-d);color:var(--feat)} .col.feat .ch{color:var(--feat)}
  .col.dep  .ic{background:var(--dep-d); color:var(--dep)}  .col.dep .ch{color:var(--dep)}
  .col.data .ic{background:var(--data-d);color:var(--data)} .col.data .ch{color:var(--data)}
  .col.iface .ic{background:var(--iface-d);color:var(--iface)} .col.iface .ch{color:var(--iface)}
  .col .ct{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
  .item{padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;line-height:1.5}
  .item:last-child{border-bottom:none}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .tg{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px;background:var(--surface-2);color:var(--dim);border:1px solid var(--line-soft)}

  /* ingest */
  .drop{border:1.5px dashed var(--line);border-radius:var(--r);padding:22px;text-align:center;color:var(--dim);background:var(--surface-2)}
  .drop input[type=file]{display:none}
  textarea,input[type=text]{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--body);font-size:14px;color:var(--ink)}
  textarea{min-height:120px;resize:vertical}
  textarea:focus,input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;font-weight:500}

  /* cve table */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);padding:0 12px 10px;border-bottom:2px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  td.id a{font-family:var(--mono);font-weight:700;color:var(--accent);text-decoration:none;font-size:12.5px;white-space:nowrap}
  .sev{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .sev.CRITICAL,.sev.KNOWN-EXPLOITED{background:var(--risk-d);color:var(--risk)}
  .sev.HIGH{background:#FCEEE3;color:#B5651D}
  .sev.MEDIUM{background:#FBF6E3;color:#8A7320}
  .sev.LOW,.sev.UNKNOWN,.sev.ADVISORY{background:var(--surface-2);color:var(--dim)}
  .note{font-size:12.5px;color:var(--dim);font-family:var(--mono);padding:6px 0}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink);padding:6px 11px;border:1px solid var(--line);border-radius:9px;cursor:pointer;user-select:none}
  .chk input{accent-color:var(--accent)}

  /* ask */
  .ask-out{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:var(--r);padding:16px 18px;margin-top:14px;font-size:14.5px;line-height:1.65;white-space:pre-wrap}
  .sources{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .source{font-size:12.5px;color:var(--dim);background:var(--surface);border:1px solid var(--line-soft);border-radius:9px;padding:9px 11px}
  .source b{font-family:var(--mono);color:var(--accent);font-size:11.5px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:var(--surface);border:none;border-right:1px solid var(--line);padding:7px 13px;font-size:12.5px;cursor:pointer;color:var(--dim)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}

  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .muted{color:var(--faint);font-size:13px}
  .hidden{display:none}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(15,28,37,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
  .scrim.show{display:flex}
  .modal{background:#fff;border-radius:16px;padding:22px;max-width:440px;width:100%;box-shadow:0 30px 60px -24px rgba(0,0,0,.4)}
  .modal h3{font-family:var(--display);margin:0 0 16px;font-size:18px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#16252f;color:#eaf2f6;padding:11px 18px;border-radius:11px;font-size:13.5px;z-index:60;opacity:0;transition:all .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:980px){.grid5,.triad{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:860px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.triad,.grid5{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <!-- sidebar -->
  <aside class="side">
    <div class="brand">
      <div class="logo"><span class="pulse"></span>Device Dossier</div>
      <div class="tag">Medical-device cyber intelligence</div>
    </div>
    <div class="engine" id="engine"><span class="d"></span><span id="engineTxt">checking engine…</span></div>
    <div class="dev-list" id="devList"><div class="lbl">Devices</div></div>
    <div class="add">
      <button class="btn primary full" id="btnAdd">+ Add device</button>
      <button class="btn dark full" id="btnSeed">Load example devices</button>
    </div>
  </aside>

  <!-- main -->
  <main class="main">
    <div class="topbar">
      <div><h1 id="topTitle">No device selected</h1><div class="sub" id="topSub">Add a device, then ingest its white paper</div></div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- add device modal -->
<div class="scrim" id="scrim">
  <div class="modal">
    <h3>Add device</h3>
    <div class="field"><label>Device name</label><input type="text" id="m-name" placeholder="e.g. SecureFlow 9000 Infusion Pump"></div>
    <div class="row"><div class="field" style="flex:1"><label>Manufacturer</label><input type="text" id="m-mfr" placeholder="optional"></div>
    <div class="field" style="flex:1"><label>Model</label><input type="text" id="m-model" placeholder="optional"></div></div>
    <div class="field"><label>CVE search keywords</label><input type="text" id="m-kw" placeholder="defaults to manufacturer + model"></div>
    <div class="row" style="justify-content:flex-end;margin-top:6px">
      <button class="btn" id="m-cancel">Cancel</button>
      <button class="btn primary" id="m-save">Add device</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

automated insulin delivery (AID) system. A disposable Pod worn on the body delivers insulin and is controlled either by a compatible smartphone app or a provided handheld Controller. The system integrates with a continuous glucose monitor (CGM) and uses its SmartAdjust technology to automate basal insulin dosing. It is regulated by the FDA as a class of automated insulin delivery devices. Connectivity. The Pod, the CGM, and the controlling phone or Controller communicate over Bluetooth Low Energy (BLE). Therapy data is uploaded from the phone to cloud services for caregiver and clinician viewing. The Pod itself has no direct internet connection; commands are issued only over a local BLE link from a bonded controller in physical proximity. Security features.", "f has no direct internet connection; commands are issued only over a local BLE link from a bonded controller in physical proximity. Security features. BLE links use pairing and bonding so that only an authorized, bonded controller can command a Pod. The mobile application requires user authentication, and therapy data uploaded to the cloud is transmitted over encrypted channels. There is no remote bolus capability over the internet — dosing commands require local proximity. Software updates are delivered through the application. Cyber risks and considerations. The wireless control surface introduces a Bluetooth proximity attack consideration; the security of the controlling smartphone platform (operating-system integrity, app permissions, malware) is part of the trust boundary.", "nsideration; the security of the controlling smartphone platform (operating-system integrity, app permissions, malware) is part of the trust boundary. Because the device delivers insulin, integrity and availability are patient-safety concerns, and pairing/bonding controls that prevent an unauthorized controller from commanding the Pod are central. Deployment. The system is deployed for home use and ambulatory wear by the patient, with data shared to caregivers and clinicians through companion and cloud applications. Representative components (illustrative). The Pod uses an ARM Cortex-M class microcontroller with an integrated Bluetooth Low Energy radio module; embedded firmware runs on an RTOS with a TLS library (mbedTLS class) and a BLE protocol stack.", "r with an integrated Bluetooth Low Energy radio module; embedded firmware runs on an RTOS with a TLS library (mbedTLS class) and a BLE protocol stack. The controller application runs on iOS and Android and uses the platform Bluetooth stack; cloud upload uses HTTPS/TLS with JSON over REST."]}, {"id": "ex_bd", "name": "BD Alaris Infusion System", "manufacturer": "BD (Becton Dickinson)", "model": "Alaris", "keywords": "BD Alaris infusion pump", "has_paper": true, "analyzed": true, "has_cves": true, "example": true, "paper_meta": {"filename": "bd_alaris.txt", "chunks": 3, "retrieval": "tfidf"}, "paper_text": "BD Alaris Infusion System — Security Profile\n\nOverview. The BD Alaris System is a modular large-volume infusion platform consisting of a point-of-care unit and interchangeable pump modules. It uses the Guardrails dose error-reduction software (DERS) with a configurable drug library and is managed centrally across a hospital fleet. It is an FDA-regulated infusion device cleared through the 510(k) pathway.\n\nConnectivity. Pumps communicate over the hospital wireless network with BD management servers to receive drug-library and configuration updates and to auto-document infusion data to the electronic health record (EHR). Central management supports asset tracking and maintenance.\n\nSecurity features. The platform centers on dose error reduction and a hardened drug library, role-based access on the management server, signed software, and protected network communications. BD operates a coordinated vulnerability disclosure program, publishes product security bulletins, and provides a software bill of materials (SBOM) for transparency.\n\nCyber risks and considerations. Infusion systems of this class have historically been the subject of CISA ICS medical advisories addressing matters such as third-party software component vulnerabilities, access-control weaknesses, and network exposure on insufficiently segmented networks. The dominant controls are network segmentation onto a dedicated clinical VLAN, timely patching, disabling unused service interfaces, and protecting the integrity of the drug library so that dosing limits cannot be altered by an attacker with network access.\n\nDeployment. Pumps are deployed at the bedside in medical-surgical units, intensive care units, and operating rooms, connected to a segmented clinical network and integrated with pharmacy and EHR systems.\n\nRepresentative components (illustrative). The point-of-care unit runs an embedded Linux operating system on an ARM Cortex-A class processor; software components include OpenSSL for TLS, BusyBox, glibc, a SQLite datastore, and an HL7 interface library. Connectivity uses an 802.11 Wi-Fi module and Ethernet PHY; the management server stack includes a web service over TLS.", "analysis": {"summary": "BD Alaris Infusion System — Security Profile Overview. The BD Alaris System is a modular large-volume infusion platform consisting of a point-of-care unit and interchangeable pump modules. It uses the Guardrails dose error-reduction software (DERS) with a configurable drug library and is managed centrally across a hospital fleet. Pumps communicate over the hospital wireless network with BD management servers to receive drug-library and configuration updates and to auto-document infusion data to the electronic health record (EHR). The platform centers on dose error reduction and a hardened drug library, role-based access on the management server, signed software, and protected network communications. Infusion systems of this class have historically been the subject of CISA ICS medical advisories addressing matters such as third-party s rough the 510(k) pathway. Connectivity. Pumps communicate over the hospital wireless network with BD management servers to receive drug-library and configuration updates and to auto-document infusion data to the electronic health record (EHR). Central management supports asset tracking and maintenance. Security features. The platform centers on dose error reduction and a hardened drug library, role-based access on the management server, signed software, and protected network communications.", "n dose error reduction and a hardened drug library, role-based access on the management server, signed software, and protected network communications. BD operates a coordinated vulnerability disclosure program, publishes product security bulletins, and provides a software bill of materials (SBOM) for transparency. Cyber risks and considerations. Infusion systems of this class have historically been the subject of CISA ICS medical advisories addressing matters such as third-party software component vulnerabilities, access-control weaknesses, and network exposure on insufficiently segmented networks. The dominant controls are network segmentation onto a dedicated clinical VLAN, timely patching, disabling unused service interfaces, and protecting the integrity of the drug library so that dosing limits cannot be altered by an attacker with network access. Deployment.", "e interfaces, and protecting the integrity of the drug library so that dosing limits cannot be altered by an attacker with network access. Deployment. Pumps are deployed at the bedside in medical-surgical units, intensive care units, and operating rooms, connected to a segmented clinical network and integrated with pharmacy and EHR systems. Representative components (illustrative). The point-of-care unit runs an embedded Linux operating system on an ARM Cortex-A class processor; software components include OpenSSL for TLS, BusyBox, glibc, a SQLite datastore, and an HL7 interface library. Connectivity uses an 802.11 Wi-Fi module and Ethernet PHY; the management server stack includes a web service over TLS."]}, {"id": "ex_jnj", "name": "Monarch Platform (Robotic Bronchoscopy)", "manufacturer": "Johnson & Johnson MedTech", "model": "Monarch", "keywords": "Monarch robotic bronchoscopy", "has_paper": true, "analyzed": true, "has_cves": true, "example": true, "paper_meta": {"filename": "jnj_monarch.txt", "chunks": 3, "retrieval": "tfidf"}, "paper_text": "Johnson & Johnson MedTech Monarch Platform — Security Profile\n\nOverview. The Monarch Platform is a robotic-assisted endoluminal system used for minimally invasive procedures such as bronchoscopy for diagnosing lung conditions. It comprises a mobile robotic cart, a physician controller, and navigation software that uses pre-procedure CT imaging to plan and guide the procedure. It is regulated by the FDA as a robotic-assisted device.\n\nConnectivity. The system is networked within the hospital for software updates, case and procedure data, and service connectivity, and it incorporates patient imaging used for navigation.\n\nSecurity features. The platform relies on user access control, encryption of stored and transmitted data, signed and verified software updates, and audit logging of system activity. Johnson & Johnson MedTech maintains a product security program and coordinated vulnerability disclosure.\n\nCyber risks and considerations. Robotic-assisted platforms emphasize the integrity of control software and of the imaging/navigation data that guides the procedure, hardening of service and maintenance interfaces, segmentation of the device from general hospital traffic, and disciplined patch governance. Loss of integrity or availability during a procedure is a patient-safety consideration.\n\nDeployment. The system is deployed in hospital interventional suites and operating rooms, connected to the biomedical/clinical network and to imaging systems.\n\nRepresentative components (illustrative). The robotic cart controller runs W . The IntelliVue MX750 is a high-acuity networked patient monitor used for continuous monitoring of vital signs in intensive care units and operating rooms. It integrates into the Philips IntelliVue monitoring network and clinical informatics environment. It is an FDA-regulated patient monitor.\n\nConnectivity. The monitor connects over wired and wireless links to the patient-monitoring network and central stations, and exchanges data with the EHR using HL7 interfaces.\n\nSecurity features. Philips operates a mature product security program with regular security advisories, coordinated vulnerability disclosure, and published SBOMs. Monitor protections include application allowlisting and a controlled software configuration, role-based access, and options for encrypted communications.\n\nCyber risks and considerations. Networked patient monitors of this class have been addressed in CISA ICS medical advisories covering items such as third-party component vulnerabilities and network exposure. The leading controls are placement on a dedicated, segmented monitoring VLAN, system hardening, restricting management interfaces, and applying vendor security updates promptly. Availability and data integrity are direct patient-safety concerns in critical-care settings.\n\nDeployment. Monitors are deployed at the bedside in ICUs, operating rooms, and emergency departments, connected to a dedicated monitoring network with central-station oversight.\n\nRepresentative components (illustrative). The monitor runs an embedded operating system on an ARM Cortex class SoC; software components include a TLS library, a web service, and HL7/DICOM interface libraries. Hardware includes a Wi-Fi module, Ethernet PHY, measurement sensor front-ends, and flash memory.", "analysis": {"summary": "Philips IntelliVue MX750 Patient Monitor — Security Profile Overview. The IntelliVue MX750 is a high-acuity networked patient monitor used for continuous monitoring of vital signs in intensive care units an function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadStatus(){
  try{ const s=await api('/status'); engineOllama=s.ollama;
    $('#engine').classList.toggle('on',s.ollama);
    $('#engineTxt').textContent = s.ollama? ('engine · '+s.model) : 'engine · deterministic';
  }catch(e){ $('#engineTxt').textContent='engine · offline'; }
}

async function loadDevices(){
  if(OFFLINE){ renderDevList(Object.values(LOCAL)); return; }
  try{ devices = await api('/devices'); }
  catch(e){ renderDevList(Object.values(LOCAL)); return; }
  renderDevList(devices);
}

        <span class="mini ${d.has_paper?'y':''}">${d.has_paper?'paper ✓':'no paper'}</span>
        <span class="mini ${d.analyzed?'y':''}">${d.analyzed?'analyzed':'unanalyzed'}</span>
        <span class="mini ${d.has_cves?'y':''}">${d.has_cves?'CVEs ✓':'no CVEs'}</span>

    el.appendChild(div);
  });
}

async function selectDevice(id){
  if(OFFLINE){ cur = LOCAL[id]; }
  else { try{ cur = await api('/devices/'+id); }catch(e){ if(LOCAL[id]){OFFLINE=true;cur=LOCAL[id];} else {toast('Could not load device');return;} } }
  tab='dossier';
  $('#topTitle').textContent=cur.name;
  $('#topSub').textContent=[cur.manufacturer,cur.model].filter(Boolean).join(' · ')||'Medical device';
  loadDevices(); renderDevice();
}

function renderTab(){
  if(tab==='cves') return renderCves();
  if(tab==='bom') return renderBom();
  return renderDossier();
}

/* ---- dossier tab ---- */
function renderDossier(){
  const b=$('#tabbody');
  if(!cur.has_paper){
    b.innerHTML = ingestUI();
    wireIngest();
    return;
  }
  const a=cur.analysis;
  b.innerHTML = `
    ${ingestUI(true)}
    <div class="row" style="margin:4px 0 18px">
      <button class="btn primary" id="btnAnalyze">${a?'Re-run analysis':'Run analysis'}</button>
      ${a?`<span class="muted">last run with ${esc(a.engine)} · ${new Date(a.generated*1000).toLocaleString()}</span>`:'<span class="muted">extracts summary, risks, security features & deployment</span>'}
    </div>
    <div id="analysisOut">${a?analysisHTML(a):'<div class="muted">Not analyzed yet.</div>'}</div>`;
  wireIngest();
  $('#btnAnalyze').onclick=runAnalyze;
}

function ingestUI(compact){
  return `<div class="panel">
    <h3>White paper ${compact?`<span class="src">${esc((cur.paper_meta&&cur.paper_meta.filename)||'ingested')} · ${cur.paper_meta?cur.paper_meta.chunks:''} chunks · ${cur.paper_meta?cur.paper_meta.retrieval:''}</span>`:''}</h3>
    <div class="drop" id="drop">
      <div>Drop a PDF or .txt here, or <label style="color:var(--accent);cursor:pointer;text-decoration:underline">browse<input type="file" id="file" accept=".pdf,.txt,.md"></label></div>
      <div class="muted" style="margin-top:6px">or paste the text below</div>
    </div>
    <div class="field" style="margin-top:12px"><textarea id="paperText" placeholder="Paste white paper text…"></textarea></div>
    <button class="btn ${compact?'':'primary'}" id="btnIngest">${compact?'Replace white paper':'Ingest white paper'}</button>
  </div>`;
}

function wireIngest(){
  const f=$('#file'); if(f) f.onchange=()=>{ if(f.files[0]) doIngest(f.files[0],null); };
  const bi=$('#btnIngest'); if(bi) bi.onclick=()=>{ const t=$('#paperText').value.trim(); if(t) doIngest(null,t); else if($('#file')&&$('#file').files[0]) doIngest($('#file').files[0],null); else toast('Add a file or paste text'); };
}

async function doIngest(file,text){
  if(OFFLINE) return toast('Start the local server (./run.sh) to ingest papers');
  const fd=new FormData();
  if(file) fd.append('file',file); if(text) fd.append('text',text);
  toast('Ingesting & indexing…');
  try{
    await fetch('/api/devices/'+cur.id+'/paper',{method:'POST',body:fd}).then(r=>{if(!r.ok)throw 0;});
    await selectDevice(cur.id);
    toast('White paper ingested');
  }catch(e){ toast('Ingest failed — check the file'); }
}

async function runAnalyze(){
  if(OFFLINE) return toast('Start the local server to re-run analysis');
  const out=$('#analysisOut'); out.innerHTML='<div class="muted"><span class="spin"></span> Running agentic extraction…</div>';
  try{
    const a=await api('/devices/'+cur.id+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    cur.analysis=a; out.innerHTML=analysisHTML(a); loadDevices();
    toast('Analysis complete ('+a.engine+')');
  }catch(e){ out.innerHTML='<div class="muted">'+esc(e.message)+'</div>'; }
}

function analysisHTML(a){
  const col=(cls,ic,title,items)=>`<div class="col ${cls}"><div class="ch"><span class="ic">${ic}</span>${title}<span class="ct">${(items||[]).length}</span></div>
    ${(items&&items.length)?items.map(it=>`<div class="item">${esc(it.text)}${(it.tags&&it.tags.length)?`<div class="tags">${it.tags.map(t=>`<span class="tg">${esc(t)}</span>`).join('')}</div>`:''}</div>`).join(''):'<div class="item muted">None identified.</div>'}</div>`;
  return `<div class="panel"><h3>Summary<span class="src">${esc(a.engine)}</span></h3><div class="summary">${esc(a.summary)}</div></div>
    <div class="grid5">
      ${col('feat','🛡','Security &amp; privacy features',a.cyber_features)}
      ${col('risk','⚠','Cyber risks',a.cyber_risks)}
      ${col('data','🗄','Data processed',a.data_processed)}
      ${col('dep','📍','Environment',a.deployment)}
      ${col('iface','🔗','Interfaces (devices/systems)',a.interfaces)}
    </div>`;
}

async function fetchCves(){
  if(OFFLINE) return toast('Start the local server to fetch live CVEs');
  const srcs=[...document.querySelectorAll('.chk input:checked')].map(i=>i.value);
  if(!srcs.length) return toast('Pick at least one source');
  const kw=$('#cveKw').value.trim();
  const out=$('#cveOut'); out.innerHTML='<div class="muted"><span class="spin"></span> Querying sources…</div>';
  try{
    const c=await api('/devices/'+cur.id+'/cves',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sources:srcs,keyword:kw||undefined})});
    cur.cves=c; out.innerHTML=cveTableHTML(c); loadDevices();
    toast((c.records||[]).length+' record(s) · CVE corpus built');
  }catch(e){ out.innerHTML='<div class="muted">'+esc(e.message)+'</div>'; }
}

function cveTableHTML(c){
  const notes=(c.notes||[]).map(n=>`<div class="note">› ${esc(n)}</div>`).join('');
  const recs=c.records||[];
  const recalls=c.recalls||[];
  const tc=c.trust_center&&c.trust_center.url? `<div style="margin-bottom:14px"><span class="muted">Vendor trust center:</span> <a href="${esc(c.trust_center.url)}" target="_blank" rel="noopener" style="color:var(--accent);font-weight:600">${esc(c.trust_center.name)} ↗</a> <span class="muted">(verify — pages change)</span></div>`:'';
  const cveRows=recs.map(r=>`<tr>
    <td class="id"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.id||'—')}</a></td>
    <td><span class="sev ${esc((r.severity||'UNKNOWN').replace(/\s+/g,'-'))}">${esc(r.severity||'UNKNOWN')}</span></td>
    <td>${esc(r.status||'')}<div class="muted" style="font-family:var(--mono);font-size:11px;margin-top:2px">${esc(r.source)} · ${esc(r.published||'')}</div></td>
    <td>${esc(r.remediation||'—')}</td>
    <td>${esc(r.description||r.title||'')}</td>
  </tr>`).join('');
  const cveTable = recs.length
    ? `<div class="panel">${OFFLINE?'<div class="note" style="color:var(--dep);margin-bottom:8px">› Illustrative example data — start the server to pull live NVD / CISA / FDA records.</div>':''}<h3>CVEs &amp; advisories <span class="src">keyword: ${esc(c.keyword||'')}</span></h3>${tc}
        <table><thead><tr><th>ID</th><th>Severity</th><th>Status</th><th>Remediation / patch</th><th>Description</th></tr></thead><tbody>${cveRows}</tbody></table></div>`
    : `<div class="panel"><h3>CVEs &amp; advisories</h3>${tc}<div class="muted">No CVE/advisory records. Live NVD/CISA feeds need internet (see notes below).</div></div>`;
  const recallRows=recalls.map(r=>`<tr>
    <td class="id">${esc(r.id||'—')}</td>
    <td><span class="sev ${r.cyber?'KNOWN-EXPLOITED':'UNKNOWN'}">${esc(r.classification||'Recall')}</span></td>
    <td><b>${esc(r.status||'Unknown')}</b><div class="muted" style="font-size:11px;margin-top:2px">${esc(r.date||'')}</div></td>
    <td>${esc(r.reason||'')}<div class="muted" style="margin-top:3px;font-size:11px">${esc(r.product||'')}</div></td>
  </tr>`).join('');
  const recallTable = `<div class="panel"><h3>Cybersecurity recalls <span class="src">FDA openFDA</span></h3>
    ${recalls.length
      ? `<table><thead><tr><th>Recall #</th><th>Class</th><th>Current status</th><th>Reason</th></tr></thead><tbody>${recallRows}</tbody></table>`
      : '<div class="muted">No cybersecurity-related recalls found (or live FDA feed unavailable offline).</div>'}</div>`;
  return cveTable + recallTable + `<div class="panel"><h3>Source notes</h3>${notes||'<div class="muted">—</div>'}</div>`;
}

function compTable(rows, cols){
  if(!rows||!rows.length) return '<div class="muted" style="padding:6px 0">None identified.</div>';
  const head=cols.map(c=>`<th>${c[1]}</th>`).join('');
  const body=rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c[0]]||'')}</td>`).join('')}</tr>`).join('');
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
function bomTablesHTML(bm){
  const swCols=[['name','Component'],['version','Version'],['type','Type'],['supplier','Supplier'],['license','License']];
  const swCols2=[['name','Component'],['version','Version'],['type','Type'],['evidence','Evidence']];
  const isUpload=(bm.source||'').startsWith('uploaded');
  return `<h4 style="font-family:var(--display);margin:4px 0 8px;color:var(--feat)">Software (SBOM) · ${(bm.software||[]).length}</h4>
    ${compTable(bm.software, isUpload?swCols:swCols2)}
    <h4 style="font-family:var(--display);margin:18px 0 8px;color:var(--iface)">Hardware (HBOM) · ${(bm.hardware||[]).length}</h4>
    ${compTable(bm.hardware, isUpload?swCols:[['name','Component'],['version','Version'],['type','Type'],['evidence','Evidence']])}`;
}
function exposureFdaHTML(ex){
  const k=ex.fda_510k||[]; const m=ex.maude||{};
  const kRows=k.map(r=>`<tr><td class="id">${esc(r.k_number)}</td><td>${esc(r.device_name)}</td><td>${esc(r.applicant)}</td><td>${esc(r.product_code)}</td><td>${esc(r.decision_date)}</td></tr>`).join('');
  const cyber=(m.cyber_related||[]);
  const cyberRows=cyber.map(e=>`<tr><td class="id">${esc(e.report_number)}</td><td>${esc(e.date)}</td><td>${esc((e.problems||[]).join(', '))}</td><td>${esc(e.snippet)}</td></tr>`).join('');
  return `<h4 style="font-family:var(--display);margin:2px 0 8px">510(k) clearances · ${k.length}</h4>
    ${k.length?`<table><thead><tr><th>K-number</th><th>Device</th><th>Applicant</th><th>Code</th><th>Decision</th></tr></thead><tbody>${kRows}</tbody></table>`:'<div class="muted">No 510(k) records (or feed offline).</div>'}
    <h4 style="font-family:var(--display);margin:18px 0 8px">MDR / MAUDE adverse events</h4>
    <div style="margin-bottom:8px"><span class="sev UNKNOWN">${m.total||0} total reports</span> <span class="sev ${cyber.length?'KNOWN-EXPLOITED':'LOW'}">${cyber.length} software/cyber-related (in sample)</span></div>
    ${cyber.length?`<table><thead><tr><th>Report</th><th>Date</th><th>Problems</th><th>Snippet</th></tr></thead><tbody>${cyberRows}</tbody></table>`:'<div class="muted">No software/cyber-related events in the sample.</div>'}
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)"><b>SOC 2:</b> <span class="muted">${esc((ex.soc2&&ex.soc2.note)||'Confidential — request from vendor trust center.')}</span> ${ex.soc2&&ex.soc2.trust_center&&ex.soc2.trust_center.url?`<a href="${esc(ex.soc2.trust_center.url)}" target="_blank" rel="noopener" style="color:var(--accent)">${esc(ex.soc2.trust_center.name)} ↗</a>`:''}</div>`;
}
function exposureNetHTML(ex){
  let html='';
  if(ex.shodan&&ex.shodan.total!==undefined){
    const f=ex.shodan.facets||{};
    const facet=(k)=> (f[k]||[]).map(x=>`<span class="tg">${esc(x.value)} · ${x.count}</span>`).join(' ');
    const s=(ex.shodan.sample||[]).map(h=>`<tr><td class="id">${esc(h.ip)}</td><td>${esc(h.port)}</td><td>${esc(h.product)}</td><td>${esc(h.org)}</td><td>${esc(h.country)}</td></tr>`).join('');
    html+=`<div style="margin-top:12px"><b>Shodan:</b> ${ex.shodan.total} exposed host(s)
      <div class="tags" style="margin:8px 0">${facet('port')}</div>
      ${s?`<table><thead><tr><th>IP</th><th>Port</th><th>Product</th><th>Org</th><th>Country</th></tr></thead><tbody>${s}</tbody></table>`:''}</div>`;
  }
  if(ex.internetdb&&ex.internetdb.ip){
    const d=ex.internetdb;
    html+=`<div style="margin-top:12px"><b>InternetDB ${esc(d.ip)}:</b>
      <div class="tags" style="margin-top:6px">${(d.ports||[]).map(p=>`<span class="tg">:${p}</span>`).join('')}</div>
      ${(d.vulns||[]).length?`<div style="margin-top:6px">Known vulns: ${(d.vulns||[]).map(v=>`<span class="sev HIGH" style="margin:2px">${esc(v)}</span>`).join('')}</div>`:''}
      ${(d.cpes||[]).length?`<div class="muted" style="margin-top:6px;font-family:var(--mono);font-size:11px">${(d.cpes||[]).slice(0,6).map(esc).join('<br>')}</div>`:''}</div>`;
  }
  return html;
}

  $('#bomOut').innerHTML='<div class="muted"><span class="spin"></span> Parsing SBOM…</div>';
  try{
    const r=await fetch('/api/devices/'+cur.id+'/bom',{method:'POST',body:fd}).then(x=>x.json());
    cur.bom=r; $('#bomOut').innerHTML=bomTablesHTML(r); toast('Parsed '+(r.count||0)+' components ('+r.format+')');
  }catch(e){ toast('Could not parse SBOM'); }
}
async function extractBomPaper(){
  if(OFFLINE) return toast('Start the local server to re-extract');
  $('#bomOut').innerHTML='<div class="muted"><span class="spin"></span> Extracting components…</div>';
  try{
    const r=await api('/devices/'+cur.id+'/bom',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    cur.bom=r; $('#bomOut').innerHTML=bomTablesHTML(r); toast('BOM extracted from paper');
  }catch(e){ $('#bomOut').innerHTML='<div class="muted">'+esc(e.message)+'</div>'; }
}
async function fetchExposure(opt){
  opt=opt||{};
  if(OFFLINE) return toast('Start the local server to query FDA / MAUDE / Shodan');
  const body={keyword:$('#expKw')?($('#expKw').value.trim()||undefined):undefined};
  if(opt.shodan){ body.shodan_key=$('#shKey').value.trim(); body.shodan_query=$('#shQuery').value.trim()||undefined; }
  if(opt.idb){ body.ip=$('#idbIp').value.trim(); }
  const target = opt.shodan||opt.idb ? '#shOut' : '#expOut';
  $(target).innerHTML='<div class="muted"><span class="spin"></span> Querying…</div>';
  try{
    const r=await api('/devices/'+cur.id+'/exposure',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    cur.exposure=r;
    $('#expOut').innerHTML=exposureFdaHTML(r);
    $('#shOut').innerHTML=exposureNetHTML(r);
    toast((r.notes||[]).slice(-1)[0]||'Fetched');
  }catch(e){ $(target).innerHTML='<div class="muted">'+esc(e.message)+'</div>'; }
}

/* ---- ask (persistent panel; wired in renderDevice) ---- */
let askCorpus='paper';

async function doAsk(){
  const q=$('#q').value.trim(); if(!q) return;
  if(OFFLINE){ $('#askOut').innerHTML='<div class="ask-out">Grounded Q&amp;A runs against the device RAG on the local server. Start it with <code>./run.sh</code> and reload to ask questions.</div>'; return; }
  const out=$('#askOut'); out.innerHTML='<div class="ask-out"><span class="spin"></span> Retrieving & answering…</div>';
  try{
    const r=await api('/devices/'+cur.id+'/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,corpus:askCorpus})});
    const srcs=(r.sources||[]).map((s,i)=>`<div class="source"><b>[${i+1}]</b> ${esc(s.text.slice(0,260))}${s.text.length>260?'…':''}</div>`).join('');
    out.innerHTML=`<div class="ask-out">${esc(r.answer)}</div>
      <div class="muted" style="margin-top:8px">${esc(r.engine)} · corpus: ${esc(r.corpus)}</div>
      ${srcs?`<div class="sources">${srcs}</div>`:''}`;
  }catch(e){ out.innerHTML='<div class="ask-out">'+esc(e.message)+'</div>'; }
}

async function deleteDevice(){
  if(!confirmInline('Remove '+cur.name+' and all its data?')) return;
  if(OFFLINE){ delete LOCAL[cur.id]; }
  else { try{ await api('/devices/'+cur.id,{method:'DELETE'}); }catch(e){} }
  cur=null; $('#topTitle').textContent='No device selected'; $('#topSub').textContent='Add a device, then ingest its white paper';
  $('#content').innerHTML=emptyMain(); loadDevices(); toast('Device removed');
}
function confirmInline(m){ return window.confirm? window.confirm(m): true; }

function emptyMain(){ return `<div class="empty-main"><h2>Select or add a device</h2><p>Ingest a device white paper to build its RAG, run agentic extraction of cyber risks, security features and deployment, then pull published CVEs and ask grounded questions.</p><button class="btn primary" id="emptySeed">Load example devices</button><p class="muted" style="margin-top:10px;max-width:520px">Examples include one device each from Insulet, BD, Johnson &amp; Johnson, Philips, Abbott, and Stryker — illustrative profiles compiled from public information.</p></div>`; }

/* ---- add device modal ---- */
$('#btnAdd').onclick=()=>{ $('#scrim').classList.add('show'); $('#m-name').focus(); };
$('#m-cancel').onclick=()=>$('#scrim').classList.remove('show');
$('#scrim').onclick=e=>{ if(e.target===$('#scrim')) $('#scrim').classList.remove('show'); };
$('#m-save').onclick=async ()=>{
  const name=$('#m-name').value.trim(); if(!name) return toast('Enter a device name');
  if(OFFLINE){ $('#scrim').classList.remove('show'); return toast('Start the local server (./run.sh) to add and analyze your own devices'); }
  const d=await api('/devices',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name, manufacturer:$('#m-mfr').value.trim(), model:$('#m-model').value.trim(), keywords:$('#m-kw').value.trim()})});
  ['m-name','m-mfr','m-model','m-kw'].forEach(i=>$('#'+i).value='');
  $('#scrim').classList.remove('show');
  await loadDevices(); selectDevice(d.id); toast('Device added');
};

/* ---- seed examples ---- */
function loadLocalExamples(){
  OFFLINE = true;
  Object.keys(LOCAL).forEach(k=>delete LOCAL[k]);
  EXAMPLES_DATA.forEach(d=>{ LOCAL[d.id] = JSON.parse(JSON.stringify(d)); });
  $('#engine').classList.remove('on');
  $('#engineTxt').textContent = 'engine · offline demo';
  loadDevices();
  selectDevice(EXAMPLES_DATA[0].id);
}
async function seedExamples(){
  toast('Loading example devices…');
  try{
    const r = await api('/seed',{method:'POST'});
    await loadDevices();
    if(devices.length) selectDevice(devices[0].id);
    toast(r.count? r.count+' example device(s) loaded' : 'Examples already loaded');
  }catch(e){
    // backend not running — load the embedded example dossiers so the demo still works
    loadLocalExamples();
    toast('Loaded example devices (offline demo — start the server for ingest/CVEs/ask)');
  }
}
$('#btnSeed').onclick = seedExamples;

/* ---- init ---- */
$('#content').innerHTML=emptyMain();
$('#content').addEventListener('click', e=>{ if(e.target&&e.target.id==='emptySeed') seedExamples(); });
loadStatus(); loadDevices();
</script>
</body>
