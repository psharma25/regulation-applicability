<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BitSense — Signal</title>
<meta name="description" content="Security intelligence, writing, and field notes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* BitSense Blog — standalone. ink slate console + warm reading paper, copper signal accent. */
:root{
  --ink:#0E1626; --ink-soft:#1B2A3F; --paper:#F6F4EE; --card:#FFFFFF;
  --text:#15202E; --text-dim:#5C6675; --line:#E2DDD0; --signal:#BF5A26;
  --signal-ink:#8F4015; --teal:#2E6E6A; --danger:#B23A3A; --radius:4px;
  --shadow:0 1px 2px rgba(15,22,38,.06),0 8px 24px rgba(15,22,38,.06);
  --display:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
  --body:"Source Serif 4",Georgia,"Times New Roman",serif;
  --mono:"JetBrains Mono",ui-monospace,"SFMono-Regular",Menlo,monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--text);font-family:var(--body);font-size:18px;line-height:1.62;-webkit-font-smoothing:antialiased}
a{color:var(--signal-ink);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--display);cursor:pointer}
img,video{max-width:100%}
header.site{background:var(--ink);color:#EDEAE0;border-bottom:3px solid var(--signal)}
.site-inner{max-width:1140px;margin:0 auto;padding:20px 24px;display:flex;align-items:baseline;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:baseline;gap:12px;cursor:pointer}
.brand .mark{font-family:var(--mono);font-size:13px;letter-spacing:.18em;color:var(--signal);border:1px solid var(--signal);padding:3px 7px;border-radius:3px}
.brand h1{font-family:var(--display);font-weight:600;font-size:22px;margin:0;letter-spacing:-.01em}
.brand .tag{font-family:var(--mono);font-size:11px;color:#8893A4;letter-spacing:.06em}
.site nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.wrap{max-width:1140px;margin:0 auto;padding:32px 24px 80px}
.cols{display:grid;grid-template-columns:230px 1fr;gap:40px;align-items:start}
@media(max-width:840px){.cols{grid-template-columns:1fr;gap:24px}}
.rail{position:sticky;top:24px}
.rail .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);margin:0 0 12px}
.search{position:relative;margin-bottom:24px}
.search input{width:100%;padding:10px 12px 10px 32px;font-family:var(--mono);font-size:13px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);color:var(--text)}
.search input:focus{outline:2px solid var(--signal);outline-offset:-1px}
.search::before{content:"\2315";position:absolute;left:10px;top:8px;color:var(--text-dim);font-size:16px}
.taglist{display:flex;flex-direction:column;gap:2px}
.taglist button{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:0;padding:6px 8px;border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--mono)}
.taglist button:hover{background:#ECE8DD}
.taglist button.active{background:var(--ink);color:#fff}
.taglist button.active .n{color:var(--signal)}
.taglist .n{color:var(--text-dim);font-size:11px}
@media(max-width:840px){.rail{position:static}.taglist{flex-direction:row;flex-wrap:wrap}.taglist button{width:auto}}
.fgroup{margin-bottom:22px}
.fgroup .lbl{display:flex;align-items:center;justify-content:space-between}
.dates{display:flex;flex-direction:column;gap:8px}
.dates label span{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:3px}
.dates input{width:100%;font-family:var(--mono);font-size:12px;padding:7px 9px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);color:var(--text)}
.dates input:focus{outline:2px solid var(--signal);outline-offset:-1px}
.activebar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:18px}
.activebar:empty{display:none}
.activebar .akey{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.afilter{font-family:var(--mono);font-size:11px;background:var(--ink);color:#fff;border:0;padding:4px 9px;border-radius:3px;display:inline-flex;gap:7px;align-items:center;cursor:pointer}
.afilter:hover{background:var(--signal)}
.afilter b{font-weight:500;opacity:.6}
.afilter .rm{opacity:.7}
.feed-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.feed-head .scope{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.02em}
.feed-head .count{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
.clear{font-family:var(--mono);font-size:12px;color:var(--signal-ink);background:none;border:0;padding:0}
article.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
article.card:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(15,22,38,.08),0 16px 36px rgba(15,22,38,.10)}
.card .cover{aspect-ratio:16/7;background:var(--ink-soft);overflow:hidden}
.card .cover img,.card .cover video{width:100%;height:100%;object-fit:cover;display:block}
.card .pad{padding:22px 26px 20px}
.card .meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.04em;margin-bottom:8px;display:flex;gap:12px;align-items:center}
.card .draft{color:var(--danger);border:1px solid var(--danger);padding:0 5px;border-radius:3px}
.card h3{font-family:var(--display);font-weight:600;font-size:24px;line-height:1.18;margin:0 0 8px;letter-spacing:-.015em;cursor:pointer}
.card h3:hover{color:var(--signal-ink)}
.card .summary{color:#33404f;margin:0 0 16px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--signal-ink);background:#FBEFE5;border:1px solid #EBD3BF;padding:3px 8px;border-radius:3px;cursor:pointer}
.chip::before{content:"#";opacity:.5}
.chip:hover{background:var(--signal);color:#fff;border-color:var(--signal)}
.share{display:flex;gap:6px;align-items:center;margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);flex-wrap:wrap}
.share .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-right:4px}
.share button{font-family:var(--mono);font-size:11px;border:1px solid var(--line);background:var(--card);color:var(--text);padding:4px 9px;border-radius:3px}
.share button:hover{border-color:var(--ink);background:var(--ink);color:#fff}
.btn{font-family:var(--display);font-weight:500;font-size:14px;padding:9px 16px;border-radius:var(--radius);border:1px solid transparent}
.btn-primary{background:var(--signal);color:#fff}
.btn-primary:hover{background:var(--signal-ink)}
.btn-ghost{background:transparent;color:#EDEAE0;border-color:#3A4A63}
.btn-ghost:hover{border-color:var(--signal);color:#fff}
.btn-outline{background:var(--card);color:var(--text);border-color:var(--line)}
.btn-outline:hover{border-color:var(--ink)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.post{max-width:760px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.post .hero{aspect-ratio:16/8;background:var(--ink-soft);overflow:hidden}
.post .hero img,.post .hero video{width:100%;height:100%;object-fit:cover}
.post .body{padding:36px 48px 48px}
@media(max-width:640px){.post .body{padding:26px 22px 36px}}
.post .meta{font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-bottom:14px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.post h1{font-family:var(--display);font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-.025em;margin:0 0 16px}
@media(max-width:640px){.post h1{font-size:30px}}
.prose{font-size:19px;line-height:1.7}
.prose h2{font-family:var(--display);font-size:27px;letter-spacing:-.01em;margin:34px 0 12px}
.prose h3{font-family:var(--display);font-size:21px;margin:26px 0 10px}
.prose p{margin:0 0 18px}
.prose a{text-decoration:underline;text-underline-offset:2px}
.prose img,.prose video{border-radius:var(--radius);margin:20px 0;display:block}
.prose code{font-family:var(--mono);font-size:.85em;background:#EFEDE4;padding:2px 5px;border-radius:3px}
.prose pre{background:var(--ink);color:#E6E1D5;padding:16px 18px;border-radius:var(--radius);overflow:auto;font-family:var(--mono);font-size:14px;line-height:1.5}
.prose pre code{background:none;padding:0;color:inherit}
.prose blockquote{border-left:3px solid var(--signal);margin:18px 0;padding:2px 0 2px 18px;color:#3a4654;font-style:italic}
.prose ul,.prose ol{margin:0 0 18px;padding-left:24px}
.prose li{margin:4px 0}
.back{font-family:var(--mono);font-size:12px;color:var(--signal-ink);display:inline-block;margin-bottom:18px}
.overlay{position:fixed;inset:0;background:rgba(8,12,22,.55);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
.overlay.open{display:flex}
.editor{background:var(--paper);width:100%;max-width:820px;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden}
.editor header{background:var(--ink);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.editor header h2{font-family:var(--display);font-size:18px;margin:0;font-weight:600}
.editor .x{background:none;border:0;color:#9aa6b8;font-size:22px;line-height:1}
.editor .pad{padding:24px}
.field{margin-bottom:18px}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;font-family:var(--body);font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);color:var(--text)}
.field textarea{font-family:var(--mono);font-size:14px;line-height:1.55;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--signal);outline-offset:-1px}
.field .hint{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:5px}
.row2{display:grid;grid-template-columns:1fr 200px;gap:18px}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
.dropzone{border:2px dashed var(--line);border-radius:var(--radius);padding:20px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--text-dim);background:var(--card);transition:.15s}
.dropzone.drag{border-color:var(--signal);background:#FBEFE5;color:var(--signal-ink)}
.dropzone b{color:var(--signal-ink)}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.thumb{position:relative;width:90px;height:64px;border-radius:3px;overflow:hidden;border:1px solid var(--line);background:var(--ink-soft)}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
.thumb button{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:3px;font-size:10px;padding:1px 5px}
.editor .actions{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:18px 24px;border-top:1px solid var(--line);background:var(--paper)}
.editor .actions .right{display:flex;gap:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;font-family:var(--mono);font-size:13px;padding:11px 18px;border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .25s;z-index:100;border-left:3px solid var(--signal)}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:64px 20px;color:var(--text-dim);font-family:var(--mono);font-size:14px}
.empty b{color:var(--text);display:block;font-size:16px;margin-bottom:6px}
.loading{font-family:var(--mono);font-size:13px;color:var(--text-dim);padding:40px;text-align:center}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
</style>
</head>
<body>

<header class="site">
  <div class="site-inner">
    <div class="brand" onclick="App.home()">
      <span class="mark">BITSENSE</span>
      <div><h1>Signal</h1><div class="tag">security intelligence · field notes</div></div>
    </div>
    <nav>
      <button class="btn btn-ghost" onclick="App.settings()" title="Set your public site URL & manage data">⚙ Settings</button>
      <button class="btn btn-ghost" onclick="App.openEditor()">＋ New post</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <div id="feed-view" class="cols">
    <aside class="rail">
      <div class="search"><input id="search" type="search" placeholder="search posts…" autocomplete="off"></div>
      <div class="fgroup"><div class="lbl">Topic</div><div id="topiclist" class="taglist"></div></div>
      <div class="fgroup"><div class="lbl">Year</div><div id="yearlist" class="taglist"></div></div>
      <div class="fgroup"><div class="lbl">Date range</div>
        <div class="dates">
          <label><span>From</span><input id="date-from" type="date"></label>
          <label><span>To</span><input id="date-to" type="date"></label>
        </div>
      </div>
      <div class="fgroup"><div class="lbl">Tags</div><div id="taglist" class="taglist"></div></div>
    </aside>
    <section>
      <div class="feed-head">
        <div class="scope" id="scope">Latest</div>
        <div style="display:flex;gap:14px;align-items:center">
          <button id="clear" class="clear" style="display:none" onclick="App.clearFilters()">clear all</button>
          <span class="count" id="count"></span>
        </div>
      </div>
      <div id="activebar" class="activebar"></div>
      <div id="feed"><div class="loading">Loading…</div></div>
    </section>
  </div>
  <div id="post-view" style="display:none"></div>
</main>

<div class="overlay" id="overlay">
  <div class="editor">
    <header><h2 id="editor-title">New post</h2><button class="x" onclick="App.closeEditor()" aria-label="Close">×</button></header>
    <div class="pad">
      <div class="field"><label for="f-title">Title</label><input id="f-title" placeholder="What's the signal?"></div>
      <div class="field"><label for="f-summary">Summary</label><input id="f-summary" placeholder="One line that says why this matters."></div>
      <div class="field"><label for="f-topic">Topic — the broad pillar (one)</label>
        <input id="f-topic" list="topic-options" placeholder="e.g. Product Security">
        <datalist id="topic-options"></datalist>
      </div>
      <div class="field">
        <label>Media — drag in images or video, or click to browse</label>
        <div class="dropzone" id="dropzone">Drop files here or <b>browse</b>. Inserts a reference at your cursor.
          <input id="file-input" type="file" accept="image/*,video/*" multiple hidden></div>
        <div class="thumbs" id="thumbs"></div>
      </div>
      <div class="field"><label for="f-body">Body — Markdown</label>
        <textarea id="f-body" rows="12" placeholder="Write in Markdown. **bold**, _italic_, ## headings, > quotes, `code`, [links](https://…). Uploaded media is inserted here."></textarea>
        <div class="hint">Tip: the first uploaded image becomes the cover unless you set one below.</div>
      </div>
      <div class="row2">
        <div class="field" style="margin:0"><label for="f-tags">Tags — comma separated</label><input id="f-tags" placeholder="ciso, medtech, ai-governance"></div>
        <div class="field" style="margin:0"><label for="f-status">Status</label>
          <select id="f-status"><option value="published">Published</option><option value="draft">Draft</option></select></div>
      </div>
      <input id="f-cover" type="hidden">
    </div>
    <div class="actions">
      <button class="btn btn-danger" id="del-btn" style="display:none" onclick="App.deleteCurrent()">Delete</button>
      <div class="right">
        <button class="btn btn-outline" onclick="App.closeEditor()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="App.save()">Publish</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const App = (() => {
  const state = { posts:[], tag:null, topic:null, year:null, dateFrom:"", dateTo:"", q:"", editing:null, urlCache:new Map() };
  const $ = s => document.querySelector(s);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  const siteBase = () => localStorage.getItem("bitsense_site_url") || (location.origin + location.pathname);

  // ---- IndexedDB --------------------------------------------------------
  let _db;
  function openDB(){
    return new Promise((res,rej)=>{
      const r = indexedDB.open("bitsense_blog", 1);
      r.onupgradeneeded = e => {
        const db = e.target.result;
        if(!db.objectStoreNames.contains("posts")) db.createObjectStore("posts",{keyPath:"slug"});
        if(!db.objectStoreNames.contains("media")) db.createObjectStore("media",{keyPath:"id"});
      };
      r.onsuccess = e => res(e.target.result);
      r.onerror = () => rej(r.error);
    });
  }
  function tx(store, mode="readonly"){ return _db.transaction(store, mode).objectStore(store); }
  const reqP = req => new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); });
  async function allPosts(){ return reqP(tx("posts").getAll()); }
  async function getPost(slug){ return reqP(tx("posts").get(slug)); }
  async function putPost(p){ return reqP(tx("posts","readwrite").put(p)); }
  async function delPost(slug){ return reqP(tx("posts","readwrite").delete(slug)); }
  async function putMedia(m){ return reqP(tx("media","readwrite").put(m)); }
  async function getMedia(id){ return reqP(tx("media").get(id)); }

  // ---- media resolution (idb://id -> object URL) ------------------------
  async function resolveMedia(root){
    const nodes = root.querySelectorAll('[data-idb]');
    for(const el of nodes){
      const id = el.getAttribute("data-idb");
      let url = state.urlCache.get(id);
      if(!url){
        const m = await getMedia(id);
        if(!m){ continue; }
        url = URL.createObjectURL(m.blob);
        state.urlCache.set(id, url);
      }
      el.src = url;
    }
  }

  // ---- markdown ---------------------------------------------------------
  function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
  const enc = s => String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  const isVideo = u => /\.(mp4|webm|mov|ogv|ogg)(\?|#|$)/i.test(u);
  function mediaTag(url, kind, alt){
    const idb = url.startsWith("idb://") ? ` data-idb="${url.slice(6)}"` : "";
    const src = idb ? "" : ` src="${url}"`;
    if(kind==="video" || (kind===undefined && isVideo(url))) return `<video controls${src}${idb}></video>`;
    return `<img alt="${alt||""}"${src}${idb}>`;
  }
  function inline(s){
    return esc(s)
      .replace(/`([^`]+)`/g,(_,c)=>`<code>${c}</code>`)
      .replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,(_,a,u)=>mediaTag(u,undefined,a))
      .replace(/@\[video\]\(([^)\s]+)\)/g,(_,u)=>mediaTag(u,"video"))
      .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(_,t,u)=>`<a href="${u}" target="_blank" rel="noopener">${t}</a>`)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*]+)\*/g,"$1<em>$2</em>")
      .replace(/_([^_]+)_/g,"<em>$1</em>");
  }
  function markdown(src){
    const lines=(src||"").replace(/\r\n/g,"\n").split("\n");
    let html="",i=0,para=[],list=null;
    const flushP=()=>{if(para.length){html+=`<p>${inline(para.join(" "))}</p>`;para=[];}};
    const flushL=()=>{if(list){html+=`</${list}>`;list=null;}};
    while(i<lines.length){
      let ln=lines[i];
      if(/^```/.test(ln)){flushP();flushL();let b=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){b.push(lines[i]);i++;}html+=`<pre><code>${esc(b.join("\n"))}</code></pre>`;i++;continue;}
      if(/^\s*$/.test(ln)){flushP();flushL();i++;continue;}
      let m;
      if((m=ln.match(/^(#{1,4})\s+(.*)/))){flushP();flushL();const h=m[1].length;html+=`<h${h}>${inline(m[2])}</h${h}>`;i++;continue;}
      if(/^>\s?/.test(ln)){flushP();flushL();let b=[];while(i<lines.length&&/^>\s?/.test(lines[i])){b.push(lines[i].replace(/^>\s?/,""));i++;}html+=`<blockquote>${inline(b.join(" "))}</blockquote>`;continue;}
      if((m=ln.match(/^[-*]\s+(.*)/))){flushP();if(list!=="ul"){flushL();list="ul";html+="<ul>";}html+=`<li>${inline(m[1])}</li>`;i++;continue;}
      if((m=ln.match(/^\d+\.\s+(.*)/))){flushP();if(list!=="ol"){flushL();list="ol";html+="<ol>";}html+=`<li>${inline(m[1])}</li>`;i++;continue;}
      if(/^!\[/.test(ln)||/^@\[video\]/.test(ln)){flushP();flushL();html+=inline(ln);i++;continue;}
      para.push(ln);i++;
    }
    flushP();flushL();
    return html;
  }

  // ---- helpers ----------------------------------------------------------
  const fmtDate = iso => { try{return new Date(iso).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});}catch{return iso;} };
  const readTime = b => Math.max(1,Math.round((b||"").split(/\s+/).filter(Boolean).length/220))+" min read";
  const postUrl = slug => `${siteBase()}#/post/${slug}`;
  function slugify(t){return (t.toLowerCase().replace(/[^\w\s-]/g,"").trim().replace(/[\s_-]+/g,"-").slice(0,80))||"post";}
  function uniqueSlug(base, exceptSlug){
    const taken=new Set(state.posts.map(p=>p.slug).filter(s=>s!==exceptSlug));
    let s=base,n=1; while(taken.has(s)){n++;s=`${base}-${n}`;} return s;
  }
  function normTags(raw){
    if(typeof raw==="string") raw=raw.split(/[,\n]/);
    const out=[],seen=new Set();
    for(let t of raw||[]){t=String(t).trim().toLowerCase();if(t&&!seen.has(t)){seen.add(t);out.push(t);}}
    return out;
  }

  // ---- sharing ----------------------------------------------------------
  function shareRow(p){
    const url=encodeURIComponent(postUrl(p.slug)), title=encodeURIComponent(p.title), sum=encodeURIComponent(p.summary||p.title);
    const t=[
      ["LinkedIn",`https://www.linkedin.com/sharing/share-offsite/?url=${url}`],
      ["X",`https://twitter.com/intent/tweet?text=${title}&url=${url}`],
      ["Bluesky",`https://bsky.app/intent/compose?text=${title}%20${url}`],
      ["Reddit",`https://www.reddit.com/submit?url=${url}&title=${title}`],
      ["Email",`mailto:?subject=${title}&body=${sum}%0A%0A${url}`],
    ];
    return `<div class="share"><span class="lbl">Share</span>`+
      t.map(([n,h])=>`<button onclick="window.open('${h}','_blank','noopener,width=640,height=620')">${n}</button>`).join("")+
      `<button onclick="App.copyLink('${p.slug}')">Copy link</button></div>`;
  }
  function copyLink(slug){ navigator.clipboard.writeText(postUrl(slug)).then(()=>toast("Link copied"),()=>toast("Copy failed")); }

  // ---- filtering --------------------------------------------------------
  const yearOf = iso => (iso||"").slice(0,4);
  const dayOf  = iso => (iso||"").slice(0,10);
  function anyFilter(){ return !!(state.tag||state.topic||state.year||state.dateFrom||state.dateTo||state.q); }
  function filtered(){
    let list=[...state.posts].sort((a,b)=>(b.created_at>a.created_at?1:-1));
    if(state.topic) list=list.filter(p=>(p.topic||"")===state.topic);
    if(state.tag)   list=list.filter(p=>(p.tags||[]).includes(state.tag));
    if(state.year)  list=list.filter(p=>yearOf(p.created_at)===state.year);
    if(state.dateFrom) list=list.filter(p=>dayOf(p.created_at)>=state.dateFrom);
    if(state.dateTo)   list=list.filter(p=>dayOf(p.created_at)<=state.dateTo);
    if(state.q){const q=state.q.toLowerCase();list=list.filter(p=>(p.title+" "+p.summary+" "+p.body+" "+(p.topic||"")).toLowerCase().includes(q));}
    return list;
  }
  function counts(keyFn){
    const m=new Map();
    for(const p of state.posts){ if(p.status==="draft")continue; for(const k of keyFn(p)){ if(k) m.set(k,(m.get(k)||0)+1); } }
    return [...m.entries()].map(([key,count])=>({key,count}));
  }
  const tagCounts   = () => counts(p=>p.tags||[]).sort((a,b)=>b.count-a.count||a.key.localeCompare(b.key));
  const topicCounts = () => counts(p=>[p.topic]).sort((a,b)=>b.count-a.count||a.key.localeCompare(b.key));
  const yearCounts  = () => counts(p=>[yearOf(p.created_at)]).sort((a,b)=>b.key.localeCompare(a.key));

  // ---- render -----------------------------------------------------------
  function fbtn(active, onclick, label, count){
    return `<button class="${active?"active":""}" onclick="${onclick}"><span>${label}</span><span class="n">${count}</span></button>`;
  }
  const emptyNote = t => `<span style="font-family:var(--mono);font-size:12px;color:var(--text-dim)">${t}</span>`;
  function renderRail(){
    const topics=topicCounts(), years=yearCounts(), tags=tagCounts();
    $("#topiclist").innerHTML = topics.length
      ? topics.map(t=>fbtn(state.topic===t.key, `App.selectTopic('${enc(t.key)}')`, esc(t.key), t.count)).join("")
      : emptyNote("no topics yet");
    $("#yearlist").innerHTML = years.length
      ? years.map(y=>fbtn(state.year===y.key, `App.selectYear('${y.key}')`, y.key, y.count)).join("")
      : emptyNote("—");
    $("#taglist").innerHTML = tags.length
      ? tags.map(t=>fbtn(state.tag===t.key, `App.selectTag('${enc(t.key)}')`, "#"+t.key, t.count)).join("")
      : emptyNote("no tags yet");
    $("#date-from").value=state.dateFrom; $("#date-to").value=state.dateTo;
    // topic datalist for the editor
    $("#topic-options").innerHTML = topics.map(t=>`<option value="${esc(t.key)}">`).join("");
    renderActive();
  }
  function renderActive(){
    const bar=$("#activebar"); const chips=[];
    const chip=(key,val,clear)=>`<button class="afilter" onclick="${clear}"><b>${key}</b>${esc(val)}<span class="rm">×</span></button>`;
    if(state.q)        chips.push(chip("search", state.q, "App.clearOne('q')"));
    if(state.topic)    chips.push(chip("topic", state.topic, "App.clearOne('topic')"));
    if(state.tag)      chips.push(chip("tag", "#"+state.tag, "App.clearOne('tag')"));
    if(state.year)     chips.push(chip("year", state.year, "App.clearOne('year')"));
    if(state.dateFrom) chips.push(chip("from", state.dateFrom, "App.clearOne('dateFrom')"));
    if(state.dateTo)   chips.push(chip("to", state.dateTo, "App.clearOne('dateTo')"));
    bar.innerHTML = chips.length ? `<span class="akey">Active</span>`+chips.join("") : "";
  }
  function renderTags(){ renderRail(); } // back-compat alias
  function renderFeed(){
    const list=filtered(), feed=$("#feed");
    const scope = state.topic ? state.topic
      : state.tag ? "#"+state.tag
      : state.year ? state.year
      : state.q ? "Search"
      : (state.dateFrom||state.dateTo) ? "By date" : "Latest";
    $("#scope").textContent=scope;
    $("#count").textContent=`${list.length} post${list.length===1?"":"s"}`;
    $("#clear").style.display=anyFilter()?"":"none";
    if(!list.length){
      feed.innerHTML=`<div class="empty"><b>Nothing here yet.</b>${anyFilter()?"Try clearing a filter.":'Hit "＋ New post" to publish the first one.'}</div>`;
      return;
    }
    feed.innerHTML=list.map(p=>{
      const cover=p.cover?`<div class="cover">${mediaTag(p.cover, isVideo(p.cover)||p.coverKind==="video"?"video":"image")}</div>`:"";
      const chips=(p.tags||[]).map(t=>`<span class="chip" onclick="event.stopPropagation();App.selectTag('${enc(t)}')">${t}</span>`).join("");
      const draft=p.status==="draft"?`<span class="draft">draft</span>`:"";
      const topic=p.topic?`<span style="color:var(--signal-ink);cursor:pointer" onclick="event.stopPropagation();App.selectTopic('${enc(p.topic)}')">${esc(p.topic)}</span>`:"";
      return `<article class="card">${cover}<div class="pad">
        <div class="meta">${draft}${topic}<span>${fmtDate(p.created_at)}</span><span>${readTime(p.body)}</span></div>
        <h3 onclick="App.openPost('${p.slug}')">${esc(p.title)}</h3>
        ${p.summary?`<p class="summary">${esc(p.summary)}</p>`:""}
        <div class="chips">${chips}</div>${shareRow(p)}</div></article>`;
    }).join("");
    resolveMedia(feed);
  }
  function renderPost(p){
    const hero=p.cover?`<div class="hero">${mediaTag(p.cover, isVideo(p.cover)||p.coverKind==="video"?"video":"image")}</div>`:"";
    const chips=(p.tags||[]).map(t=>`<span class="chip" onclick="App.selectTag('${enc(t)}')">${t}</span>`).join("");
    $("#feed-view").style.display="none";
    const pv=$("#post-view"); pv.style.display="";
    pv.innerHTML=`<a class="back" href="#/" onclick="App.home();return false">← all posts</a>
      <article class="post">${hero}<div class="body">
        <div class="meta">${p.status==="draft"?'<span style="color:var(--danger)">DRAFT</span>':""}
          ${p.topic?`<span style="color:var(--signal-ink);cursor:pointer" onclick="App.selectTopic('${enc(p.topic)}')">${esc(p.topic)}</span>`:""}
          <span>${fmtDate(p.created_at)}</span><span>${readTime(p.body)}</span>
          <button style="font-family:var(--mono);font-size:12px;background:none;border:0;color:var(--signal-ink);padding:0" onclick="App.editPost('${p.slug}')">edit</button></div>
        <h1>${esc(p.title)}</h1>
        ${p.summary?`<p style="font-size:21px;color:#3a4654;margin:0 0 22px">${esc(p.summary)}</p>`:""}
        <div class="prose">${markdown(p.body)}</div>
        <div class="chips" style="margin-top:28px">${chips}</div>${shareRow(p)}</div></article>`;
    resolveMedia(pv);
    window.scrollTo(0,0);
  }

  // ---- editor -----------------------------------------------------------
  function openEditor(post=null){
    state.editing=post;
    $("#editor-title").textContent=post?"Edit post":"New post";
    $("#save-btn").textContent=post?"Save changes":"Publish";
    $("#del-btn").style.display=post?"":"none";
    $("#f-title").value=post?.title||""; $("#f-summary").value=post?.summary||"";
    $("#f-topic").value=post?.topic||"";
    $("#f-body").value=post?.body||""; $("#f-tags").value=(post?.tags||[]).join(", ");
    $("#f-status").value=post?.status||"published"; $("#f-cover").value=post?.cover||"";
    $("#thumbs").innerHTML="";
    $("#overlay").classList.add("open");
    setTimeout(()=>$("#f-title").focus(),50);
  }
  function closeEditor(){ $("#overlay").classList.remove("open"); state.editing=null; }
  function insertAtCursor(text){
    const ta=$("#f-body"),s=ta.selectionStart,e=ta.selectionEnd;
    ta.value=ta.value.slice(0,s)+text+ta.value.slice(e);
    ta.selectionStart=ta.selectionEnd=s+text.length; ta.focus();
  }
  async function addThumb(id,kind){
    const m=await getMedia(id); if(!m)return;
    const url=URL.createObjectURL(m.blob); state.urlCache.set(id,url);
    const div=document.createElement("div"); div.className="thumb";
    div.innerHTML=(kind==="video"?`<video src="${url}"></video>`:`<img src="${url}">`)+
      `<button title="Set as cover" onclick="App.setCover('idb://${id}','${kind}')">cover</button>`;
    $("#thumbs").appendChild(div);
  }
  async function uploadFiles(files){
    for(const file of files){
      const isVid=file.type.startsWith("video/"), isImg=file.type.startsWith("image/");
      if(!isVid&&!isImg){ toast("Skipped non-media: "+file.name); continue; }
      const id=uid();
      await putMedia({id, blob:file, type:file.type, name:file.name});
      if(isVid) insertAtCursor(`\n@[video](idb://${id})\n`);
      else insertAtCursor(`\n![${file.name.replace(/\.[^.]+$/,"")}](idb://${id})\n`);
      if(!$("#f-cover").value){ $("#f-cover").value=`idb://${id}`; }
      addThumb(id, isVid?"video":"image");
      toast("Added "+file.name);
    }
  }
  function setCover(ref,kind){ $("#f-cover").value=ref; toast("Cover set"); }

  async function save(){
    const title=$("#f-title").value.trim();
    if(!title){ toast("A title is required."); $("#f-title").focus(); return; }
    const editing=state.editing;
    const slug = editing ? editing.slug : uniqueSlug(slugify(title));
    const created = editing ? editing.created_at : new Date().toISOString();
    const cover=$("#f-cover").value||null;
    const post={ slug, title, summary:$("#f-summary").value.trim(), body:$("#f-body").value,
      topic:$("#f-topic").value.trim(),
      tags:normTags($("#f-tags").value), status:$("#f-status").value, cover,
      coverKind: cover&&($("#f-body").value.includes(`@[video](${cover})`)||isVideo(cover))?"video":"image",
      created_at:created, updated_at:new Date().toISOString() };
    await putPost(post);
    await reload();
    closeEditor(); toast(editing?"Saved":"Published");
    location.hash=`#/post/${slug}`; openPost(slug);
  }
  async function deleteCurrent(){
    if(!state.editing) return;
    if(!confirm(`Delete "${state.editing.title}"? This can't be undone.`)) return;
    await delPost(state.editing.slug);
    await reload(); closeEditor(); toast("Deleted"); home();
  }

  // ---- settings / data --------------------------------------------------
  function settings(){
    const cur=localStorage.getItem("bitsense_site_url")||"";
    const v=prompt("Public site URL — used to build LinkedIn/X share links once this file is hosted.\n(Leave blank to use the current address.)\n\nType EXPORT to download a backup, or IMPORT to restore one.", cur);
    if(v===null) return;
    if(v.trim().toUpperCase()==="EXPORT"){ exportData(); return; }
    if(v.trim().toUpperCase()==="IMPORT"){ importData(); return; }
    if(v.trim()) localStorage.setItem("bitsense_site_url", v.trim()); else localStorage.removeItem("bitsense_site_url");
    toast("Settings saved"); reload();
  }
  function blobToDataURL(b){return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(b);});}
  function dataURLtoBlob(d){const[meta,b64]=d.split(",");const mime=(meta.match(/:(.*?);/)||[])[1]||"";const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new Blob([u],{type:mime});}
  async function exportData(){
    toast("Building backup…");
    const posts=await allPosts();
    const ids=new Set();
    posts.forEach(p=>{ const re=/idb:\/\/([\w]+)/g; let m; const hay=(p.body||"")+" "+(p.cover||""); while((m=re.exec(hay))) ids.add(m[1]); });
    const media=[];
    for(const id of ids){ const mm=await getMedia(id); if(mm) media.push({id:mm.id,type:mm.type,name:mm.name,data:await blobToDataURL(mm.blob)}); }
    const blob=new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),posts,media},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="bitsense-blog-backup.json"; a.click();
    toast(`Exported ${posts.length} posts`);
  }
  function importData(){
    const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json";
    inp.onchange=async()=>{
      try{
        const data=JSON.parse(await inp.files[0].text());
        if(data.media) for(const m of data.media) await putMedia({id:m.id,type:m.type,name:m.name,blob:dataURLtoBlob(m.data)});
        if(data.posts) for(const p of data.posts) await putPost(p);
        await reload(); toast(`Imported ${data.posts?.length||0} posts`);
      }catch(e){ toast("Import failed: "+e.message); }
    };
    inp.click();
  }

  // ---- nav --------------------------------------------------------------
  async function openPost(slug){ const p=await getPost(slug); if(!p){toast("Post not found");return home();} location.hash=`#/post/${slug}`; renderPost(p); }
  async function editPost(slug){ const p=await getPost(slug); if(p) openEditor(p); }
  function home(){ location.hash="#/"; $("#post-view").style.display="none"; $("#feed-view").style.display=""; renderFeed(); window.scrollTo(0,0); }
  function applyFilters(){ home(); renderRail(); }
  function selectTag(t){ state.tag=(state.tag===t)?null:t; applyFilters(); }
  function selectTopic(t){ state.topic=(state.topic===t)?null:t; applyFilters(); }
  function selectYear(y){ state.year=(state.year===y)?null:y; applyFilters(); }
  function clearOne(kind){
    if(kind==="q"){ state.q=""; $("#search").value=""; }
    else { state[kind]=kind==="dateFrom"||kind==="dateTo"?"":null; }
    renderRail(); renderFeed();
  }
  function clearFilters(){
    state.tag=state.topic=state.year=null; state.dateFrom=state.dateTo=""; state.q="";
    $("#search").value=""; renderRail(); renderFeed();
  }
  function route(){ const m=location.hash.match(/#\/post\/(.+)/); if(m) openPost(decodeURIComponent(m[1])); else home(); }

  let toastT;
  function toast(msg){ const el=$("#toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2600); }

  async function reload(){ state.posts=await allPosts(); renderTags(); }

  async function seedIfEmpty(){
    if(state.posts.length) return;
    const samples=[
      {title:"Why product security belongs in the 510(k), not after it",
       summary:"Threat modeling that ships with the submission, not bolted on at audit time.",
       topic:"Product Security",
       body:"## The pattern I keep seeing\nSecurity shows up *after* the regulatory clock starts. By then the architecture is frozen and every finding is expensive.\n\nFDA 524B doesn't ask for a security afterthought. It asks for evidence the device was built secure.\n\n> Design the SBOM, the threat model, and the PSIRT intake **before** the submission, not as a remediation sprint.\n\n### What that looks like\n- A threat model that maps to the actual data flows\n- An SBOM regenerated on every build\n- Coordinated disclosure that exists before the first report arrives\n\nThe implication is simple: security evidence is regulatory evidence.",
       tags:["medtech","product-security","fda-524b","threat-modeling"]},
      {title:"Carve-outs are an identity problem wearing a security costume",
       summary:"Stranded service accounts and IdP cutover are where divestitures actually bleed.",
       topic:"M&A Security",
       body:"When a divestiture closes, the security risk isn't the firewall. It's identity.\n\n### The disentanglement checklist nobody runs early enough\n1. Inventory every service account touching both entities\n2. Map IdP trust relationships and plan the cutover\n3. Time-box the TSA so it doesn't become permanent\n\n`stranded service accounts` outlive the deal and become the soft underbelly for the new entity.\n\nThe action: treat Day-1 identity separation as a security deliverable with an owner.",
       tags:["m&a-security","identity","carve-out","ciso"]},
    ];
    const now=Date.now();
    for(let i=0;i<samples.length;i++){
      const s=samples[i], slug=uniqueSlug(slugify(s.title)), iso=new Date(now-i*86400000).toISOString();
      await putPost({...s, slug, status:"published", cover:null, created_at:iso, updated_at:iso});
    }
    state.posts=await allPosts();
  }

  async function init(){
    _db=await openDB();
    state.posts=await allPosts();
    await seedIfEmpty();
    let st; $("#search").addEventListener("input",e=>{clearTimeout(st);st=setTimeout(()=>{state.q=e.target.value.trim();renderActive();renderFeed();},200);});
    $("#date-from").addEventListener("change",e=>{state.dateFrom=e.target.value;renderActive();renderFeed();});
    $("#date-to").addEventListener("change",e=>{state.dateTo=e.target.value;renderActive();renderFeed();});
    const dz=$("#dropzone"),fi=$("#file-input");
    dz.addEventListener("click",()=>fi.click());
    fi.addEventListener("change",e=>{uploadFiles([...e.target.files]);fi.value="";});
    ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
    ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
    dz.addEventListener("drop",e=>uploadFiles([...e.dataTransfer.files]));
    document.addEventListener("keydown",e=>{if(e.key==="Escape"&&$("#overlay").classList.contains("open"))closeEditor();});
    $("#overlay").addEventListener("click",e=>{if(e.target===$("#overlay"))closeEditor();});
    window.addEventListener("hashchange",route);
    renderTags(); route();
  }

  return { init, home, openPost, editPost, selectTag, selectTopic, selectYear, clearOne, clearFilters, openEditor, closeEditor,
           save, deleteCurrent, setCover, copyLink, settings };
})();
document.addEventListener("DOMContentLoaded", App.init);
</script>
</body>
</html>
